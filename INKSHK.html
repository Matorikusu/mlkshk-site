<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>INKSHK</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Rajdhani', system-ui, sans-serif;
    color: white;
}

/* VIDEO BACKGROUND */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 1;
}

/* OVERLAY */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.88);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.5s ease;
}

.entrance {
    text-align: center;
    opacity: 0;
    transform: scale(0.75);
    transition: all 1.3s ease;
}

.entrance.show {
    opacity: 1;
    transform: scale(1);
}

#entrance-img {
    width: 95%;
    max-width: 1100px;
    border: 10px solid #fff;
    box-shadow: 0 0 60px rgba(255, 215, 0, 0.7);
    border-radius: 12px;
}

#enter-btn {
    margin-top: 35px;
    padding: 18px 60px;
    font-size: 1.5rem;
    font-weight: bold;
    color: white;
    background: #b8860b;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(184, 134, 11, 0.6);
    text-transform: uppercase;
    letter-spacing: 3px;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="images/Locations/INKSHK/INKSHK.mp4" type="video/mp4">
</video>

<audio id="club-music" preload="auto" loop>
    <source src="Audio/Locations/INKSHK/INKSHK_LARGE.mp3" type="audio/mpeg">
</audio>

<audio id="radio-stream" preload="none"></audio>

<div id="overlay">
    <div class="entrance" id="entrance-container">
        <img src="images/Locations/INKSHK/INKSHK_ENTRANCE.jpg" id="entrance-img">
        <br>
        <button id="enter-btn">Enter INKSHK</button>
    </div>
</div>

<script>
const overlay = document.getElementById('overlay');
const entrance = document.getElementById('entrance-container');
const enterBtn = document.getElementById('enter-btn');

const clubMusic = document.getElementById('club-music');
const radioStream = document.getElementById('radio-stream');

// Stream URL set up for the new location
const STREAM_URL = "https://radio.mlkshkdigital.com/INKSHK.mp3";

let isPlaying = false;

/* show entrance */
window.addEventListener('load', () => {
    setTimeout(() => entrance.classList.add('show'), 500);
});

/* ENTER → start everything */
enterBtn.addEventListener('click', () => {

    overlay.style.opacity = '0';

    /* optional background music */
    clubMusic.play().catch(() => {});

    /* start radio stream */
    radioStream.src = STREAM_URL + "?t=" + Date.now();

    radioStream.play().then(() => {
        isPlaying = true;
    }).catch(err => {
        console.log("Autoplay blocked until interaction completes:", err);
    });

    setTimeout(() => {
        overlay.style.display = 'none';
    }, 1600);
});
</script>

</body>
</html>
