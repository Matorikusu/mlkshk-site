<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />

<title>KingBear • MLKSHK Digital</title>

<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,
body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:'Rajdhani', sans-serif;
}

/* =========================
   NAV
========================= */

header.nav-bar{
  position:sticky;
  top:0;
  z-index:100;

  padding:18px 24px;

  background:
    linear-gradient(
      180deg,
      rgba(0,0,0,.75),
      rgba(0,0,0,0)
    );

  border-bottom:
    1px solid rgba(255,255,255,.05);
}

.nav-content{
  max-width:1400px;
  margin:0 auto;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

.logo-link img{
  height:42px;
}

#realm-title{
  color:var(--accent);
  font-weight:700;
  letter-spacing:1px;
  cursor:pointer;
  user-select:none;
}

/* =========================
   SCENE
========================= */

#scene{
  position:relative;

  width:100vw;
  height:100dvh;

  overflow:hidden;

  background:
    url('images/Locations/The King Bear/KINGBEAR_BG.jpg')
    center/cover no-repeat;
}

/* =========================
   OVERLAYS
========================= */

.overlay{
  position:absolute;
  inset:0;
  pointer-events:none;
}

#stars{
  height:65%;

  opacity:.5;

  background:
    url('images/Locations/Overlays/stars.png')
    repeat;

  animation:
    starsMove 50s linear infinite;
}

#fog{
  background:
    linear-gradient(
      transparent,
      rgba(0,0,0,.5)
    );

  animation:
    fogPulse 18s ease-in-out infinite;
}

@keyframes fogPulse{

  0%{
    opacity:.4;
  }

  50%{
    opacity:.7;
  }

  100%{
    opacity:.4;
  }
}

@keyframes starsMove{

  from{
    background-position:0 0;
  }

  to{
    background-position:1000px 0;
  }
}

/* =========================
   WORLD OBJECTS
========================= */

.item,
.character,
.animated{

  position:absolute;

  left:0;
  top:0;

  transform-origin:center center;

  transition:
    transform .08s linear,
    filter .15s ease;

  user-select:none;
}

/* =========================
   SIZES
========================= */

.item{
  width:120px;
  z-index:10;
  cursor:pointer;
}

.character{
  width:180px;
  z-index:20;
  cursor:pointer;
}

.male{
  z-index:25;
}

.animated{
  width:120px;
  z-index:30;
  pointer-events:none;
}

.item img,
.character img,
.animated img{
  width:100%;
  height:auto;
  display:block;
  pointer-events:none;
}

.item:hover,
.character:hover{
  filter:
    drop-shadow(
      0 0 18px rgba(255,42,161,.65)
    );
}

/* =========================
   PLACE MODE PANEL
========================= */

#place-mode{

  position:fixed;

  top:20px;
  right:20px;

  z-index:300;

  display:none;
  gap:10px;
  align-items:center;

  padding:14px 18px;

  border-radius:10px;

  border:
    2px solid var(--accent);

  background:
    rgba(0,0,0,.88);

  backdrop-filter:blur(8px);
}

#place-mode.active{
  display:flex;
}

#place-mode button{

  border:none;

  padding:10px 14px;

  border-radius:8px;

  cursor:pointer;

  font-weight:700;

  color:#fff;

  background:
    rgba(255,255,255,.08);

  border:
    1px solid rgba(255,42,161,.5);
}

#place-mode button:hover{

  background:var(--accent);
  color:#000;
}

/* =========================
   TOOLTIP
========================= */

.info{

  position:fixed;

  left:50%;
  bottom:22px;

  transform:translateX(-50%);

  z-index:500;

  opacity:0;

  transition:opacity .25s ease;

  padding:10px 18px;

  border-radius:999px;

  border:
    1px solid var(--accent);

  background:
    rgba(0,0,0,.88);

  font-size:14px;
}

</style>
</head>

<body>

<header class="nav-bar">

  <div class="nav-content">

    <a href="index.html" class="logo-link">
      <img
        src="images/MLKSHK_LOGO_1500_X_500.png"
        alt="MLKSHK Logo"
      >
    </a>

    <div id="realm-title">
      KINGBEAR REALM
    </div>

  </div>

</header>

<!-- =========================
     SCENE
========================= -->

<div id="scene">

  <!-- OVERLAYS -->

  <div id="stars" class="overlay"></div>

  <div id="fog" class="overlay"></div>


  <!-- =========================
       ITEMS
  ========================= -->

  <div class="item" id="item-bottlecrate" data-name="Bottle Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_BOTTLECRATE.png">
  </div>

  <div class="item" id="item-speaker" data-name="Speaker">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SPEAKER.png">
  </div>

  <div class="item" id="item-recordcrate" data-name="Record Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_RECORDCRATE.png">
  </div>

  <div class="item" id="item-poster" data-name="Reggie Poster">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_REGGIEPOSTER.png">
  </div>

  <div class="item" id="item-neon" data-name="KingBear Neon">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_NEON.png">
  </div>

  <div class="item" id="item-flag" data-name="Pirate Flag">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_PIRATEFLAG.png">
  </div>

  <div class="item" id="item-guitar" data-name="Frankie Guitar">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_FRANKIE_GUITAR.png">
  </div>


  <!-- =========================
       FEMALES
  ========================= -->

  <div class="character" id="char-female1" data-name="Female Patron 1">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE1.png">
  </div>

  <div class="character" id="char-female2" data-name="Female Patron 2">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE2.png">
  </div>

  <div class="character" id="char-female4" data-name="Female Patron 4">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE4.png">
  </div>

  <div class="character" id="char-female5" data-name="Female Patron 5">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE5.png">
  </div>

  <div class="character" id="char-female6" data-name="Female Patron 6">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE6.png">
  </div>


  <!-- =========================
       MALES
  ========================= -->

  <div class="character male" id="char-male1" data-name="Male Patron 1">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE1.png">
  </div>

  <div class="character male" id="char-male2" data-name="Male Patron 2">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE2.png">
  </div>

  <div class="character male" id="char-male3" data-name="Male Patron 3">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE3.png">
  </div>

  <div class="character male" id="char-male4" data-name="Male Patron 4">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE4.png">
  </div>

  <div class="character male" id="char-male5" data-name="Male Patron 5">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE5.png">
  </div>

  <div class="character male" id="char-male6" data-name="Male Patron 6">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE6.png">
  </div>

  <div class="character male" id="char-security" data-name="Security">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_SECURITY.png">
  </div>

</div>

<!-- =========================
     AUDIO
========================= -->

<audio id="bg-audio" loop preload="auto">

  <source
    src="Audio/Locations/The King Bear/2. Large Amounts v2.mp3"
    type="audio/mpeg"
  >

</audio>

<!-- =========================
     EDITOR UI
========================= -->

<div id="place-mode">

  <button id="toggle-place">
    PLACE MODE: ON
  </button>

  <button id="save-pos">
    Save All
  </button>

  <button id="reset-pos">
    Reset All
  </button>

</div>

<div class="info" id="tooltip"></div>

<!-- =========================
     SCRIPT
========================= -->

<script>

/* =========================
   AUDIO
========================= */

const audio =
  document.getElementById('bg-audio');

audio.volume = 0.45;

function tryPlayAudio(){

  audio.play().catch(() => {});
}

window.addEventListener('load', tryPlayAudio);

document.addEventListener(
  'click',
  tryPlayAudio,
  { once:true }
);

document.addEventListener(
  'touchstart',
  tryPlayAudio,
  { once:true }
);


/* =========================
   WORLD EDITOR
========================= */

const ADMIN_PASSWORD = "mlkshk";

const scene =
  document.getElementById('scene');

let placeMode = false;

let selectedItem = null;

let isDragging = false;

let dragOffsetX = 0;
let dragOffsetY = 0;

const objects =
  document.querySelectorAll(
    '.item, .character, .animated'
  );


/* =========================
   TRANSFORM
========================= */

function updateTransform(el){

  const x =
    parseFloat(el.dataset.x || 0);

  const y =
    parseFloat(el.dataset.y || 0);

  const scale =
    parseFloat(el.dataset.scale || 1);

  const rotation =
    parseFloat(el.dataset.rotation || 0);

  el.style.transform =
    `
      translate(${x}px, ${y}px)
      scale(${scale})
      rotate(${rotation}deg)
    `;
}


/* =========================
   LOAD
========================= */

objects.forEach(el => {

  const saved =
    localStorage.getItem(
      'kingbear_' + el.id
    );

  if(saved){

    const data = JSON.parse(saved);

    el.dataset.x = data.x;
    el.dataset.y = data.y;

    el.dataset.scale = data.scale;
    el.dataset.rotation = data.rotation;

  } else {

    el.dataset.x = 250;
    el.dataset.y = 250;

    el.dataset.scale = 1;
    el.dataset.rotation = 0;
  }

  updateTransform(el);


  /* SELECT */

  el.addEventListener('click', () => {

    if(!placeMode){

      showTooltip(
        `${el.dataset.name} activated`,
        1500
      );

      return;
    }

    selectedItem = el;

    showTooltip(
      'Drag = Move | Wheel = Scale | Shift+Wheel = Rotate',
      2600
    );
  });


  /* DRAG START */

  el.addEventListener('mousedown', e => {

    if(!placeMode) return;

    selectedItem = el;

    isDragging = true;

    const rect =
      scene.getBoundingClientRect();

    const currentX =
      parseFloat(el.dataset.x || 0);

    const currentY =
      parseFloat(el.dataset.y || 0);

    dragOffsetX =
      e.clientX - rect.left - currentX;

    dragOffsetY =
      e.clientY - rect.top - currentY;
  });

});


/* =========================
   DRAGGING
========================= */

document.addEventListener('mousemove', e => {

  if(!placeMode) return;

  if(!selectedItem) return;

  if(!isDragging) return;

  const rect =
    scene.getBoundingClientRect();

  const x =
    e.clientX - rect.left - dragOffsetX;

  const y =
    e.clientY - rect.top - dragOffsetY;

  selectedItem.dataset.x = x;
  selectedItem.dataset.y = y;

  updateTransform(selectedItem);

});


/* =========================
   DRAG END
========================= */

document.addEventListener('mouseup', () => {

  isDragging = false;

});


/* =========================
   SCALE / ROTATE
========================= */

document.addEventListener(
  'wheel',
  e => {

    if(!placeMode) return;

    if(!selectedItem) return;

    e.preventDefault();

    let scale =
      parseFloat(
        selectedItem.dataset.scale || 1
      );

    let rotation =
      parseFloat(
        selectedItem.dataset.rotation || 0
      );

    /* SCALE */

    scale += e.deltaY * -0.002;

    scale =
      Math.max(0.2, Math.min(4, scale));

    /* ROTATE */

    if(e.shiftKey){

      rotation += e.deltaY * -0.15;
    }

    selectedItem.dataset.scale = scale;
    selectedItem.dataset.rotation = rotation;

    updateTransform(selectedItem);

  },
  { passive:false }
);


/* =========================
   SAVE
========================= */

document
.getElementById('save-pos')
.addEventListener('click', () => {

  objects.forEach(el => {

    const data = {

      x: el.dataset.x,

      y: el.dataset.y,

      scale: el.dataset.scale,

      rotation: el.dataset.rotation
    };

    localStorage.setItem(
      'kingbear_' + el.id,
      JSON.stringify(data)
    );
  });

  showTooltip(
    '✅ Scene Saved!',
    1600
  );

});


/* =========================
   RESET
========================= */

document
.getElementById('reset-pos')
.addEventListener('click', () => {

  if(confirm('Reset scene?')){

    objects.forEach(el => {

      localStorage.removeItem(
        'kingbear_' + el.id
      );
    });

    location.reload();
  }

});


/* =========================
   PLACE MODE
========================= */

function togglePlaceMode(){

  placeMode = !placeMode;

  document
    .getElementById('place-mode')
    .classList.toggle(
      'active',
      placeMode
    );

  document
    .getElementById('toggle-place')
    .textContent =
      placeMode
        ? 'PLACE MODE: ON'
        : 'PLACE MODE: OFF';
}


/* =========================
   SECRET ACCESS
========================= */

let clickCount = 0;

document
.getElementById('realm-title')
.addEventListener('click', () => {

  clickCount++;

  if(clickCount >= 5){

    const pass =
      prompt('Enter admin password');

    if(pass === ADMIN_PASSWORD){

      togglePlaceMode();

    } else {

      showTooltip(
        'Incorrect Password',
        1200
      );
    }

    clickCount = 0;
  }

  setTimeout(() => {

    clickCount = 0;

  }, 2000);

});


/* =========================
   TOGGLE BUTTON
========================= */

document
.getElementById('toggle-place')
.addEventListener(
  'click',
  togglePlaceMode
);


/* =========================
   TOOLTIP
========================= */

function showTooltip(text, ms = 2000){

  const tip =
    document.getElementById('tooltip');

  tip.textContent = text;

  tip.style.opacity = 1;

  setTimeout(() => {

    tip.style.opacity = 0;

  }, ms);
}


/* =========================
   ESC
========================= */

document.addEventListener(
  'keydown',
  e => {

    if(
      e.key === 'Escape'
      &&
      placeMode
    ){

      togglePlaceMode();
    }
  }
);

</script>

</body>
</html>
