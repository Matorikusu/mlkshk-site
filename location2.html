<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}

header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}

#realm-title{
  color:var(--accent); 
  font-weight:600; 
  cursor:pointer;
  user-select:none;
}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/The King Bear/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:crosshair;
}

/* Layers */
.item{ z-index: 10; }
.character{ z-index: 20; }
.male{ z-index: 25; }
.animated{ z-index: 30; }

.item, .character, .animated{
  position:absolute;
  transition: transform 0.2s ease;
  transform-origin: center center;
}

.item:hover{ filter: drop-shadow(0 0 20px rgba(255,42,161,0.6)); }

.item img, .character img, .animated img{
  width:100%; height:auto; display:block;
}

.item{ width:clamp(65px, 9vw, 170px); }
.character{ width:clamp(90px, 12vw, 200px); }
.animated{ width:clamp(60px, 8vw, 140px); pointer-events:none; }

/* Place Mode */
#place-mode{
  position:fixed; top:20px; right:20px; z-index:200;
  background:rgba(0,0,0,0.9); 
  border:2px solid var(--accent);
  padding:12px 18px; 
  border-radius:8px; 
  font-size:14px;
  display:none; 
  gap:10px; 
  align-items:center;
}
#place-mode.active{display:flex;}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div id="realm-title">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <!-- LOCKED ITEMS & CHARACTERS -->
  <!-- Items -->

    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_BOTTLECRATE.png" alt="">
  </div>
  <div class="item" id="item-speaker" style="left:35%; top:72%; transform:scale(1.1) rotate(-3deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SPEAKER.png" alt="">
  </div>
  <div class="item" id="item-recordcrate" style="left:48%; top:58%; transform:scale(0.95) rotate(2deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_RECORDCRATE.png" alt="">
  </div>
  <div class="item" id="item-poster" style="left:62%; top:45%; transform:scale(1) rotate(-5deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_REGGIEPOSTER.png" alt="">
  </div>
  <div class="item" id="item-neon" style="left:75%; top:28%; transform:scale(1.15) rotate(4deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_NEON.png" alt="">
  </div>
  <div class="item" id="item-flag" style="left:12%; top:35%; transform:scale(1.2) rotate(8deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_PIRATEFLAG.png" alt="">
  </div>
  <div class="item" id="item-guitar" style="left:82%; top:68%; transform:scale(0.9) rotate(-12deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_FRANKIE_GUITAR.png" alt="">
  </div>

  <!-- Females -->
  <div class="character" id="char-female1" style="left:22%; top:42%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE1.png" alt="">
  </div>
  <div class="character" id="char-female2" style="left:38%; top:48%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE2.png" alt="">
  </div>
  <div class="character" id="char-female4" style="left:55%; top:52%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE4.png" alt="">
  </div>
  <div class="character" id="char-female5" style="left:68%; top:38%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE5.png" alt="">
  </div>
  <div class="character" id="char-female6" style="left:81%; top:55%;">

  </div>

  <!-- Males -->
  <div class="character male" id="char-male1" style="left:15%; top:28%;">

  <div class="character male" id="char-male2" style="left:29%; top:35%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE2.png" alt="">
  </div>
  <div class="character male" id="char-male3" style="left:45%; top:25%;">

  </div>
  <div class="character male" id="char-male4" style="left:58%; top:42%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE4.png" alt="">
  </div>
  <div class="character male" id="char-male5" style="left:72%; top:48%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE5.png" alt="">
  </div>
  <div class="character male" id="char-male6" style="left:85%; top:32%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE6.png" alt="">
  </div>
  <div class="character male" id="char-security" style="left:8%; top:52%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_SECURITY.png" alt="">
  </div>

  <!-- Movable GIFs only -->
  <div class="animated" id="candle1">
    <img src="images/Locations/The King Bear/Animated/candle1.gif" alt="">
  </div>
  <div class="animated" id="candle2">
    <img src="images/Locations/The King Bear/Animated/candle2.gif" alt="">
  </div>
  <div class="animated" id="light">
    <img src="images/Locations/The King Bear/Animated/light.gif" alt="">
  </div>
</div>

<audio id="bg-audio" loop preload="auto">
  <source src="Audio/Locations/The King Bear/2. Large Amounts v2.mp3" type="audio/mpeg">
</audio>

<div id="place-mode">
  <button id="toggle-place">PLACE MODE: ON (GIFs only)</button>
  <button id="save-pos">Save GIFs</button>
  <button id="reset-pos">Reset GIFs</button>
</div>

<div class="info" id="tooltip"></div>

<script>
// Music Autoplay
const audio = document.getElementById('bg-audio');
audio.volume = 0.48;
const playAudio = () => audio.play().catch(() => {});
playAudio();
document.addEventListener('click', playAudio, {once: true});

// Place Mode - ONLY GIFs
const ADMIN_PASSWORD = "mlkshk";
let placeMode = false;
let selectedItem = null;
let isDragging = false;
let offsetX = 0, offsetY = 0;

const scene = document.getElementById('scene');

document.querySelectorAll('.animated').forEach(el => {
  const saved = localStorage.getItem('kingbear_' + el.id);
  if (saved) {
    const data = JSON.parse(saved);
    el.style.left = data.left;
    el.style.top = data.top;
    el.style.transform = data.transform || 'scale(1) rotate(0deg)';
  }

  makeDraggable(el);
});

function makeDraggable(el) {
  el.addEventListener('mousedown', e => {
    if (!placeMode) return;
    selectedItem = el;
    isDragging = true;
    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    el.style.transition = 'none';
  });
}

document.addEventListener('mousemove', e => {
  if (!placeMode || !selectedItem || !isDragging) return;
  const rect = scene.getBoundingClientRect();
  let x = ((e.clientX - rect.left - offsetX) / rect.width) * 100;
  let y = ((e.clientY - rect.top - offsetY) / rect.height) * 100;
  x = Math.max(2, Math.min(92, x));
  y = Math.max(2, Math.min(88, y));
  selectedItem.style.left = x + '%';
  selectedItem.style.top = y + '%';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  if (selectedItem) selectedItem.style.transition = 'transform 0.2s ease';
});

document.addEventListener('wheel', e => {
  if (!placeMode || !selectedItem) return;
  e.preventDefault();
  let scale = getCurrentScale(selectedItem);
  let rotation = getCurrentRotation(selectedItem);
  scale += (e.deltaY * -0.002);
  scale = Math.max(0.4, Math.min(2.5, scale));
  if (e.shiftKey) rotation += (e.deltaY * -0.2);
  selectedItem.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
}, {passive: false});

function getCurrentScale(el) {
  const m = el.style.transform.match(/scale\(([^)]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}
function getCurrentRotation(el) {
  const m = el.style.transform.match(/rotate\(([^)]+)deg\)/);
  return m ? parseFloat(m[1]) : 0;
}

function togglePlaceMode() {
  placeMode = !placeMode;
  document.getElementById('place-mode').classList.toggle('active', placeMode);
  document.getElementById('toggle-place').textContent = placeMode ? 'PLACE MODE: ON (GIFs only)' : 'PLACE MODE: OFF';
  scene.style.cursor = placeMode ? 'move' : 'crosshair';
}

// Secret access
let clickCount = 0;
document.getElementById('realm-title').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 5) {
    const pass = prompt("Enter admin password:");
    if (pass === ADMIN_PASSWORD) togglePlaceMode();
    clickCount = 0;
  }
  setTimeout(() => clickCount = 0, 2000);
});

document.getElementById('toggle-place').addEventListener('click', togglePlaceMode);

document.getElementById('save-pos').addEventListener('click', () => {
  document.querySelectorAll('.animated').forEach(el => {
    localStorage.setItem('kingbear_' + el.id, JSON.stringify({
      left: el.style.left,
      top: el.style.top,
      transform: el.style.transform
    }));
  });
  showTooltip('GIF positions saved', 1500);
});

function showTooltip(text, ms = 2000) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}
</script>
</body>
</html>
