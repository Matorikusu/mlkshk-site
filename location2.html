<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --accent:#ff2aa1;
}
html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}
#realm-title{
  color:var(--accent);
  font-weight:600;
  user-select:none;
}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/The King Bear/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:default;
}

.overlay{
  position:absolute; pointer-events:none;
}
#fog{
  width:100%; height:100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.45));
  animation: fogPulse 25s ease-in-out infinite;
}
#stars{
  width:100%; height:65%;
  background: url('images/Locations/Overlays/stars.png') repeat;
  opacity:0.55;
  animation: starTwinkle 45s linear infinite;
}

/* Items & Characters */
.item, .character{
  position:absolute;
  transition: transform 0.4s ease;
  user-select:none;
}
.item:hover, .character:hover{
  filter: drop-shadow(0 0 25px rgba(255,42,161,0.7));
}

.item{
  width:clamp(65px, 9vw, 170px);
}
.character{
  width:clamp(90px, 12vw, 200px);
  z-index: 20;
}
.male { z-index: 25; }

.item img, .character img{
  width:100%; height:auto; display:block;
}

/* Tooltip */
.info{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); padding:8px 22px; border-radius:9999px;
  font-size:13px; border:1px solid var(--accent); z-index:150;
  opacity:0; transition:opacity 0.4s;
}

@keyframes fogPulse { 0%,100% { opacity: 0.45; } 50% { opacity: 0.65; } }
@keyframes starTwinkle { from { background-position: 0 0; } to { background-position: 200px 200px; } }
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div id="realm-title">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <!-- === ITEMS === -->
  <div class="item" id="item-bottlecrate" style="left: 8%; top: 65%;">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_BOTTLECRATE.png" alt="">
  </div>
  <div class="item" id="item-speaker" style="left: 82%; top: 48%;">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SPEAKER.png" alt="">
  </div>
  <div class="item" id="item-recordcrate" style="left: 22%; top: 73%;">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_RECORDCRATE.png" alt="">
  </div>
  <div class="item" id="item-poster" style="left: 87%; top: 25%;">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_REGGIEPOSTER.png" alt="">
  </div>
  <div class="item" id="item-neon" style="left: 6%; top: 18%;">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_NEON.png" alt="">
  </div>
  <div class="item" id="item-flag" style="left: 71%; top: 12%;">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_PIRATEFLAG.png" alt="">
  </div>
  <div class="item" id="item-guitar" style="left: 48%; top: 68%;">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_FRANKIE_GUITAR.png" alt="">
  </div>

  <!-- === FEMALES === -->
  <div class="character" id="char-female1" style="left: 15%; top: 42%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE1.png" alt="">
  </div>
  <div class="character" id="char-female2" style="left: 32%; top: 51%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE2.png" alt="">
  </div>
  <div class="character" id="char-female4" style="left: 52%; top: 47%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE4.png" alt="">
  </div>
  <div class="character" id="char-female5" style="left: 68%; top: 55%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE5.png" alt="">
  </div>
  <div class="character" id="char-female6" style="left: 79%; top: 61%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE6.png" alt="">
  </div>

  <!-- === MALES === -->
  <div class="character male" id="char-male1" style="left: 24%; top: 58%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE1.png" alt="">
  </div>
  <div class="character male" id="char-male2" style="left: 41%; top: 62%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE2.png" alt="">
  </div>
  <div class="character male" id="char-male3" style="left: 58%; top: 44%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE3.png" alt="">
  </div>
  <div class="character male" id="char-male4" style="left: 73%; top: 58%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE4.png" alt="">
  </div>
  <div class="character male" id="char-male5" style="left: 29%; top: 69%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE5.png" alt="">
  </div>
  <div class="character male" id="char-male6" style="left: 49%; top: 71%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE6.png" alt="">
  </div>
  <div class="character male" id="char-security" style="left: 85%; top: 52%;">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_SECURITY.png" alt="">
  </div>

  <audio id="bg-audio" loop preload="auto">
    <source src="Audio/Locations/The King Bear/2. Large Amounts v2.mp3" type="audio/mpeg">
  </audio>
</div>

<div class="info" id="tooltip"></div>

<script>
const audio = document.getElementById('bg-audio');
audio.volume = 0.45;

function tryPlayAudio() {
  audio.play().catch(() => {});
}

window.addEventListener('load', tryPlayAudio);
document.addEventListener('click', tryPlayAudio, {once: true});

function showTooltip(text, ms = 1400) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}

document.querySelectorAll('.item, .character').forEach(el => {
  el.addEventListener('click', () => {
    showTooltip(el.dataset.name ? `${el.dataset.name} clicked` : 'Clicked', 1200);
  });
});
</script>
</body>
</html>
