<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}

header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}

#realm-title{
  color:var(--accent); 
  font-weight:600; 
  cursor:pointer;
  user-select:none;
}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:crosshair;
}

/* Overlays */
.overlay{
  position:absolute; pointer-events:none;
  background-size:cover; background-position:center;
  opacity:0.75;
}

#fog{
  width:100%; height:100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.4));
  animation: fogPulse 25s ease-in-out infinite;
}

#stars{
  width:100%; height:60%;
  background: url('images/Locations/Overlays/stars.png') repeat;
  opacity:0.6;
  animation: starTwinkle 40s linear infinite;
}

/* Items */
.item{
  position:absolute;
  width:clamp(60px, 8vw, 140px);
  transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
  cursor:pointer;
  filter: drop-shadow(0 0 12px rgba(255,42,161,0.4));
}

.item:hover{
  transform: scale(1.15) rotate(2deg);
  filter: drop-shadow(0 0 25px rgba(255,42,161,0.8));
}

.item img{
  width:100%; height:auto; display:block;
  border-radius:8px;
}

/* Place Mode Panel */
#place-mode{
  position:fixed; top:20px; right:20px; z-index:200;
  background:rgba(0,0,0,0.9); 
  border:2px solid var(--accent);
  padding:12px 18px; 
  border-radius:8px; 
  font-size:14px;
  display:none; 
  gap:10px; 
  align-items:center;
  box-shadow:0 0 20px rgba(255,42,161,0.3);
}
#place-mode.active{display:flex;}

#place-mode button{
  background:rgba(255,255,255,0.1);
  color:white;
  border:1px solid var(--accent);
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}

#place-mode button:hover{
  background:var(--accent);
  color:black;
}

.info{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); padding:8px 20px; border-radius:9999px;
  font-size:13px; border:1px solid var(--accent); z-index:150;
  white-space:nowrap;
  opacity:0;
  transition:opacity 0.4s;
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div id="realm-title">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <div class="item" id="item1" data-name="Neon Totem">
    <img src="images/Locations/Overlays/itemone.png" alt="Neon Totem">
  </div>

  <div class="item" id="item2" data-name="Floating Satellite">
    <img src="images/Locations/Overlays/satellite.png" alt="Floating Satellite">
  </div>

  <div class="item" id="item3" data-name="Bear Cave">
    <img src="images/Locations/Overlays/bearcave.png" alt="Bear Cave">
  </div>
</div>

<!-- Place Mode Panel -->
<div id="place-mode">
  <button id="toggle-place">PLACE MODE: ON</button>
  <button id="save-pos">Save Positions</button>
  <button id="reset-pos">Reset All</button>
</div>

<div class="info" id="tooltip"></div>

<script>
// ================== CONFIG ==================
const ADMIN_PASSWORD = "mlkshk";   // ← CHANGE THIS TO YOUR OWN PASSWORD
let placeMode = false;
const scene = document.getElementById('scene');
const items = document.querySelectorAll('.item');

// Initialize items
items.forEach(item => {
  const saved = localStorage.getItem('kingbear_' + item.id);
  if (saved) {
    const pos = JSON.parse(saved);
    item.style.left = pos.left;
    item.style.top = pos.top;
  } else {
    item.style.left = '20%';
    item.style.top = '40%';
  }

  item.addEventListener('click', (e) => {
    if (placeMode) return;
    showTooltip(`${item.dataset.name} activated`, 1800);
  });

  makeDraggable(item);
});

function makeDraggable(el) {
  let isDragging = false;
  let offsetX, offsetY;

  el.addEventListener('mousedown', e => {
    if (!placeMode) return;
    isDragging = true;
    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    el.style.transition = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const sceneRect = scene.getBoundingClientRect();
    let x = ((e.clientX - sceneRect.left - offsetX) / sceneRect.width) * 100;
    let y = ((e.clientY - sceneRect.top - offsetY) / sceneRect.height) * 100;

    x = Math.max(2, Math.min(92, x));
    y = Math.max(2, Math.min(88, y));

    el.style.left = x + '%';
    el.style.top = y + '%';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      el.style.transition = 'all 0.3s cubic-bezier(0.23,1,0.32,1)';
    }
  });
}

// =============== PLACE MODE TOGGLE ===============
function togglePlaceMode() {
  placeMode = !placeMode;
  
  const panel = document.getElementById('place-mode');
  panel.classList.toggle('active', placeMode);
  
  document.getElementById('toggle-place').textContent = placeMode ? 
    'PLACE MODE: ON (Click to Exit)' : 'PLACE MODE: OFF';
  
  scene.style.cursor = placeMode ? 'move' : 'crosshair';
}

// Secret access: Click "KINGBEAR REALM" 5 times
let clickCount = 0;
document.getElementById('realm-title').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 5) {
    const pass = prompt("Enter admin password to access Place Mode:");
    if (pass === ADMIN_PASSWORD) {
      togglePlaceMode();
      showTooltip(placeMode ? "Place Mode ENABLED" : "Place Mode DISABLED", 2000);
    } else {
      showTooltip("Incorrect password", 1500);
    }
    clickCount = 0;
  }
  setTimeout(() => clickCount = 0, 2000); // reset after 2s
});

// Button controls
document.getElementById('toggle-place').addEventListener('click', togglePlaceMode);

document.getElementById('save-pos').addEventListener('click', () => {
  items.forEach(item => {
    localStorage.setItem('kingbear_' + item.id, JSON.stringify({
      left: item.style.left,
      top: item.style.top
    }));
  });
  showTooltip('✅ Positions Saved', 1500);
});

document.getElementById('reset-pos').addEventListener('click', () => {
  if (confirm('Reset ALL item positions?')) {
    localStorage.clear();
    location.reload();
  }
});

// Tooltip helper
function showTooltip(text, ms = 2000) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}

// Keyboard fallback (only while in place mode)
document.addEventListener('keydown', e => {
  if (placeMode && e.key === 'Escape') {
    togglePlaceMode();
  }
});
</script>
</body>
</html>
