<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>

<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#000;
  --text:#fff;
  --accent:#ff2aa1;
}

html,body{
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:'Rajdhani', sans-serif;
}

/* ================= NAV ================= */

header.nav-bar{
  position:sticky;
  top:0;
  z-index:100;
  padding:18px 24px;
  border-bottom:1px solid rgba(255,255,255,0.05);
  background:linear-gradient(180deg,rgba(0,0,0,.7),transparent);
}

.nav-content{
  max-width:1400px;
  margin:0 auto;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.logo-link img{height:42px;}

#realm-title{
  color:var(--accent);
  cursor:pointer;
  user-select:none;
  font-weight:700;
}

/* ================= SCENE ================= */

#scene{
  position:relative;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  background:url('images/Locations/The King Bear/KINGBEAR_BG.jpg') center/cover no-repeat;
}

/* ================= OBJECTS ================= */

.item,
.character,
.animated{
  position:absolute;
  left:0;
  top:0;
  transform-origin:center;
  user-select:none;
}

.item{ width:120px; z-index:10; cursor:pointer; }
.character{ width:180px; z-index:20; cursor:pointer; }
.male{ z-index:25; }
.animated{ width:120px; z-index:30; pointer-events:none; }

.item img,
.character img,
.animated img{
  width:100%;
  height:auto;
  display:block;
}

/* ================= PLACE MODE ================= */

#place-mode{
  position:fixed;
  top:20px;
  right:20px;
  z-index:999;

  display:none;
  gap:10px;
  padding:12px;
  border-radius:10px;

  background:rgba(0,0,0,0.9);
  border:2px solid var(--accent);
}

#place-mode.active{
  display:flex;
}

#place-mode button{
  padding:8px 12px;
  border:1px solid var(--accent);
  background:rgba(255,255,255,0.1);
  color:white;
  cursor:pointer;
  border-radius:6px;
}

#place-mode button:hover{
  background:var(--accent);
  color:#000;
}

/* ================= TOOLTIP ================= */

.info{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 18px;
  border-radius:999px;
  background:rgba(0,0,0,0.8);
  border:1px solid var(--accent);
  opacity:0;
  transition:0.3s;
}

</style>
</head>

<body>

<header class="nav-bar">
  <div class="nav-content">

    <a class="logo-link" href="#">
      <img src="images/MLKSHK_LOGO_1500_X_500.png">
    </a>

    <div id="realm-title">KINGBEAR REALM</div>

  </div>
</header>

<div id="scene">

  <!-- Items (back) -->
  <div class="item" id="item-bottlecrate" data-name="Bottle Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_BOTTLECRATE.png" alt="">
  </div>
  <div class="item" id="item-speaker" data-name="Speaker">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SPEAKER.png" alt="">
  </div>
  <div class="item" id="item-recordcrate" data-name="Record Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_RECORDCRATE.png" alt="">
  </div>
  <div class="item" id="item-poster" data-name="Reggie Poster">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_REGGIEPOSTER.png" alt="">
  </div>
  <div class="item" id="item-neon" data-name="KingBear Neon">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_NEON.png" alt="">
  </div>
  <div class="item" id="item-flag" data-name="Pirate Flag">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_PIRATEFLAG.png" alt="">
  </div>
  <div class="item" id="item-guitar" data-name="Frankie Guitar">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_FRANKIE_GUITAR.png" alt="">
  </div>

  <!-- Females -->
  <div class="character" id="char-female1" data-name="Female Patron 1">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE1.png" alt="">
  </div>
  <div class="character" id="char-female2" data-name="Female Patron 2">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE2.png" alt="">
  </div>
  <div class="character" id="char-female4" data-name="Female Patron 4">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE4.png" alt="">
  </div>
  <div class="character" id="char-female5" data-name="Female Patron 5">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE5.png" alt="">
  </div>
  <div class="character" id="char-female6" data-name="Female Patron 6">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE6.png" alt="">
  </div>

  <!-- Males (in front) -->
  <div class="character male" id="char-male1" data-name="Male Patron 1">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE1.png" alt="">
  </div>
  <div class="character male" id="char-male2" data-name="Male Patron 2">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE2.png" alt="">
  </div>
  <div class="character male" id="char-male3" data-name="Male Patron 3">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE3.png" alt="">
  </div>
  <div class="character male" id="char-male4" data-name="Male Patron 4">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE4.png" alt="">
  </div>
  <div class="character male" id="char-male5" data-name="Male Patron 5">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE5.png" alt="">
  </div>
  <div class="character male" id="char-male6" data-name="Male Patron 6">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE6.png" alt="">
  </div>
  <div class="character male" id="char-security" data-name="Security">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_SECURITY.png" alt="">
  </div>

</div>

<!-- PLACE MODE UI -->
<div id="place-mode">

  <button id="toggle-place">PLACE MODE: OFF</button>
  <button id="save-pos">Save</button>
  <button id="reset-pos">Reset</button>

</div>

<div class="info" id="tooltip"></div>

<script>

const ADMIN_PASSWORD = "mlkshk";

const scene = document.getElementById("scene");

let placeMode = false;
let selected = null;
let dragging = false;

let offsetX = 0;
let offsetY = 0;

const objects = document.querySelectorAll(".item, .character");


// ================= INIT =================

objects.forEach(el => {

  const saved = localStorage.getItem("kingbear_" + el.id);

  if(saved){

    const data = JSON.parse(saved);

    el.style.left = data.left;
    el.style.top = data.top;
    el.style.transform =
      `scale(${data.scale}) rotate(${data.rotation}deg)`;

  } else {

    el.style.left = (10 + Math.random()*70) + "%";
    el.style.top = (10 + Math.random()*70) + "%";
    el.style.transform = "scale(1) rotate(0deg)";
  }

  el.addEventListener("click", () => {

    if(!placeMode){
      show(el.dataset.name + " activated");
      return;
    }

    selected = el;
    show("Drag / Wheel / Shift+Wheel");

  });

  el.addEventListener("mousedown", e => {

    if(!placeMode) return;

    selected = el;
    dragging = true;

    const rect = el.getBoundingClientRect();

    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;

  });

});


// ================= DRAG =================

document.addEventListener("mousemove", e => {

  if(!placeMode || !dragging || !selected) return;

  const rect = scene.getBoundingClientRect();

  const x = e.clientX - rect.left - offsetX;
  const y = e.clientY - rect.top - offsetY;

  selected.style.left = x + "px";
  selected.style.top = y + "px";

});

document.addEventListener("mouseup", () => {
  dragging = false;
});


// ================= SCALE =================

document.addEventListener("wheel", e => {

  if(!placeMode || !selected) return;

  e.preventDefault();

  let transform = selected.style.transform || "";

  let scale = (transform.match(/scale\(([^)]+)\)/) || [1,1])[1];
  let rot = (transform.match(/rotate\(([^)]+)deg\)/) || [1,0])[1];

  scale = parseFloat(scale);
  rot = parseFloat(rot);

  scale += e.deltaY * -0.002;
  scale = Math.max(0.3, Math.min(3, scale));

  if(e.shiftKey){
    rot += e.deltaY * -0.2;
  }

  selected.style.transform =
    `scale(${scale}) rotate(${rot}deg)`;

}, { passive:false });


// ================= SAVE =================

document.getElementById("save-pos").onclick = () => {

  objects.forEach(el => {

    const t = el.style.transform;

    const s = (t.match(/scale\(([^)]+)\)/) || [1,1])[1];
    const r = (t.match(/rotate\(([^)]+)deg\)/) || [1,0])[1];

    localStorage.setItem("kingbear_" + el.id, JSON.stringify({

      left: el.style.left,
      top: el.style.top,
      scale: s,
      rotation: r

    }));

  });

  show("Saved ✔");

};


// ================= RESET =================

document.getElementById("reset-pos").onclick = () => {
  if(confirm("Reset?")){
    localStorage.clear();
    location.reload();
  }
};


// ================= PLACE MODE =================

document.getElementById("toggle-place").onclick = () => {

  placeMode = !placeMode;

  document.getElementById("place-mode")
    .classList.toggle("active", placeMode);

  document.getElementById("toggle-place")
    .innerText = placeMode
      ? "PLACE MODE: ON"
      : "PLACE MODE: OFF";

};


// ================= ADMIN =================

let clicks = 0;

document.getElementById("realm-title").onclick = () => {

  clicks++;

  if(clicks >= 5){

    const pass = prompt("Password:");

    if(pass === ADMIN_PASSWORD){
      document.getElementById("toggle-place").click();
    } else {
      show("Wrong password");
    }

    clicks = 0;
  }

  setTimeout(() => clicks = 0, 2000);

};


// ================= TOOLTIP =================

function show(text){

  const t = document.getElementById("tooltip");

  t.textContent = text;
  t.style.opacity = 1;

  setTimeout(() => {
    t.style.opacity = 0;
  }, 1500);

}


// ESC
document.addEventListener("keydown", e => {
  if(e.key === "Escape" && placeMode){
    document.getElementById("toggle-place").click();
  }
});

</script>

</body>
</html>
