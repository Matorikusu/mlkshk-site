<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}

header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:crosshair;
}

/* Animated overlays (non-clickable) */
.overlay{
  position:absolute; pointer-events:none;
  background-size:cover; background-position:center;
  opacity:0.75;
  animation: subtleDrift 120s linear infinite;
}

#fog{
  width:100%; height:100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.4));
  animation: fogPulse 25s ease-in-out infinite;
}

#stars{
  width:100%; height:60%;
  background: url('images/Locations/Overlays/stars.png') repeat;
  opacity:0.6;
  animation: starTwinkle 40s linear infinite;
}

/* Clickable Items */
.item{
  position:absolute;
  width:clamp(60px, 8vw, 140px);
  transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
  cursor:pointer;
  filter: drop-shadow(0 0 12px rgba(255,42,161,0.4));
}

.item:hover{
  transform: scale(1.15) rotate(2deg);
  filter: drop-shadow(0 0 25px rgba(255,42,161,0.8));
}

.item img{
  width:100%; height:auto; display:block;
  border-radius:8px;
}

/* Place Mode */
#place-mode{
  position:fixed; top:20px; right:20px; z-index:200;
  background:rgba(0,0,0,0.85); border:1px solid var(--accent);
  padding:10px 16px; border-radius:8px; font-size:14px;
  display:none; gap:12px; align-items:center;
}
#place-mode.active{display:flex;}

.info{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.8); padding:8px 20px; border-radius:9999px;
  font-size:13px; border:1px solid var(--accent); z-index:150;
  white-space:nowrap;
}

/* Mobile fallback */
@media (max-width: 1024px){
  .item{width:clamp(50px, 11vw, 90px);}
  #place-mode{display:none !important;}
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div style="color:var(--accent); font-weight:600;">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">

  <!-- Animated Overlays -->
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <!-- Example Clickable Items -->
  <div class="item" id="item1" data-name="Neon Totem">
    <img src="images/Locations/Overlays/itemone.png" alt="Neon Totem">
  </div>

  <div class="item" id="item2" data-name="Floating Satellite">
    <img src="images/Locations/Overlays/satellite.png" alt="Floating Satellite"> <!-- add your image -->
  </div>

  <div class="item" id="item3" data-name="Bear Cave">
    <img src="images/Locations/Overlays/bearcave.png" alt="Bear Cave">
  </div>

  <!-- Add more items here -->
</div>

<!-- Place Mode Panel -->
<div id="place-mode">
  <button id="toggle-place">PLACE MODE: ON</button>
  <button id="save-pos">Save Positions</button>
  <button id="reset-pos">Reset</button>
</div>

<div class="info" id="tooltip"></div>

<script>
// Scene container
const scene = document.getElementById('scene');

// Make items draggable in place mode
let placeMode = false;
const items = document.querySelectorAll('.item');

items.forEach(item => {
  let pos = JSON.parse(localStorage.getItem('kingbear_' + item.id)) || {left: '20%', top: '40%'};
  item.style.left = pos.left;
  item.style.top = pos.top;

  // Click handler
  item.addEventListener('click', (e) => {
    if (placeMode) return;
    const name = item.dataset.name || 'Unknown';
    showTooltip(`${name} activated`, 2000);
    // Add your custom action here (open modal, play sound, navigate, etc.)
    console.log(`Clicked: ${name}`);
  });

  // Drag in place mode
  makeDraggable(item);
});

function makeDraggable(el) {
  let isDragging = false;
  let offsetX, offsetY;

  el.addEventListener('mousedown', (e) => {
    if (!placeMode) return;
    isDragging = true;
    offsetX = e.clientX - el.getBoundingClientRect().left;
    offsetY = e.clientY - el.getBoundingClientRect().top;
    el.style.transition = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const rect = scene.getBoundingClientRect();
    let x = ((e.clientX - rect.left - offsetX) / rect.width) * 100;
    let y = ((e.clientY - rect.top - offsetY) / rect.height) * 100;

    x = Math.max(0, Math.min(95, x));
    y = Math.max(0, Math.min(85, y));

    el.style.left = x + '%';
    el.style.top = y + '%';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      el.style.transition = 'all 0.3s cubic-bezier(0.23,1,0.32,1)';
    }
  });
}

// Place Mode Controls
document.getElementById('toggle-place').addEventListener('click', () => {
  placeMode = !placeMode;
  const panel = document.getElementById('place-mode');
  panel.classList.toggle('active', placeMode);
  document.getElementById('toggle-place').textContent = placeMode ? 'PLACE MODE: ON' : 'PLACE MODE: OFF';
  scene.style.cursor = placeMode ? 'move' : 'crosshair';
});

document.getElementById('save-pos').addEventListener('click', () => {
  items.forEach(item => {
    const pos = {left: item.style.left, top: item.style.top};
    localStorage.setItem('kingbear_' + item.id, JSON.stringify(pos));
  });
  showTooltip('Positions Saved', 1500);
});

document.getElementById('reset-pos').addEventListener('click', () => {
  if (confirm('Reset all item positions?')) {
    localStorage.clear();
    location.reload();
  }
});

// Tooltip
function showTooltip(text, ms = 2000) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}

// Keyboard shortcut for place mode (P key)
document.addEventListener('keydown', e => {
  if (e.key.toLowerCase() === 'p') {
    document.getElementById('toggle-place').click();
  }
});

// Ambient background animation helpers
const style = document.createElement('style');
style.innerHTML = `
  @keyframes subtleDrift {
    0% { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }
  @keyframes fogPulse {
    0%,100% { opacity: 0.6; }
    50% { opacity: 0.85; }
  }
  @keyframes starTwinkle {
    0% { opacity: 0.5; }
    50% { opacity: 0.8; }
    100% { opacity: 0.5; }
  }
`;
document.head.appendChild(style);

// Mobile notice
if (window.innerWidth < 1024) {
  setTimeout(() => {
    showTooltip('Best experienced on desktop • Rotate device for better view', 4000);
  }, 800);
}
</script>
</body>
</html>
