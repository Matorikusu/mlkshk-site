<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}

header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}

#realm-title{
  color:var(--accent); 
  font-weight:600; 
  cursor:pointer;
  user-select:none;
}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/The King Bear/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:crosshair;
}

/* Overlays */
.overlay{
  position:absolute; pointer-events:none;
}
#fog{
  width:100%; height:100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.45));
  animation: fogPulse 25s ease-in-out infinite;
}
#stars{
  width:100%; height:65%;
  background: url('images/Locations/Overlays/stars.png') repeat;
  opacity:0.55;
  animation: starTwinkle 45s linear infinite;
}

/* Items & Characters */
.item, .character{
  position:absolute;
  width:clamp(65px, 9vw, 170px);
  transition: transform 0.25s ease;
  cursor:pointer;
  filter: drop-shadow(0 0 8px rgba(255,42,161,0.25));   /* Reduced glow */
  transform-origin: center center;
  user-select:none;
}
.item:hover, .character:hover{
  filter: drop-shadow(0 0 16px rgba(255,42,161,0.45));   /* Still subtle hover */
}

.item img, .character img{
  width:100%; height:auto; display:block;
}

/* Slightly different default size for characters */
.character{
  width:clamp(90px, 12vw, 200px);
  animation: gentleFloat 32s linear infinite;
  filter: drop-shadow(0 0 6px rgba(255,42,161,0.15));   /* Even less glow */
}

@keyframes gentleFloat {
  0%   { transform: translate(0, 0) rotate(-1.5deg); }
  50%  { transform: translate(18px, -12px) rotate(1.5deg); }
  100% { transform: translate(0, 0) rotate(-1.5deg); }
}

/* Place Mode */
#place-mode{
  position:fixed; top:20px; right:20px; z-index:200;
  background:rgba(0,0,0,0.9); 
  border:2px solid var(--accent);
  padding:12px 18px; 
  border-radius:8px; 
  font-size:14px;
  display:none; 
  gap:10px; 
  align-items:center;
}
#place-mode.active{display:flex;}

#place-mode button{
  background:rgba(255,255,255,0.1);
  color:white;
  border:1px solid var(--accent);
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
#place-mode button:hover{
  background:var(--accent);
  color:#000;
}

.info{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); padding:8px 22px; border-radius:9999px;
  font-size:13px; border:1px solid var(--accent); z-index:150;
  opacity:0; transition:opacity 0.4s;
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div id="realm-title">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <!-- Characters (now fully editable) -->
  <div class="character" id="char1" data-name="Male Patron 1">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE1.png" alt="">
  </div>
  <div class="character" id="char2" data-name="Male Patron 2">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE2.png" alt="">
  </div>
  <div class="character" id="char3" data-name="Male Patron 3">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE3.png" alt="">
  </div>
  <div class="character" id="char4" data-name="Female Patron 1">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE1.png" alt="">
  </div>
  <div class="character" id="char5" data-name="Female Patron 2">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE2.png" alt="">
  </div>
  <div class="character" id="char6" data-name="Security">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_SECURITY.png" alt="">
  </div>

  <!-- Clickable Items -->
  <div class="item" id="item-bottlecrate" data-name="Bottle Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_BOTTLECRATE.png" alt="">
  </div>
  <div class="item" id="item-speaker" data-name="Speaker">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SPEAKER.png" alt="">
  </div>
  <div class="item" id="item-recordcrate" data-name="Record Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_RECORDCRATE.png" alt="">
  </div>
  <div class="item" id="item-poster" data-name="Reggie Poster">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_REGGIEPOSTER.png" alt="">
  </div>
  <div class="item" id="item-neon" data-name="KingBear Neon">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_NEON.png" alt="">
  </div>
  <div class="item" id="item-flag" data-name="Pirate Flag">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_PIRATEFLAG.png" alt="">
  </div>
  <div class="item" id="item-guitar" data-name="Frankie Guitar">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_FRANKIE_GUITAR.png" alt="">
  </div>
</div>

<div id="place-mode">
  <button id="toggle-place">PLACE MODE: ON</button>
  <button id="save-pos">Save All</button>
  <button id="reset-pos">Reset All</button>
</div>

<div class="info" id="tooltip"></div>

<script>
// ================== CONFIG ==================
const ADMIN_PASSWORD = "mlkshk";
let placeMode = false;
let selectedItem = null;
let isDragging = false;
let offsetX = 0, offsetY = 0;

const scene = document.getElementById('scene');

// Initialize ALL editable elements (items + characters)
document.querySelectorAll('.item, .character').forEach(el => {
  const saved = localStorage.getItem('kingbear_' + el.id);
  if (saved) {
    const data = JSON.parse(saved);
    el.style.left = data.left || '20%';
    el.style.top = data.top || '40%';
    el.style.transform = data.transform || 'scale(1) rotate(0deg)';
  } else {
    el.style.left = '25%';
    el.style.top = '50%';
    el.style.transform = 'scale(1) rotate(0deg)';
  }

  el.addEventListener('click', () => {
    if (!placeMode) {
      showTooltip(`${el.dataset.name || 'Character'} activated`, 1600);
    } else {
      selectedItem = el;
      showTooltip(`Selected → Drag=Move | Wheel=Scale | Shift+Drag=Rotate`, 2200);
    }
  });

  makeDraggable(el);
});

function makeDraggable(el) {
  el.addEventListener('mousedown', e => {
    if (!placeMode) return;
    selectedItem = el;
    isDragging = true;
    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    el.style.transition = 'none';
  });
}

// Global dragging
document.addEventListener('mousemove', e => {
  if (!placeMode || !selectedItem || !isDragging) return;
  const rect = scene.getBoundingClientRect();
  let x = ((e.clientX - rect.left - offsetX) / rect.width) * 100;
  let y = ((e.clientY - rect.top - offsetY) / rect.height) * 100;
  x = Math.max(1, Math.min(93, x));
  y = Math.max(1, Math.min(87, y));

  selectedItem.style.left = x + '%';
  selectedItem.style.top = y + '%';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  if (selectedItem) selectedItem.style.transition = 'transform 0.25s ease';
});

// Wheel = Scale | Shift + Wheel = Rotate
document.addEventListener('wheel', e => {
  if (!placeMode || !selectedItem) return;
  e.preventDefault();

  let scale = getCurrentScale(selectedItem);
  let rotation = getCurrentRotation(selectedItem);

  scale += e.deltaY * -0.0018;
  scale = Math.max(0.35, Math.min(2.8, scale));

  if (e.shiftKey) rotation += e.deltaY * -0.15;

  selectedItem.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
}, {passive: false});

function getCurrentScale(el) {
  const m = el.style.transform.match(/scale\(([^)]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}
function getCurrentRotation(el) {
  const m = el.style.transform.match(/rotate\(([^)]+)deg\)/);
  return m ? parseFloat(m[1]) : 0;
}

// Place Mode Controls
function togglePlaceMode() {
  placeMode = !placeMode;
  document.getElementById('place-mode').classList.toggle('active', placeMode);
  document.getElementById('toggle-place').textContent = placeMode ? 
    'PLACE MODE: ON (ESC to exit)' : 'PLACE MODE: OFF';
  scene.style.cursor = placeMode ? 'move' : 'crosshair';
}

// Secret access
let clickCount = 0;
document.getElementById('realm-title').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 5) {
    const pass = prompt("Enter admin password:");
    if (pass === ADMIN_PASSWORD) togglePlaceMode();
    else showTooltip("Incorrect password", 1200);
    clickCount = 0;
  }
  setTimeout(() => clickCount = 0, 2000);
});

document.getElementById('toggle-place').addEventListener('click', togglePlaceMode);

document.getElementById('save-pos').addEventListener('click', () => {
  document.querySelectorAll('.item, .character').forEach(el => {
    localStorage.setItem('kingbear_' + el.id, JSON.stringify({
      left: el.style.left,
      top: el.style.top,
      transform: el.style.transform
    }));
  });
  showTooltip('✅ All positions saved!', 1600);
});

document.getElementById('reset-pos').addEventListener('click', () => {
  if (confirm('Reset everything?')) {
    localStorage.clear();
    location.reload();
  }
});

function showTooltip(text, ms = 2000) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && placeMode) togglePlaceMode();
});
</script>
</body>
</html>
