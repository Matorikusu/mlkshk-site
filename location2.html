<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}

header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}

#realm-title{
  color:var(--accent); 
  font-weight:600; 
  cursor:pointer;
  user-select:none;
}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/The King Bear/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:crosshair;
}

/* Overlays */
.overlay{
  position:absolute; pointer-events:none;
}
#fog{
  width:100%; height:100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.45));
  animation: fogPulse 25s ease-in-out infinite;
}
#stars{
  width:100%; height:65%;
  background: url('images/Locations/Overlays/stars.png') repeat;
  opacity:0.55;
  animation: starTwinkle 45s linear infinite;
}

/* Clickable Items */
.item{
  position:absolute;
  width:clamp(65px, 9vw, 170px);
  transition: transform 0.2s ease;
  cursor:pointer;
  filter: drop-shadow(0 0 15px rgba(255,42,161,0.5));
  transform-origin: center center;
  user-select:none;
}
.item:hover{
  filter: drop-shadow(0 0 30px rgba(255,42,161,0.9));
}
.item img{
  width:100%; height:auto; display:block;
}

/* Background Characters (non-clickable) */
.character{
  position:absolute;
  width:clamp(80px, 11vw, 190px);
  opacity:0.9;
  transition: all 8s ease-in-out;
  filter: drop-shadow(0 0 12px rgba(255,42,161,0.3));
  pointer-events:none;           /* Not clickable */
  animation: gentleFloat 25s linear infinite;
}
.character img{
  width:100%; height:auto; display:block;
}

/* Place Mode */
#place-mode{
  position:fixed; top:20px; right:20px; z-index:200;
  background:rgba(0,0,0,0.9); 
  border:2px solid var(--accent);
  padding:12px 18px; 
  border-radius:8px; 
  font-size:14px;
  display:none; 
  gap:10px; 
  align-items:center;
  box-shadow:0 0 20px rgba(255,42,161,0.3);
}
#place-mode.active{display:flex;}

#place-mode button{
  background:rgba(255,255,255,0.1);
  color:white;
  border:1px solid var(--accent);
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
#place-mode button:hover{
  background:var(--accent);
  color:#000;
}

.info{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); padding:8px 22px; border-radius:9999px;
  font-size:13px; border:1px solid var(--accent); z-index:150;
  opacity:0; transition:opacity 0.4s;
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div id="realm-title">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <!-- === BACKGROUND CHARACTERS (non-clickable, random) === -->
  <div class="character" id="char1"><img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE1.png" alt=""></div>
  <div class="character" id="char2"><img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE2.png" alt=""></div>
  <div class="character" id="char3"><img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE3.png" alt=""></div>
  <div class="character" id="char4"><img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE1.png" alt=""></div>
  <div class="character" id="char5"><img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE2.png" alt=""></div>
  <div class="character" id="char6"><img src="images/Locations/The King Bear/Characters/KB_CHARACTER_SECURITY.png" alt=""></div>

  <!-- === CLICKABLE ITEMS === -->
  <div class="item" id="item-bottlecrate" data-name="Bottle Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_BOTTLECRATE.png" alt="">
  </div>
  <div class="item" id="item-speaker" data-name="Speaker">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SPEAKER.png" alt="">
  </div>
  <div class="item" id="item-recordcrate" data-name="Record Crate">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_RECORDCRATE.png" alt="">
  </div>
  <div class="item" id="item-poster" data-name="Reggie Poster">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_REGGIEPOSTER.png" alt="">
  </div>
  <div class="item" id="item-sofa" data-name="Sofa">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SOFA.png" alt="">
  </div>
  <div class="item" id="item-neon" data-name="KingBear Neon">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_NEON.png" alt="">
  </div>
  <div class="item" id="item-flag" data-name="Pirate Flag">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_PIRATEFLAG.png" alt="">
  </div>
  <div class="item" id="item-guitar" data-name="Frankie Guitar">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_FRANKIE_GUITAR.png" alt="">
  </div>

  <!-- === MOCK ANIMATED GIFS (for movement) === -->
  <div class="item" id="item-gif1" data-name="Smoke">
    <img src="images/Locations/The King Bear/Animated/smoke.gif" alt="Smoke"> <!-- replace with real gif -->
  </div>
  <div class="item" id="item-gif2" data-name="Hologram">
    <img src="images/Locations/The King Bear/Animated/hologram.gif" alt="Hologram">
  </div>
  <div class="item" id="item-gif3" data-name="Neon Flicker">
    <img src="images/Locations/The King Bear/Animated/neonflicker.gif" alt="Neon">
  </div>
</div>

<div id="place-mode">
  <button id="toggle-place">PLACE MODE: ON</button>
  <button id="save-pos">Save All</button>
  <button id="reset-pos">Reset All</button>
</div>

<div class="info" id="tooltip"></div>

<script>
// ================== CONFIG ==================
const ADMIN_PASSWORD = "mlkshk";
let placeMode = false;
let selectedItem = null;

const scene = document.getElementById('scene');

// Randomize & animate background characters
document.querySelectorAll('.character').forEach((char, i) => {
  const left = 10 + Math.random() * 75;
  const top = 15 + Math.random() * 60;
  char.style.left = left + '%';
  char.style.top = top + '%';
  char.style.animationDelay = `-${i * 4}s`;   // stagger animation
});

// Initialize items (clickable)
document.querySelectorAll('.item').forEach(item => {
  const saved = localStorage.getItem('kingbear_' + item.id);
  if (saved) {
    const data = JSON.parse(saved);
    item.style.left = data.left || '20%';
    item.style.top = data.top || '40%';
    item.style.transform = data.transform || 'scale(1) rotate(0deg)';
  } else {
    item.style.left = '20%';
    item.style.top = '40%';
    item.style.transform = 'scale(1) rotate(0deg)';
  }

  item.addEventListener('click', () => {
    if (!placeMode) {
      showTooltip(`${item.dataset.name} activated`, 1600);
    } else {
      selectedItem = item;
      showTooltip(`Selected → Scroll=Scale | Shift+Drag=Rotate`, 2200);
    }
  });

  makeDraggable(item);
});

function makeDraggable(el) {
  let isDragging = false;
  let offsetX, offsetY;

  el.addEventListener('mousedown', e => {
    if (!placeMode) return;
    selectedItem = el;

    if (e.shiftKey) {
      // Rotation mode
      const startRot = getCurrentRotation(el);
      const startX = e.clientX;
      
      const onMove = (moveEvent) => {
        const delta = (moveEvent.clientX - startX) * 0.8;
        applyTransform(el, getCurrentScale(el), startRot + delta);
      };
      
      document.addEventListener('mousemove', onMove, {once: false});
      document.addEventListener('mouseup', () => {
        document.removeEventListener('mousemove', onMove);
      }, {once: true});
      
    } else {
      isDragging = true;
      const rect = el.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;
      el.style.transition = 'none';
    }
  });

  // Scale with mouse wheel
  el.addEventListener('wheel', e => {
    if (!placeMode || selectedItem !== el) return;
    e.preventDefault();
    let scale = getCurrentScale(el);
    scale += e.deltaY * -0.0015;
    scale = Math.max(0.3, Math.min(2.8, scale));
    applyTransform(el, scale, getCurrentRotation(el));
  }, {passive: false});
}

// Helper functions
function getCurrentScale(el) {
  const m = el.style.transform.match(/scale\(([^)]+)\)/);
  return m ? parseFloat(m[1]) : 1;
}
function getCurrentRotation(el) {
  const m = el.style.transform.match(/rotate\(([^)]+)deg\)/);
  return m ? parseFloat(m[1]) : 0;
}
function applyTransform(el, scale, rotation) {
  el.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
}

// Global mouse move (dragging)
document.addEventListener('mousemove', e => {
  if (!placeMode || !selectedItem || !isDragging) return;
  const rect = scene.getBoundingClientRect();
  let x = ((e.clientX - rect.left - offsetX) / rect.width) * 100;
  let y = ((e.clientY - rect.top - offsetY) / rect.height) * 100;
  x = Math.max(1, Math.min(93, x));
  y = Math.max(1, Math.min(87, y));

  selectedItem.style.left = x + '%';
  selectedItem.style.top = y + '%';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  if (selectedItem) selectedItem.style.transition = 'transform 0.25s ease';
});

// =============== PLACE MODE ===============
function togglePlaceMode() {
  placeMode = !placeMode;
  document.getElementById('place-mode').classList.toggle('active', placeMode);
  document.getElementById('toggle-place').textContent = placeMode ? 
    'PLACE MODE: ON (ESC to exit)' : 'PLACE MODE: OFF';
  scene.style.cursor = placeMode ? 'move' : 'crosshair';
}

// Secret access
let clickCount = 0;
document.getElementById('realm-title').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 5) {
    const pass = prompt("Enter admin password:");
    if (pass === ADMIN_PASSWORD) togglePlaceMode();
    else showTooltip("Incorrect password", 1500);
    clickCount = 0;
  }
  setTimeout(() => clickCount = 0, 2500);
});

document.getElementById('toggle-place').addEventListener('click', togglePlaceMode);

document.getElementById('save-pos').addEventListener('click', () => {
  document.querySelectorAll('.item').forEach(item => {
    localStorage.setItem('kingbear_' + item.id, JSON.stringify({
      left: item.style.left,
      top: item.style.top,
      transform: item.style.transform
    }));
  });
  showTooltip('✅ Everything Saved', 1600);
});

document.getElementById('reset-pos').addEventListener('click', () => {
  if (confirm('Reset all positions?')) {
    localStorage.clear();
    location.reload();
  }
});

function showTooltip(text, ms = 2000) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && placeMode) togglePlaceMode();
});
</script>
</body>
</html>
