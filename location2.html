<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}

header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}

#realm-title{
  color:var(--accent); 
  font-weight:600; 
  cursor:pointer;
  user-select:none;
}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/The King Bear/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:crosshair;
}

/* Overlays */
.overlay{
  position:absolute; pointer-events:none;
}
#fog{
  width:100%; height:100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.45));
  animation: fogPulse 25s ease-in-out infinite;
}
#stars{
  width:100%; height:65%;
  background: url('images/Locations/Overlays/stars.png') repeat;
  opacity:0.55;
  animation: starTwinkle 45s linear infinite;
}

/* Items - Behind characters */
.item{
  position:absolute;
  width:clamp(65px, 9vw, 170px);
  transition: transform 0.2s ease;
  cursor:pointer;
  filter: none;
  transform-origin: center center;
  z-index: 10;
}
.item:hover{
  filter: drop-shadow(0 0 20px rgba(255,42,161,0.6));
}

/* Characters */
.character{
  position:absolute;
  width:clamp(90px, 12vw, 200px);
  transition: transform 0.2s ease;
  cursor:pointer;
  filter: none;
  transform-origin: center center;
  z-index: 20;
}
.male { z-index: 25; }

/* Animated GIFs on top */
.animated{
  position:absolute;
  z-index: 30;
  pointer-events:none;
  width:clamp(60px, 8vw, 140px);
}

.item img, .character img, .animated img{
  width:100%; height:auto; display:block;
}

/* Place Mode */
#place-mode{
  position:fixed; top:20px; right:20px; z-index:200;
  background:rgba(0,0,0,0.9); 
  border:2px solid var(--accent);
  padding:12px 18px; 
  border-radius:8px; 
  font-size:14px;
  display:none; 
  gap:10px; 
  align-items:center;
}
#place-mode.active{display:flex;}

#place-mode button{
  background:rgba(255,255,255,0.1);
  color:white;
  border:1px solid var(--accent);
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
#place-mode button:hover{
  background:var(--accent);
  color:#000;
}

.info{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); padding:8px 22px; border-radius:9999px;
  font-size:13px; border:1px solid var(--accent); z-index:150;
  opacity:0; transition:opacity 0.4s;
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div id="realm-title">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <!-- Items (locked) -->
  <div class="item" id="item-bottlecrate" data-name="Bottle Crate" style="left: 12%; top: 55%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_BOTTLECRATE.png" alt="">
  </div>
  <div class="item" id="item-speaker" data-name="Speaker" style="left: 28%; top: 48%; transform: scale(1.1) rotate(-3deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_SPEAKER.png" alt="">
  </div>
  <div class="item" id="item-recordcrate" data-name="Record Crate" style="left: 45%; top: 62%; transform: scale(0.95) rotate(2deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_RECORDCRATE.png" alt="">
  </div>
  <div class="item" id="item-poster" data-name="Reggie Poster" style="left: 68%; top: 38%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_REGGIEPOSTER.png" alt="">
  </div>
  <div class="item" id="item-neon" data-name="KingBear Neon" style="left: 82%; top: 22%; transform: scale(1.2) rotate(5deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_NEON.png" alt="">
  </div>
  <div class="item" id="item-flag" data-name="Pirate Flag" style="left: 8%; top: 28%; transform: scale(1) rotate(-8deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_PIRATEFLAG.png" alt="">
  </div>
  <div class="item" id="item-guitar" data-name="Frankie Guitar" style="left: 75%; top: 65%; transform: scale(1.05) rotate(12deg);">
    <img src="images/Locations/The King Bear/Kingbear Items/KINGBEAR_FRANKIE_GUITAR.png" alt="">
  </div>

  <!-- Females -->
  <div class="character" id="char-female1" data-name="Female Patron 1" style="left: 35%; top: 45%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE1.png" alt="">
  </div>
  <div class="character" id="char-female2" data-name="Female Patron 2" style="left: 52%; top: 52%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE2.png" alt="">
  </div>
  <div class="character" id="char-female4" data-name="Female Patron 4" style="left: 22%; top: 58%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE4.png" alt="">
  </div>
  <div class="character" id="char-female5" data-name="Female Patron 5" style="left: 65%; top: 48%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE5.png" alt="">
  </div>
  <div class="character" id="char-female6" data-name="Female Patron 6" style="left: 78%; top: 55%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_FEMALE6.png" alt="">
  </div>

  <!-- Males (in front) -->
  <div class="character male" id="char-male1" data-name="Male Patron 1" style="left: 18%; top: 42%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE1.png" alt="">
  </div>
  <div class="character male" id="char-male2" data-name="Male Patron 2" style="left: 40%; top: 38%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE2.png" alt="">
  </div>
  <div class="character male" id="char-male3" data-name="Male Patron 3" style="left: 55%; top: 42%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE3.png" alt="">
  </div>
  <div class="character male" id="char-male4" data-name="Male Patron 4" style="left: 28%; top: 52%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE4.png" alt="">
  </div>
  <div class="character male" id="char-male5" data-name="Male Patron 5" style="left: 70%; top: 45%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE5.png" alt="">
  </div>
  <div class="character male" id="char-male6" data-name="Male Patron 6" style="left: 82%; top: 38%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_MALE6.png" alt="">
  </div>
  <div class="character male" id="char-security" data-name="Security" style="left: 48%; top: 28%; transform: scale(1) rotate(0deg);">
    <img src="images/Locations/The King Bear/Characters/KB_CHARACTER_SECURITY.png" alt="">
  </div>

  <!-- Animated GIFs (on top & editable) -->
  <div class="animated" id="candle1" data-name="Candle 1">
    <img src="images/Locations/The King Bear/Animated/candle1.gif" alt="">
  </div>
  <div class="animated" id="candle2" data-name="Candle 2">
    <img src="images/Locations/The King Bear/Animated/candle2.gif" alt="">
  </div>
  <div class="animated" id="light" data-name="Light">
    <img src="images/Locations/The King Bear/Animated/light.gif" alt="">
  </div>
</div>

<!-- Background Music -->
<audio id="bg-audio" loop preload="auto">
  <source src="Audio/Locations/The King Bear/2. Large Amounts v2.mp3" type="audio/mpeg">
</audio>

<div id="place-mode">
  <button id="toggle-place">PLACE MODE: ON</button>
  <button id="save-pos">Save GIF Positions</button>
  <button id="reset-pos">Reset GIFs</button>
</div>

<div class="info" id="tooltip"></div>

<script>
// Stronger Autoplay Attempt
const audio = document.getElementById('bg-audio');
audio.volume = 0.45;

function tryPlayAudio() {
  audio.play().catch(() => {
    console.log("Autoplay blocked - waiting for user interaction");
  });
}

// Try immediately and also on any user interaction
tryPlayAudio();
document.addEventListener('touchstart', tryPlayAudio, {once: true});
document.addEventListener('click', tryPlayAudio, {once: true});

// Place Mode Logic (only for GIFs now)
const ADMIN_PASSWORD = "mlkshk";
let placeMode = false;
let selectedItem = null;
let isDragging = false;
let offsetX = 0, offsetY = 0;

const scene = document.getElementById('scene');

// Only make animated GIFs editable
document.querySelectorAll('.animated').forEach(el => {
  const saved = localStorage.getItem('kingbear_' + el.id);
  if (saved) {
    const data = JSON.parse(saved);
    el.style.left = data.left;
    el.style.top = data.top;
    el.style.transform = data.transform || 'scale(1) rotate(0deg)';
  } else {
    el.style.left = '30%';
    el.style.top = '40%';
    el.style.transform = 'scale(1) rotate(0deg)';
  }

  el.addEventListener('click', () => {
    if (placeMode) {
      selectedItem = el;
      showTooltip(`Selected ${el.dataset.name} → Drag / Scroll / Shift+Scroll`, 1800);
    }
  });

  makeDraggable(el);
});

function makeDraggable(el) {
  el.addEventListener('mousedown', e => {
    if (!placeMode) return;
    selectedItem = el;
    isDragging = true;
    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    el.style.transition = 'none';
  });
}

document.addEventListener('mousemove', e => {
  if (!placeMode || !selectedItem || !isDragging) return;
  const rect = scene.getBoundingClientRect();
  let x = ((e.clientX - rect.left - offsetX) / rect.width) * 100;
  let y = ((e.clientY - rect.top - offsetY) / rect.height) * 100;
  x = Math.max(1, Math.min(93, x));
  y = Math.max(1, Math.min(87, y));

  selectedItem.style.left = x + '%';
  selectedItem.style.top = y + '%';
});

document.addEventListener('mouseup', () => {
  isDragging = false;
  if (selectedItem) selectedItem.style.transition = 'transform 0.2s ease';
});

document.addEventListener('wheel', e => {
  if (!placeMode || !selectedItem) return;
  e.preventDefault();

  let scale = getCurrentScale(selectedItem);
  let rotation = getCurrentRotation(selectedItem);

  scale += (e.deltaY * -0.002);
  scale = Math.max(0.3, Math.min(3, scale));

  if (e.shiftKey) rotation += (e.deltaY * -0.2);

  selectedItem.style.transform = `scale(${scale}) rotate(${rotation}deg)`;
}, {passive: false});

function getCurrentScale(el) {
  const match = el.style.transform.match(/scale\(([^)]+)\)/);
  return match ? parseFloat(match[1]) : 1;
}
function getCurrentRotation(el) {
  const match = el.style.transform.match(/rotate\(([^)]+)deg\)/);
  return match ? parseFloat(match[1]) : 0;
}

// Place Mode Controls
function togglePlaceMode() {
  placeMode = !placeMode;
  document.getElementById('place-mode').classList.toggle('active', placeMode);
  document.getElementById('toggle-place').textContent = placeMode ? 
    'PLACE MODE: ON (ESC to exit)' : 'PLACE MODE: OFF';
  scene.style.cursor = placeMode ? 'move' : 'crosshair';
}

let clickCount = 0;
document.getElementById('realm-title').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 5) {
    const pass = prompt("Enter admin password:");
    if (pass === ADMIN_PASSWORD) togglePlaceMode();
    else showTooltip("Incorrect password", 1200);
    clickCount = 0;
  }
  setTimeout(() => clickCount = 0, 2000);
});

document.getElementById('toggle-place').addEventListener('click', togglePlaceMode);

document.getElementById('save-pos').addEventListener('click', () => {
  document.querySelectorAll('.animated').forEach(el => {
    localStorage.setItem('kingbear_' + el.id, JSON.stringify({
      left: el.style.left,
      top: el.style.top,
      transform: el.style.transform
    }));
  });
  showTooltip('✅ GIF positions saved!', 1600);
});

document.getElementById('reset-pos').addEventListener('click', () => {
  if (confirm('Reset only the GIFs?')) {
    document.querySelectorAll('.animated').forEach(el => localStorage.removeItem('kingbear_' + el.id));
    location.reload();
  }
});

function showTooltip(text, ms = 2000) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && placeMode) togglePlaceMode();
});
</script>
</body>
</html>
