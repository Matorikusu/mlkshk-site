<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>KingBear • MLKSHK Digital</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
}

html,body{
  margin:0; padding:0; height:100%; overflow:hidden;
  font-family:'Rajdhani', system-ui, sans-serif;
  background:var(--bg); color:var(--text);
}

header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.6),transparent);
  position:sticky; top:0; z-index:100;
}
.nav-content{
  display:flex; align-items:center; justify-content:space-between;
  max-width:1400px; margin:0 auto;
}
.logo-link img{height:42px;}

#realm-title{
  color:var(--accent); 
  font-weight:600; 
  cursor:pointer;
  user-select:none;
}

#scene{
  position:relative;
  width:100vw; height:100vh;
  background: url('images/Locations/KINGBEAR_BG.jpg') center/cover no-repeat;
  overflow:hidden;
  cursor:crosshair;
}

/* Animated Overlays */
.overlay{
  position:absolute; pointer-events:none;
}

#fog{
  width:100%; height:100%;
  background: linear-gradient(transparent, rgba(0,0,0,0.45));
  animation: fogPulse 25s ease-in-out infinite;
}

#stars{
  width:100%; height:65%;
  background: url('images/Locations/Overlays/stars.png') repeat;
  opacity:0.55;
  animation: starTwinkle 45s linear infinite;
}

/* Clickable Items */
.item{
  position:absolute;
  width:clamp(65px, 9vw, 160px);
  transition: all 0.3s cubic-bezier(0.23,1,0.32,1);
  cursor:pointer;
  filter: drop-shadow(0 0 15px rgba(255,42,161,0.5));
  user-select:none;
}

.item:hover{
  transform: scale(1.12) rotate(3deg);
  filter: drop-shadow(0 0 30px rgba(255,42,161,0.9));
}

.item img{
  width:100%; height:auto; display:block;
}

/* Place Mode */
#place-mode{
  position:fixed; top:20px; right:20px; z-index:200;
  background:rgba(0,0,0,0.9); 
  border:2px solid var(--accent);
  padding:12px 18px; 
  border-radius:8px; 
  font-size:14px;
  display:none; 
  gap:10px; 
  align-items:center;
  box-shadow:0 0 20px rgba(255,42,161,0.3);
}
#place-mode.active{display:flex;}

#place-mode button{
  background:rgba(255,255,255,0.1);
  color:white;
  border:1px solid var(--accent);
  padding:8px 14px;
  border-radius:6px;
  cursor:pointer;
}
#place-mode button:hover{
  background:var(--accent);
  color:#000;
}

.info{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  background:rgba(0,0,0,0.85); padding:8px 22px; border-radius:9999px;
  font-size:13px; border:1px solid var(--accent); z-index:150;
  opacity:0; transition:opacity 0.4s;
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div id="realm-title">KINGBEAR REALM</div>
  </div>
</header>

<div id="scene">
  <!-- Overlays -->
  <div id="stars" class="overlay"></div>
  <div id="fog" class="overlay"></div>

  <!-- === YOUR ITEMS === -->
  <div class="item" id="item-crate" data-name="Crate">
    <img src="images/Locations/Items/CRATE.png" alt="Crate">
  </div>

  <div class="item" id="item-speaker" data-name="Speaker Stack">
    <img src="images/Locations/Items/SPEAKERSTACK.png" alt="Speaker Stack">
  </div>

  <div class="item" id="item-flag" data-name="Pirate Flag">
    <img src="images/Locations/Items/PIRATEFLAG.png" alt="Pirate Flag">
  </div>

  <div class="item" id="item-guitar" data-name="Frankie's Guitar">
    <img src="images/Locations/Items/FRANKIEGUITAR.png" alt="Frankie's Guitar">
  </div>

  <div class="item" id="item-whiskey" data-name="Blue Bear Whiskey">
    <img src="images/Locations/Items/BLUEBEARWHISKEY.png" alt="Blue Bear Whiskey">
  </div>

  <!-- Suggested Extra Items (add your images) -->
  <div class="item" id="item-exit" data-name="Exit Sign">
    <img src="images/Locations/Items/EXITSIGN.png" alt="Exit Sign"> <!-- add this file -->
  </div>

  <div class="item" id="item-light" data-name="Hanging Light">
    <img src="images/Locations/Items/LIGHTFIXTURE.png" alt="Light Fixture"> <!-- add this file -->
  </div>

  <div class="item" id="item-neon" data-name="King Bear Neon">
    <img src="images/Locations/Items/KINGBEARNEON.png" alt="King Bear Neon"> <!-- add this file -->
  </div>
</div>

<!-- Place Mode Panel -->
<div id="place-mode">
  <button id="toggle-place">PLACE MODE: ON</button>
  <button id="save-pos">Save Positions</button>
  <button id="reset-pos">Reset All</button>
</div>

<div class="info" id="tooltip"></div>

<script>
// ================== CONFIG ==================
const ADMIN_PASSWORD = "mlkshk";   // ← Change this
let placeMode = false;
const scene = document.getElementById('scene');
const items = document.querySelectorAll('.item');

// Initialize saved positions
items.forEach(item => {
  const saved = localStorage.getItem('kingbear_' + item.id);
  if (saved) {
    const pos = JSON.parse(saved);
    item.style.left = pos.left;
    item.style.top = pos.top;
  } else {
    // Default starting positions
    item.style.left = '15%';
    item.style.top = '45%';
  }

  item.addEventListener('click', () => {
    if (placeMode) return;
    showTooltip(`${item.dataset.name} activated`, 1800);
  });

  makeDraggable(item);
});

function makeDraggable(el) {
  let isDragging = false;
  let offsetX, offsetY;

  el.addEventListener('mousedown', e => {
    if (!placeMode) return;
    isDragging = true;
    const rect = el.getBoundingClientRect();
    offsetX = e.clientX - rect.left;
    offsetY = e.clientY - rect.top;
    el.style.transition = 'none';
  });

  document.addEventListener('mousemove', e => {
    if (!isDragging) return;
    const sceneRect = scene.getBoundingClientRect();
    let x = ((e.clientX - sceneRect.left - offsetX) / sceneRect.width) * 100;
    let y = ((e.clientY - sceneRect.top - offsetY) / sceneRect.height) * 100;

    x = Math.max(1, Math.min(93, x));
    y = Math.max(1, Math.min(87, y));

    el.style.left = x + '%';
    el.style.top = y + '%';
  });

  document.addEventListener('mouseup', () => {
    if (isDragging) {
      isDragging = false;
      el.style.transition = 'all 0.3s cubic-bezier(0.23,1,0.32,1)';
    }
  });
}

// =============== PLACE MODE ===============
function togglePlaceMode() {
  placeMode = !placeMode;
  const panel = document.getElementById('place-mode');
  panel.classList.toggle('active', placeMode);
  document.getElementById('toggle-place').textContent = placeMode ? 
    'PLACE MODE: ON (Click to Exit)' : 'PLACE MODE: OFF';
  scene.style.cursor = placeMode ? 'move' : 'crosshair';
}

// Secret access
let clickCount = 0;
document.getElementById('realm-title').addEventListener('click', () => {
  clickCount++;
  if (clickCount >= 5) {
    const pass = prompt("Enter admin password:");
    if (pass === ADMIN_PASSWORD) {
      togglePlaceMode();
      showTooltip(placeMode ? "🛠️ Place Mode ENABLED" : "Place Mode DISABLED", 1800);
    } else {
      showTooltip("❌ Wrong password", 1500);
    }
    clickCount = 0;
  }
  setTimeout(() => clickCount = 0, 2500);
});

document.getElementById('toggle-place').addEventListener('click', togglePlaceMode);

document.getElementById('save-pos').addEventListener('click', () => {
  items.forEach(item => {
    localStorage.setItem('kingbear_' + item.id, JSON.stringify({
      left: item.style.left,
      top: item.style.top
    }));
  });
  showTooltip('✅ Positions Saved', 1400);
});

document.getElementById('reset-pos').addEventListener('click', () => {
  if (confirm('Reset all positions to default?')) {
    localStorage.clear();
    location.reload();
  }
});

function showTooltip(text, ms = 2000) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.opacity = 1;
  setTimeout(() => tip.style.opacity = 0, ms);
}

// ESC to exit place mode
document.addEventListener('keydown', e => {
  if (placeMode && e.key === 'Escape') togglePlaceMode();
});
</script>
</body>
</html>
