<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK — The Underground</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
  --dropdown-bg:#000;
}
html,body{
  margin:0;
  height:100%;
  font-family:'Rajdhani',system-ui,-apple-system,'Helvetica Neue',Arial;
  background:var(--bg);
  color:var(--text);
  overflow: hidden;
}

/* NAV BAR - unchanged */
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.2),transparent);
  position:sticky;
  top:0;
  z-index:30;
}
.nav-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  margin:0 auto;
}
.logo-link img{height:42px;display:block}
.nav-dropdown{position:relative}
.nav-toggle{
  background:none;
  border:0;
  color:var(--muted);
  font-weight:600;
  cursor:pointer;
  padding:6px 10px;
}
.dropdown-menu{
  display:none;
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  background:var(--dropdown-bg);
  border:1px solid var(--accent);
  border-radius:8px;
  min-width:200px;
  z-index:100;
  overflow:hidden;
}
.dropdown-menu a{
  display:block;
  padding:10px 14px;
  color:#fff;
  text-decoration:none;
}
.dropdown-menu a:hover {
  background:var(--accent);
  color:#000;
}

/* IMMERSIVE SCENE */
.scene-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

#scene-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-image: url('images/Locations/underground-club.jpg');
  filter: brightness(0.75) contrast(1.15) saturate(1.3);
  z-index: 1;
  transition: filter 0.4s ease;
}

/* Hotspots */
.hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 2;
  transition: all 0.35s ease;
  user-select: none;
}
.hotspot:hover {
  transform: scale(1.12);
  filter: brightness(1.4) drop-shadow(0 0 30px var(--accent));
}

/* Pulsing neon effect for club lights */
.neon {
  animation: neon-flicker 1.2s infinite alternate;
}

@keyframes neon-flicker {
  0%   { filter: brightness(1.3) drop-shadow(0 0 20px #ff2aa1); }
  100% { filter: brightness(1.8) drop-shadow(0 0 35px #ff2aa1); }
}

/* HUD */
.hud {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.55);
  padding: 8px 28px;
  border-radius: 30px;
  font-size: 15px;
  letter-spacing: 1px;
  border: 1px solid rgba(255,42,161,0.4);
  z-index: 10;
  pointer-events: none;
  text-shadow: 0 0 10px var(--accent);
}

/* FOOTER */
footer{
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 12px 20px;
  text-align:center;
  font-size:12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  z-index: 20;
}

/* FLOATING PLAYER - unchanged */
#floating-player{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  height:72px;
  background:url('Player/PLAYER.png') center/cover no-repeat;
  border-radius:20px;
  display:flex;
  align-items:center;
  padding:0 18px;
  box-shadow:0 12px 40px rgba(0,0,0,.85);
  z-index:999;
}
.player-meta{ flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center; padding:0 12px; }
.player-title{ font-weight:700; font-size:14px; }
.player-artist{ font-size:12px; color:var(--muted); }
.player-status{ font-size:11px; color:var(--muted); margin-top:4px; }
.player-controls img{ width:42px; height:42px; cursor:pointer; }

@media (max-width: 768px) {
  .scene-container { height: 100dvh; }
  #floating-player { width: 90%; height: 60px; padding: 0 12px; }
  .player-title { font-size: 12px; }
  .player-artist, .player-status { font-size: 10px; }
  .player-controls img { width: 36px; height: 36px; }
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<div class="scene-container">

  <!-- Background -->
  <div id="scene-bg"></div>

  <!-- Hotspots - Club Vibes -->
  
  <!-- DJ Booth -->
  <img src="images/Locations/Overlays/dj-booth.png" 
       class="hotspot neon" 
       style="top: 32%; left: 48%; width: 28%;"
       alt="DJ Booth"
       data-action="dj">

  <!-- Bar Counter -->
  <img src="images/Locations/Overlays/bar-counter.png" 
       class="hotspot" 
       style="bottom: 18%; left: 8%; width: 26%;"
       alt="Bar"
       data-action="bar">

  <!-- Speaker Wall -->
  <img src="images/Locations/Overlays/speaker-wall.png" 
       class="hotspot" 
       style="top: 45%; right: 12%; width: 22%;"
       alt="Speakers"
       data-action="speakers">

  <!-- Neon Sign -->
  <img src="images/Locations/Overlays/mlkshk-neon.png" 
       class="hotspot neon" 
       style="top: 12%; left: 22%; width: 18%;"
       alt="Neon Sign"
       data-action="neon">

  <!-- Dance Floor Spotlight / Crowd -->
  <img src="images/Locations/Overlays/dance-floor.png" 
       class="hotspot" 
       style="bottom: 28%; left: 38%; width: 24%;"
       alt="Dance Floor"
       data-action="dance">

  <!-- Back Door / Portal -->
  <img src="images/Locations/Overlays/back-door.png" 
       class="hotspot" 
       style="top: 38%; right: 28%; width: 9%;"
       alt="Back Room"
       data-action="portal-lab">

</div>

<footer>
  MLKSHK Digital — The Underground • No Rules • Never Sleeps © <span id="year"></span>
</footer>

<!-- FLOATING PLAYER -->
<div id="floating-player">
  <div class="player-meta">
    <div class="player-title">MLKSHK Underground</div>
    <div class="player-artist">BASS • SMOKE • 03:14</div>
    <div class="player-status" id="status">Ready</div>
  </div>
  <div class="player-controls">
    <img id="playPause" src="Player/PLAY.png" alt="Play/Stop">
  </div>
  <audio id="audio" preload="none"></audio>
</div>

<!-- Ambient Audio - Club Atmosphere -->
<audio id="ambient-audio" loop preload="none">
  <source src="audio/ambience/underground-club.mp3" type="audio/mpeg">
</audio>

<script>
// Year
document.getElementById('year').textContent = new Date().getFullYear();

// PLAYER (unchanged)
const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const statusEl = document.getElementById('status');
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now();
  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    btn.src = 'Player/PAUSE.png';
    statusEl.textContent = 'Live';
  }).catch(e => {
    console.error("Play failed:", e);
    statusEl.textContent = 'Connection error – retrying...';
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  btn.src = 'Player/PLAY.png';
  statusEl.textContent = 'Stopped';
}

btn.onclick = () => {
  if (!isPlaying) playLiveStream();
  else stopStream();
};

audio.addEventListener('waiting', () => statusEl.textContent = 'Buffering...');
audio.addEventListener('playing', () => { statusEl.textContent = 'Live'; isPlaying = true; });
audio.addEventListener('error', () => { if (isPlaying) setTimeout(playLiveStream, 2000); });
audio.addEventListener('stalled', () => { if (isPlaying) setTimeout(playLiveStream, 1500); });

// Media Session
if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Underground",
    artist: "Live from The Club",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Locations/club-icon.png", sizes: "512x512", type: "image/png" }]
  });
  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

// AMBIENT AUDIO
const ambient = document.getElementById('ambient-audio');
function startAmbient() {
  ambient.volume = 0.5;
  ambient.play().catch(() => {});
}
document.addEventListener('click', () => {
  if (ambient.paused) startAmbient();
}, { once: true });

// HOTSPOT ACTIONS
document.querySelectorAll('.hotspot').forEach(hotspot => {
  hotspot.addEventListener('click', (e) => {
    const action = e.currentTarget.dataset.action;
    
    switch(action) {
      case 'dj':
        if (!isPlaying) playLiveStream();
        alert("DJ Booth: Now playing latest MLKSHK drops");
        break;
        
      case 'bar':
        alert("Bartender slides you a glowing drink... (future: merch / drink menu?)");
        break;
        
      case 'speakers':
        alert("Speakers thumping. Bass level: MAX");
        // Could trigger stronger visualizer later
        break;
        
      case 'neon':
        alert("MLKSHK UNDERGROUND\nEst. 202X • No Photos • No Rules");
        break;
        
      case 'dance':
        alert("The floor is pulsing... lose yourself.");
        break;
        
      case 'portal-lab':
        alert("Heading deeper into The Lab...");
        // window.location = 'lab.html';
        break;
    }
  });
});

// Dropdown menu
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');
navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', () => dropdownMenu.style.display = 'none');

// Subtle mouse parallax
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth) * 12 - 6;
  const y = (e.clientY / window.innerHeight) * 10 - 5;
  document.getElementById('scene-bg').style.transform = `translate(${x}px, ${y}px)`;
});
</script>
</body>
</html>
