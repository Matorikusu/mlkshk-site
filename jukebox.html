<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK - Jukebox</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
  --dropdown-bg:#000;
}
html,body{
  margin:0;
  height:100%;
  font-family:'Rajdhani',system-ui,-apple-system,'Helvetica Neue',Arial;
  background:var(--bg);
  color:var(--text);
  overflow-x: hidden;
}
a{color:inherit;text-decoration:none}

/* NAV BAR */
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.2),transparent);
  position:sticky;
  top:0;
  z-index:30;
}
.nav-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  margin:0 auto;
}
.logo-link img{height:42px;display:block}
.nav-dropdown{position:relative}
.nav-toggle{
  background:none;
  border:0;
  color:var(--muted);
  font-weight:600;
  cursor:pointer;
  padding:6px 10px;
}
.dropdown-menu{
  display:none;
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  left:auto;
  background:var(--dropdown-bg);
  border:1px solid var(--accent);
  border-radius:8px;
  min-width:200px;
  z-index:100;
  overflow:hidden;
  max-width:90vw;
}
.dropdown-menu a{
  display:block;
  padding:10px 14px;
  color:#fff;
  text-decoration:none;
}
.dropdown-menu a:hover {
  background:var(--accent);
  color:#000;
}

/* HERO */
.hero{
  height:400px;
  background:linear-gradient(to bottom, rgba(0,0,0,0.3), var(--bg)), url('images/Home/mlkshk_header.png') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.hero h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: 2.5rem;
  letter-spacing: 4px;
  color: #fff;
  text-shadow: 0 0 20px var(--accent);
}

/* JUKEBOX SCROLLER CONTAINER */
.jukebox-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 40px 20px 140px 20px; /* Extra bottom padding so player doesn't block content */
}
.section-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 1.2rem;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 24px;
  color: var(--muted);
  border-left: 3px solid var(--accent);
  padding-left: 10px;
}

/* HORIZONTAL SCROLLER */
.scroller-wrapper {
  overflow-x: auto;
  overflow-y: hidden;
  white-space: nowrap;
  padding: 20px 10px;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
}
/* Hide scrollbar defaults while keeping functionality */
.scroller-wrapper::-webkit-scrollbar {
  height: 6px;
}
.scroller-wrapper::-webkit-scrollbar-track {
  background: rgba(255,255,255,0.02);
}
.scroller-wrapper::-webkit-scrollbar-thumb {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 4px;
}
.scroller-wrapper::-webkit-scrollbar-thumb:hover {
  background: var(--accent);
}

/* JUKEBOX ITEM */
.jukebox-card {
  display: inline-block;
  width: 220px;
  margin-right: 30px;
  vertical-align: top;
  white-space: normal;
  cursor: pointer;
  transition: transform 0.3s ease;
}
.jukebox-card:hover {
  transform: translateY(-8px);
}
.cover-art-wrapper {
  position: relative;
  width: 100%;
  aspect-ratio: 1/1;
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1);
  transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.jukebox-card:hover .cover-art-wrapper {
  border-color: var(--accent);
  box-shadow: 0 0 25px rgba(255, 42, 161, 0.4);
}
.cover-art-wrapper img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
/* Active Playing State Visual Indicator */
.jukebox-card.playing .cover-art-wrapper {
  border-color: var(--accent);
  box-shadow: 0 0 30px rgba(255, 42, 161, 0.6);
}
.jukebox-card.playing .cover-art-wrapper::after {
  content: 'NOW PLAYING';
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  color: var(--accent);
  font-weight: 700;
  letter-spacing: 1px;
}

.track-info {
  margin-top: 12px;
}
.track-title {
  font-family: 'Orbitron', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
}
.track-artist {
  font-size: 13px;
  color: var(--muted);
}

/* FOOTER */
footer {
  padding:28px 20px;
  text-align:center;
  font-size:13px;
  border-top:1px solid rgba(255,255,255,.05);
}

/* FLOATING PLAYER */
#floating-player{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  height:72px;
  background: #0d0d0d; /* Replaced static image background with flexible solid/border design to fit text changes */
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius:20px;
  display:flex;
  align-items:center;
  padding:0 18px;
  box-shadow:0 12px 40px rgba(0,0,0,.85);
  z-index:999;
  transition: border-color 0.3s ease;
}
#floating-player.active-play {
  border-color: var(--accent);
}
.player-meta{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:left;
  padding:0 12px;
  overflow: hidden;
}
.player-title{
  font-weight:700;
  font-size:14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-artist{
  font-size:12px;
  color:var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.player-status{
  font-size:11px;
  color:var(--accent);
  margin-top:2px;
  font-weight: 600;
}
.player-controls{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-left:12px;
}
.player-controls img{
  width:42px;
  height:42px;
  cursor:pointer;
  transition: transform 0.2s ease;
}
.player-controls img:hover {
  transform: scale(1.05);
}

@media (max-width: 768px) {
  .hero { height: 35vh; }
  .hero h1 { font-size: 1.8rem; }
  .jukebox-card { width: 170px; margin-right: 20px; }
  .track-title { font-size: 13px; }
  .track-artist { font-size: 11px; }
  #floating-player { width: 90%; height: 66px; padding: 0 12px; }
  .player-title { font-size: 13px; }
  .player-artist, .player-status { font-size: 11px; }
  .player-controls img { width: 38px; height: 38px; }
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <h1></h1>
</section>

<section class="jukebox-section">
  <div class="section-title">Archived Transmissions</div>
  
  <div class="scroller-wrapper">
    
    <div class="jukebox-card" data-track="audio/mock_track1.mp3" data-title="Pirate Radio Archive" data-artist="Vol. 01 - Late Night">
      <div class="cover-art-wrapper">
        <img src="images/Covers/HANNYA.jpg" alt="Pirate Radio Vol 1">
      </div>
      <div class="track-info">
        <div class="track-title">HANNYA</div>
        <div class="track-artist">SHOCKADDICT</div>
      </div>
    </div>

    <div class="jukebox-card" data-track="audio/mock_track2.mp3" data-title="The Lab Sessions" data-artist="Sub-Freq Alpha">
      <div class="cover-art-wrapper">
        <img src="images/Covers/ABOMINATIONS.jpg" alt="The Lab Sessions">
      </div>
      <div class="track-info">
        <div class="track-title">ELECTROMAGNETIC BUTTERFLIES</div>
        <div class="track-artist">FURBYZ RVENGE</div>
      </div>
    </div>

    <div class="jukebox-card" data-track="audio/mock_track3.mp3" data-title="Universe Exploration" data-artist="Deep Space Static">
      <div class="cover-art-wrapper">
        <img src="images/Covers/FUNK.jpg" alt="Universe Exploration">
      </div>
      <div class="track-info">
        <div class="track-title">FREE AGAIN</div>
        <div class="track-artist">CPH4</div>
      </div>
    </div>

    <div class="jukebox-card" data-track="audio/mock_track4.mp3" data-title="System Access Beats" data-artist="Misfit Mainframe">
      <div class="cover-art-wrapper">
        <img src="images/Covers/OBSIDIAN.jpg" alt="System Access Beats">
      </div>
      <div class="track-info">
        <div class="track-title">PLAY NO GAMES</div>
        <div class="track-artist">BLAQQ SHIFU</div>
      </div>
    </div>

    <div class="jukebox-card" data-track="audio/mock_track5.mp3" data-title="Vowel Extraction" data-artist="MLKSHK Core">
      <div class="cover-art-wrapper">
        <img src="images/Covers/POP.jpg" alt="Vowel Extraction">
      </div>
      <div class="track-info">
        <div class="track-title">LOVE LOCKDOWN</div>
        <div class="track-artist">SHOCKADDICT</div>
      </div>
    </div>

  </div>
</section>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<div id="floating-player">
  <div class="player-meta">
    <div class="player-title" id="p-title">MLKSHK Jukebox</div>
    <div class="player-artist" id="p-artist">Select a track to spin</div>
    <div class="player-status" id="status">Ready</div>
  </div>
  <div class="player-controls">
    <img id="playPause" src="Player/PLAY.png" alt="Play/Stop">
  </div>
  
  <audio id="audio" preload="none"></audio>
</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const statusEl = document.getElementById('status');
const playerPanel = document.getElementById('floating-player');

const playerTitle = document.getElementById('p-title');
const playerArtist = document.getElementById('p-artist');
const cards = document.querySelectorAll('.jukebox-card');

let isPlaying = false;
let currentTrackUrl = "";

// Initialize Jukebox Selection Engine
cards.forEach(card => {
  card.addEventListener('click', function() {
    const trackUrl = this.getAttribute('data-track');
    const title = this.getAttribute('data-title');
    const artist = this.getAttribute('data-artist');

    // If clicking the track that's already loaded, just toggle Play/Pause
    if (currentTrackUrl === trackUrl) {
      togglePlayback();
      return;
    }

    // Update active visual classes
    cards.forEach(c => c.classList.remove('playing'));
    this.classList.add('playing');

    // Update metadata properties
    currentTrackUrl = trackUrl;
    playerTitle.textContent = title;
    playerArtist.textContent = artist;
    playerPanel.classList.add('active-play');

    // Load and play track
    loadAndPlay(trackUrl, title, artist);
  });
});

function loadAndPlay(url, title, artist) {
  audio.src = url;
  audio.load();
  
  audio.play().then(() => {
    isPlaying = true;
    btn.src = 'Player/PAUSE.png';
    statusEl.textContent = 'Playing';
    updateMediaSession(title, artist);
  }).catch(e => {
    console.error("Playback execution prevented:", e);
    statusEl.textContent = 'Error loading track';
  });
}

function togglePlayback() {
  if (!currentTrackUrl) {
    statusEl.textContent = "Select a track first!";
    return;
  }

  if (isPlaying) {
    audio.pause();
    isPlaying = false;
    btn.src = 'Player/PLAY.png';
    statusEl.textContent = 'Paused';
    // Remove "NOW PLAYING" overlay visibility when paused
    cards.forEach(c => {
      if(c.getAttribute('data-track') === currentTrackUrl) c.classList.remove('playing');
    });
  } else {
    audio.play().then(() => {
      isPlaying = true;
      btn.src = 'Player/PAUSE.png';
      statusEl.textContent = 'Playing';
      // Restore "NOW PLAYING" visual overlay
      cards.forEach(c => {
        if(c.getAttribute('data-track') === currentTrackUrl) c.classList.add('playing');
      });
    });
  }
}

// Master controller click
btn.onclick = () => {
  togglePlayback();
};

// Handle native media wrapper events
audio.addEventListener('waiting', () => statusEl.textContent = 'Buffering...');
audio.addEventListener('playing', () => statusEl.textContent = 'Playing');
audio.addEventListener('ended', () => {
  isPlaying = false;
  btn.src = 'Player/PLAY.png';
  statusEl.textContent = 'Track Finished';
  cards.forEach(c => c.classList.remove('playing'));
});

function updateMediaSession(title, artist) {
  if ('mediaSession' in navigator) {
    navigator.mediaSession.metadata = new MediaMetadata({
      title: title,
      artist: artist,
      album: "MLKSHK Jukebox",
      artwork: [{ src: "images/LOGO_SMALL.png", sizes: "512x512", type: "image/png" }]
    });

    navigator.mediaSession.setActionHandler('play', togglePlayback);
    navigator.mediaSession.setActionHandler('pause', togglePlayback);
  }
}

/* Dropdown responsive navigation system */
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>
</body>
</html>
