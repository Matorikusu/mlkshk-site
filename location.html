<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK — The Clubhouse</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#ff2aa1;
}
html,body{
  margin:0;
  height:100%;
  font-family:'Rajdhani',system-ui,-apple-system,'Helvetica Neue',Arial;
  background:#000;
  color:#fff;
  overflow: hidden;
}

/* NAV BAR */
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.2),transparent);
  position:sticky;
  top:0;
  z-index:30;
}
.nav-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  margin:0 auto;
}
.logo-link img{height:42px;display:block}

/* SCENE */
.scene-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* 1. BACKGROUND */
#scene-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-image: url('images/Locations/KINGBEAR_BG.jpg');
  filter: brightness(0.72) contrast(1.18);
  z-index: 1;
}

/* 2. ANIMATION OVERLAY LAYER */
.animation-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;           /* IMPORTANT - clicks pass through */
  mix-blend-mode: screen;
}

/* Flames styling */
.flame {
  position: absolute;
  filter: brightness(1.7) saturate(2.2) drop-shadow(0 0 15px #ff8800);
  animation: flicker 0.6s infinite alternate ease-in-out;
}

@keyframes flicker {
  0%   { transform: scale(1) translateY(0);   opacity: 0.85; }
  100% { transform: scale(1.12) translateY(-8px); opacity: 1; }
}

/* Interactive Items (will sit on top) */
.hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 3;
  transition: all 0.3s ease;
  user-select: none;
}
.hotspot:hover {
  transform: scale(1.08) rotate(2deg);
  filter: brightness(1.3) drop-shadow(0 0 25px var(--accent));
}

/* HUD */
.hud {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.55);
  padding: 8px 26px;
  border-radius: 30px;
  font-size: 15px;
  border: 1px solid rgba(255,42,161,0.4);
  z-index: 10;
  pointer-events: none;
}

/* FOOTER */
footer{
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 12px 20px;
  text-align:center;
  font-size:12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.9));
  z-index: 20;
}

/* FLOATING PLAYER */
#floating-player{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  height:72px;
  background:url('Player/PLAYER.png') center/cover no-repeat;
  border-radius:20px;
  display:flex;
  align-items:center;
  padding:0 18px;
  box-shadow:0 12px 40px rgba(0,0,0,.85);
  z-index:999;
}
.player-meta{flex:1; display:flex; flex-direction:column; justify-content:center; text-align:center; padding:0 12px;}
.player-title{font-weight:700; font-size:14px;}
.player-artist{font-size:12px; color:#ccc;}
.player-status{font-size:11px; color:#ccc; margin-top:4px;}
.player-controls img{width:42px; height:42px; cursor:pointer;}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
  </div>
</header>

<div class="scene-container">
  
  <!-- 1. BACKGROUND -->
  <div id="scene-bg"></div>

  <!-- 2. ANIMATION OVERLAY LAYER -->
  <div class="animation-layer">
    
    <!-- Flames (add as many as you want) -->
    <img src="images/Locations/Overlays/flame1.svg" class="flame" style="top: 45%; left: 18%; width: 58px;">
    <img src="images/Locations/Overlays/flame2.svg" class="flame" style="top: 53%; left: 32%; width: 48px;">
    <img src="images/Locations/Overlays/flame3.svg" class="flame" style="top: 39%; left: 65%; width: 65px;">
    <img src="images/Locations/Overlays/flame4.svg" class="flame" style="top: 61%; left: 79%; width: 52px;">
    
    <!-- Extra smoke / haze example -->
    <img src="images/Locations/Overlays/smoke-loop.svg" 
         style="top: 12%; left: 8%; width: 420px; opacity: 0.28;">
  </div>

  <!-- 3. INTERACTIVE ITEMS (Add more here) -->
  <!-- You can freely add your items here. They will sit on top of the animation layer -->

  <div class="hud">
    MLKSHK UNDERGROUND CLUBHOUSE • EST 202X
  </div>
</div>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<!-- FLOATING PLAYER -->
<div id="floating-player">
  <div class="player-meta">
    <div class="player-title">MLKSHK Underground</div>
    <div class="player-artist">Live from The Clubhouse</div>
    <div class="player-status" id="status">Ready</div>
  </div>
  <div class="player-controls">
    <img id="playPause" src="Player/PLAY.png" alt="Play/Stop">
  </div>
  <audio id="audio" preload="none"></audio>
</div>

<!-- AMBIENT AUDIO -->
<audio id="ambient-audio" loop preload="none">
  <source src="audio/ambience/clubhouse-ambient.mp3" type="audio/mpeg">
</audio>

<script>
// Year
document.getElementById('year').textContent = new Date().getFullYear();

// Player
const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const statusEl = document.getElementById('status');
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";
let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now();
  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    btn.src = 'Player/PAUSE.png';
    statusEl.textContent = 'Live';
  }).catch(() => setTimeout(playLiveStream, 1500));
}

function stopStream() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  btn.src = 'Player/PLAY.png';
  statusEl.textContent = 'Stopped';
}

btn.onclick = () => isPlaying ? stopStream() : playLiveStream();

// Ambient Audio
const ambient = document.getElementById('ambient-audio');
document.addEventListener('click', () => {
  if (ambient.paused) {
    ambient.volume = 0.45;
    ambient.play().catch(() => {});
  }
}, { once: true });
</script>
</body>
</html>
