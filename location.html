<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK — King Bear</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#ff2aa1;
}
html,body{
  margin:0;
  height:100%;
  font-family:'Rajdhani',system-ui,-apple-system,'Helvetica Neue',Arial;
  background:#000;
  color:#fff;
  overflow: hidden;
}

/* NAV BAR */
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.2),transparent);
  position:sticky;
  top:0;
  z-index:30;
}
.nav-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  margin:0 auto;
}
.logo-link img{height:42px;display:block}

/* SCENE */
.scene-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

#scene-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background: url('images/Locations/KINGBEAR_BG.jpg') center/cover no-repeat;
  z-index: 1;
}

#animation-overlay {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  z-index: 2;
  pointer-events: none;
  object-fit: cover;
}

/* Hotspots - Desktop First */
.hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 3;
  transition: all 0.3s ease;
  user-select: none;
}
.hotspot:hover {
  transform: scale(1.08) rotate(2deg);
  filter: brightness(1.25) drop-shadow(0 0 25px var(--accent));
}

/* HUD */
.hud {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.6);
  padding: 8px 26px;
  border-radius: 30px;
  font-size: 15px;
  border: 1px solid rgba(255,42,161,0.4);
  z-index: 10;
  pointer-events: none;
}

/* FOOTER & PLAYER */
footer{ position: absolute; bottom: 0; width: 100%; padding: 12px 20px; text-align:center; font-size:12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); z-index: 20; }

#floating-player{
  position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
  width:360px; height:72px;
  background:url('Player/PLAYER.png') center/cover no-repeat;
  border-radius:20px;
  display:flex; align-items:center; padding:0 18px;
  box-shadow:0 12px 40px rgba(0,0,0,.85);
  z-index:999;
}

/* ====================== MOBILE RESPONSIVE ====================== */
@media (max-width: 1024px) {
  .hotspot { width: auto !important; min-width: 80px; }
  .hud { bottom: 90px; font-size: 13px; padding: 6px 20px; }
}

@media (max-width: 768px) {
  #scene-bg, #animation-overlay {
    background-position: center 20%; /* Adjust if needed */
  }

  /* Stack items more vertically on mobile */
  .hotspot {
    transform: scale(0.95);
  }

  /* Example mobile repositioning - tweak as needed */
  .hotspot[data-action="whiskey"] { top: 55%; left: 8%; width: 14%; }
  .hotspot[data-action="vinyl"]   { top: 68%; left: 22%; width: 16%; }
  .hotspot[data-action="neon"]    { top: 12%; left: 25%; width: 28%; }
  .hotspot[data-action="crate"]   { top: 48%; left: 45%; width: 18%; }
  .hotspot[data-action="speakers"]{ top: 38%; right: 8%; width: 22%; }
}
</style>
</head>

  <!-- Items -->
  <img src="images/Locations/Items/WHISKEY.png" class="hotspot" style="top: 62%; left: 12%; width: 9%;" data-action="whiskey" alt="Whiskey">

  <img src="images/Locations/Items/SPEAKERSTACK.png" class="hotspot" style="top: 42%; right: 18%; width: 14%;" data-action="speakers" alt="Speakers">
  <img src="images/Locations/Items/FRANKIEGUITAR.png" class="hotspot" style="top: 48%; right: 28%; width: 11%;" data-action="guitar" alt="Guitar">
