<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK — Pirate Radio Deck</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#ccc;
  --accent:#ff2aa1;
  --dropdown-bg:#000;
}
html,body{
  margin:0;
  height:100%;
  font-family:'Rajdhani',system-ui,-apple-system,'Helvetica Neue',Arial;
  background:var(--bg);
  color:var(--text);
  overflow: hidden; /* No scrolling on immersive pages */
}

/* NAV BAR - kept exactly as you had it */
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.2),transparent);
  position:sticky;
  top:0;
  z-index:30;
}
.nav-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  margin:0 auto;
}
.logo-link img{height:42px;display:block}
.nav-dropdown{position:relative}
.nav-toggle{
  background:none;
  border:0;
  color:var(--muted);
  font-weight:600;
  cursor:pointer;
  padding:6px 10px;
}
.dropdown-menu{
  display:none;
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  background:var(--dropdown-bg);
  border:1px solid var(--accent);
  border-radius:8px;
  min-width:200px;
  z-index:100;
  overflow:hidden;
}
.dropdown-menu a{
  display:block;
  padding:10px 14px;
  color:#fff;
  text-decoration:none;
}
.dropdown-menu a:hover {
  background:var(--accent);
  color:#000;
}

/* IMMERSIVE SCENE CONTAINER */
.scene-container {
  position: relative;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  background: #000;
}

/* Background Layer */
#scene-bg {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  background-image: url('images/Locations/STAGE_BG.png');
  filter: brightness(0.85) contrast(1.1);
  z-index: 1;
}

/* Foreground Overlays / Hotspots */
.hotspot {
  position: absolute;
  cursor: pointer;
  z-index: 2;
  transition: all 0.3s ease;
  user-select: none;
}
.hotspot:hover {
  transform: scale(1.08) rotate(2deg);
  filter: brightness(1.25) drop-shadow(0 0 25px var(--accent));
}

/* Ambient Audio & Effects */
#ambient-audio { display: none; }

/* Floating HUD (optional minimal info) */
.hud {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.4);
  padding: 8px 24px;
  border-radius: 30px;
  font-size: 15px;
  border: 1px solid rgba(255,42,161,0.3);
  z-index: 10;
  pointer-events: none;
}

/* FOOTER - minimal for immersive feel */
footer{
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 12px 20px;
  text-align:center;
  font-size:12px;
  background: linear-gradient(transparent, rgba(0,0,0,0.8));
  z-index: 20;
}

/* FLOATING PLAYER - kept intact */
#floating-player{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  height:72px;
  background:url('Player/PLAYER.png') center/cover no-repeat;
  border-radius:20px;
  display:flex;
  align-items:center;
  padding:0 18px;
  box-shadow:0 12px 40px rgba(0,0,0,.85);
  z-index:999;
}
.player-meta{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  text-align:center;
  padding:0 12px;
}
.player-title{
  font-weight:700;
  font-size:14px;
}
.player-artist{
  font-size:12px;
  color:var(--muted);
}
.player-status{
  font-size:11px;
  color:var(--muted);
  margin-top:4px;
}
.player-controls{
  display:flex;
  align-items:center;
  justify-content:center;
  margin-left:12px;
}
.player-controls img{
  width:42px;
  height:42px;
  cursor:pointer;
}

@media (max-width: 768px) {
  .scene-container { height: 100dvh; }
  #floating-player { width: 90%; height: 60px; padding: 0 12px; }
  .player-title { font-size: 12px; }
  .player-artist, .player-status { font-size: 10px; }
  .player-controls img { width: 36px; height: 36px; }
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<!-- IMMERSIVE LOCATION -->
<div class="scene-container">

  <!-- Background -->
  <div id="scene-bg"></div>

  <!-- Example Hotspots / PNG Overlays (adjust positions as needed) -->
  
  <!-- Antenna / Radio Tower -->
  <img src="images/Locations/Overlays/antenna.png" 
       class="hotspot" 
       style="top: 18%; left: 12%; width: 18%;"
       alt="Radio Antenna"
       data-action="radio">

  <!-- Crate / Record Archive -->
  <img src="images/Locations/Items/CRATE.png" 
       class="hotspot" 
       style="top: 62%; left: 28%; width: 14%;"
       alt="Record Crate"
       data-action="archive">

  <!-- Speaker Stack -->
  <img src="images/Locations/Overlays/speakers.png" 
       class="hotspot" 
       style="top: 48%; right: 18%; width: 22%;"
       alt="Speakers"
       data-action="music">

  <!-- Neon Sign -->
  <img src="images/Locations/Overlays/neon-sign.png" 
       class="hotspot" 
       style="top: 25%; right: 35%; width: 16%;"
       alt="Neon Sign"
       data-action="info">

  <!-- Portal to another location -->
  <img src="images/Locations/Overlays/portal-lab.png" 
       class="hotspot" 
       style="bottom: 22%; left: 68%; width: 11%;"
       alt="Enter The Lab"
       data-action="portal-lab">

  <!-- Optional subtle animated elements (fog, birds, etc.) can go here -->

  <!-- Minimal HUD -->
  <div class="hud">
    PIRATE RADIO DECK • SIGNAL STRONG • 03:42 UTC
  </div>
</div>

<footer>
  MLKSHK Digital — The signal never dies. © <span id="year"></span>
</footer>

<!-- FLOATING PLAYER (kept exactly as before) -->
<div id="floating-player">
  <div class="player-meta">
    <div class="player-title">MLKSHK Pirate Radio</div>
    <div class="player-artist">Live • Underground</div>
    <div class="player-status" id="status">Ready</div>
  </div>
  <div class="player-controls">
    <img id="playPause" src="Player/PLAY.png" alt="Play/Stop">
  </div>
  <audio id="audio" preload="none"></audio>
</div>

<!-- Ambient Audio -->
<audio id="ambient-audio" loop preload="none">
  <source src="audio/ambience/pirate-deck-night.mp3" type="audio/mpeg">
</audio>

<script>
// Year
document.getElementById('year').textContent = new Date().getFullYear();

// === PLAYER (your original code kept intact) ===
const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const statusEl = document.getElementById('status');
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now();
  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    btn.src = 'Player/PAUSE.png';
    statusEl.textContent = 'Live';
  }).catch(e => {
    console.error("Play failed:", e);
    statusEl.textContent = 'Connection error – retrying...';
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  btn.src = 'Player/PLAY.png';
  statusEl.textContent = 'Stopped';
}

btn.onclick = () => {
  if (!isPlaying) playLiveStream();
  else stopStream();
};

// Audio event handlers (your original logic)
audio.addEventListener('waiting', () => statusEl.textContent = 'Buffering...');
audio.addEventListener('playing', () => { statusEl.textContent = 'Live'; isPlaying = true; });
audio.addEventListener('error', () => {
  if (isPlaying) setTimeout(playLiveStream, 2000);
});
audio.addEventListener('stalled', () => {
  if (isPlaying) setTimeout(playLiveStream, 1500);
});

// Media Session
if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Pirate Radio",
    artist: "Underground • Live",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }]
  });
  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

// === AMBIENT AUDIO ===
const ambient = document.getElementById('ambient-audio');

function startAmbient() {
  ambient.volume = 0.45; // Adjust to taste
  ambient.play().catch(() => {}); // Browsers require interaction first
}

// Start ambient after first user interaction (important)
document.addEventListener('click', () => {
  if (ambient.paused) startAmbient();
}, { once: true });

// === HOTSPOT INTERACTIONS ===
document.querySelectorAll('.hotspot').forEach(hotspot => {
  hotspot.addEventListener('click', (e) => {
    const action = e.currentTarget.dataset.action;
    
    switch(action) {
      case 'radio':
        // Click antenna → force play live stream
        if (!isPlaying) playLiveStream();
        break;
        
      case 'archive':
        alert("Opening Archive... (replace with modal or navigation)");
        // window.location = 'archive.html';
        break;
        
      case 'music':
        alert("Cranking speakers... (open track list or visualizer)");
        break;
        
      case 'info':
        alert("MLKSHK PIRATE RADIO DECK\nSignal boosted from the void.");
        break;
        
      case 'portal-lab':
        alert("Entering The Lab... (add fade transition in real version)");
        // window.location = 'lab.html';
        break;
    }
  });
});

// Dropdown (your original)
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});

// Optional: subtle background parallax on mouse move
document.addEventListener('mousemove', (e) => {
  const x = (e.clientX / window.innerWidth) * 20 - 10;
  const y = (e.clientY / window.innerHeight) * 15 - 7.5;
  document.getElementById('scene-bg').style.transform = `translate(${x}px, ${y}px)`;
});
</script>
</body>
</html>
