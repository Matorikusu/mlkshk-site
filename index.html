<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Rajdhani:wght@500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #000000;
  --text: #ffffff;
  --muted: #444444;
  --accent: #ff2aa1;
  --dropdown-bg: #050505;
  --signal-green: #00ff66;
}
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  letter-spacing: 0.5px;
}
a { color: inherit; text-decoration: none; }

/* PRIVATE NAVIGATION FRAME */
header.nav-bar {
  border-bottom: 1px solid #111;
  padding: 24px;
  background: rgba(0, 0, 0, 0.9);
  position: sticky;
  top: 0;
  z-index: 200;
  backdrop-filter: blur(16px);
}
.nav-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
}
.logo-link img { height: 34px; display: block; transition: opacity 0.3s ease; }
.logo-link:hover img { opacity: 0.7; }

.nav-dropdown { position: relative; }
.nav-toggle {
  background: none;
  border: 1px solid #1c1c1c;
  padding: 8px 20px;
  border-radius: 0px; /* Sharp, architectural edges */
  color: #888;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.nav-toggle:hover {
  border-color: #444;
  color: var(--text);
}
.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 12px);
  right: 0;
  background: var(--dropdown-bg);
  border: 1px solid #1c1c1c;
  border-radius: 0px;
  min-width: 240px;
  z-index: 300;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0,0,0,0.95);
}
.dropdown-menu a {
  display: block;
  padding: 14px 20px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px;
  color: #666;
  border-bottom: 1px solid #111;
  letter-spacing: 1px;
  transition: all 0.2s ease;
}
.dropdown-menu a:hover {
  background: #0d0d0d;
  color: var(--text);
  padding-left: 24px;
}

/* AUTHENTICATION GATE HERO */
.hero {
  height: 550px;
  background: url('images/Home/mlkshk_header.png') center/cover no-repeat #000;
  border-bottom: 1px solid #111;
  position: relative;
}
.hero::after {
  content: "SECURE NODE // AUTHENTICATED ACCESS ONLY";
  position: absolute;
  bottom: 24px;
  left: 24px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 3px;
}

/* THE SECTOR INDEX (DECK Container) */
.deck-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 60px 24px;
}
.image-link {
  display: block;
  margin-bottom: 50px;
  position: relative;
  background: #000;
  border: 1px solid #111;
}
/* Structural Meta Labels Outside of Images for a Magazine/Catalog Archive look */
.image-link::before {
  content: attr(data-index);
  position: absolute;
  top: -22px;
  left: 0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #333;
}
.image-link::after {
  content: "STATUS: ENCRYPTED // LINK OPTIMIZED";
  position: absolute;
  bottom: -22px;
  right: 0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: #222;
  letter-spacing: 1px;
}
.image-section {
  width: 100%;
  height: 440px;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  cursor: pointer;
  filter: grayscale(0.2) brightness(0.9);
  transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
  will-change: transform, filter;
}
.image-link:hover .image-section {
  transform: scale(1.01);
  filter: grayscale(0) brightness(1.05);
}

/* PORTAL CHANNELS */
.pirate-radio-section { background-image: url('images/Pirate Radio/pirateradio_header.png'); }
.universe-section { background-image: url('images/Home/UNIVERSE_HEADER2.png'); }
.brands-section { background-image: url('images/Home/MLKSHK_ARCHIVE_HEADER.png'); }
.lab-section { background-image: url('images/Home/LAB_HEADER.png'); }
.access-section { background-image: url('images/Home/MLKSHK_ACCESS.png'); }

/* MINIMALIST ENDPLATE */
footer {
  padding: 60px 24px;
  text-align: center;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #333;
  border-top: 1px solid #111;
  letter-spacing: 2px;
}

/* THE CONTINENTAL EXECUTIVE RADAR PLAYER */
#floating-player {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  width: 380px;
  height: 72px;
  background: url('Player/PLAYER.png') center/cover no-repeat #050505;
  border-radius: 20px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.95);
  z-index: 999;
  box-sizing: border-box;
  border: 1px solid rgba(255,255,255,0.03);
}
.player-meta {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  padding: 0 16px;
}
.player-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: #fff;
  letter-spacing: 1px;
}
.player-artist {
  font-size: 11px;
  color: #555;
  margin-top: 2px;
  font-family: 'Share Tech Mono', monospace;
  text-transform: uppercase;
}
.player-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: #444;
  margin-top: 4px;
  letter-spacing: 1px;
}
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
}
.player-controls img {
  width: 42px;
  height: 42px;
  cursor: pointer;
  transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.player-controls img:hover {
  transform: scale(1.08);
}

@media (max-width: 768px) {
  header.nav-bar { padding: 16px; }
  .hero { height: 40vh; }
  .image-section { height: 220px; }
  .image-link { margin-bottom: 36px; }
  .image-link::before, .image-link::after { display: none; } /* Kept clean on smaller viewports */
  .deck-container { padding: 40px 16px; }
  #floating-player { width: calc(100% - 32px); bottom: 16px; }
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">MEMBER_INDEX</button>
      <div class="dropdown-menu">
        <a href="access.html">PRIV_NODE://ACCESS</a>
        <a href="archive.html">PRIV_NODE://ARCHIVE</a>
        <a href="pirateradio.html">PRIV_NODE://PIRATE_RADIO</a>
        <a href="lab.html">PRIV_NODE://THE_LAB</a>
        <a href="universe.html">PRIV_NODE://THE_UNIVERSE</a>
      </div>
    </div>
  </div>
</header>

<section class="hero"></section>

<main class="deck-container">
  <a href="pirateradio.html" class="image-link" data-index="[ CHANNEL_01 ]">
    <section class="image-section pirate-radio-section"></section>
  </a>
  <a href="universe.html" class="image-link" data-index="[ CHANNEL_02 ]">
    <section class="image-section universe-section"></section>
  </a>
  <a href="archive.html" class="image-link" data-index="[ CHANNEL_03 ]">
    <section class="image-section brands-section"></section>
  </a>
  <a href="lab.html" class="image-link" data-index="[ CHANNEL_04 ]">
    <section class="image-section lab-section"></section>
  </a>
  <a href="access.html" class="image-link" data-index="[ CHANNEL_05 ]">
    <section class="image-section access-section"></section>
  </a>
</main>

<footer>
  UNINDEXED SPACE. NO PUBLIC SIGNATURE. UNREGULATED ENERGY. © <span id="year"></span>
</footer>

<div id="floating-player">
  <div class="player-meta">
    <div class="player-title">MLKSHK PIRATE RADIO</div>
    <div class="player-artist">OFF-GRID DECK / LIVE FEED</div>
    <div class="player-status" id="status">STANDBY</div>
  </div>
  <div class="player-controls">
    <img id="playPause" src="Player/PLAY.png" alt="Execute">
  </div>
  <audio id="audio" preload="none"></audio>
</div>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const statusEl = document.getElementById('status');
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now(); 
  audio.load();
  
  audio.play().then(() => {
    isPlaying = true;
    btn.src = 'Player/PAUSE.png';
    statusEl.textContent = 'BROADCASTING LIVE';
    statusEl.style.color = 'var(--signal-green)';
  }).catch(e => {
    console.error("Link broken:", e);
    statusEl.textContent = 'CARRIER FAULT – AUTO_RECONNECTING...';
    statusEl.style.color = 'var(--accent)';
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = ''; 
  isPlaying = false;
  btn.src = 'Player/PLAY.png';
  statusEl.textContent = 'STANDBY';
  statusEl.style.color = '#444';
}

btn.onclick = () => {
  if (!isPlaying) {
    playLiveStream();
  } else {
    stopStream();
  }
};

audio.addEventListener('waiting', () => {
  statusEl.textContent = 'SYNCING LINK...';
  statusEl.style.color = 'var(--accent)';
});

audio.addEventListener('playing', () => {
  statusEl.textContent = 'BROADCASTING LIVE';
  statusEl.style.color = 'var(--signal-green)';
  isPlaying = true;
});

audio.addEventListener('error', () => {
  if (isPlaying) {
    statusEl.textContent = 'STREAM LOSS – RETRYING...';
    statusEl.style.color = 'var(--accent)';
    setTimeout(playLiveStream, 2000);
  }
});

audio.addEventListener('stalled', () => {
  if (isPlaying) {
    statusEl.textContent = 'BUFFER CORRECTION...';
    setTimeout(playLiveStream, 1500);
  }
});

if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Pirate Radio",
    artist: "Underground • Live • No Rules",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }]
  });

  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>
</body>
</html>
