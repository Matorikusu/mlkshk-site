<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK Pirate Radio</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#050505;
  --text:#fff;
  --muted:#888;
  --accent:#ff2aa1;
  --panel-bg: rgba(15, 15, 15, 0.85);
  --dropdown-bg:#000;
}
html,body{
  margin:0;
  height:100%;
  font-family:'Rajdhani',system-ui,-apple-system,'Helvetica Neue',Arial;
  background: var(--bg);
  color:var(--text);
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
}
a{color:inherit;text-decoration:none}

/* NAV BAR */
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  background:linear-gradient(180deg,rgba(0,0,0,.4),transparent);
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:30;
}
.nav-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  margin:0 auto;
}
.logo-link img{height:42px;display:block}
.nav-dropdown{position:relative}
.nav-toggle{
  background:none;
  border:0;
  color:var(--muted);
  font-weight:600;
  cursor:pointer;
  padding:6px 10px;
  font-size: 16px;
  letter-spacing: 1px;
  transition: color 0.3s;
}
.nav-toggle:hover {
  color: var(--accent);
}
.dropdown-menu{
  display:none;
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  background:var(--dropdown-bg);
  border:1px solid var(--accent);
  border-radius:8px;
  min-width:200px;
  z-index:100;
  overflow:hidden;
  max-width:90vw;
}
.dropdown-menu a{
  display:block;
  padding:10px 14px;
  color:#fff;
  text-decoration:none;
}
.dropdown-menu a:hover {
  background:var(--accent);
  color:#000;
}

/* HERO BROADCAST HUB */
.radio-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 100px 20px 60px 20px;
  background: radial-gradient(circle at center, rgba(255, 42, 161, 0.1) 0%, rgba(5, 5, 5, 1) 70%), 
              url('images/Home/mlkshk_header.png') center/cover no-repeat;
}

/* CENTRALIZED UNDERGROUND PLAYER */
.main-player {
  background: var(--panel-bg);
  border: 1px solid rgba(255, 42, 161, 0.2);
  border-radius: 24px;
  padding: 40px;
  width: 100%;
  max-width: 420px;
  text-align: center;
  box-shadow: 0 20px 50px rgba(0,0,0,0.9), 0 0 30px rgba(255, 42, 161, 0.05);
  backdrop-filter: blur(12px);
  position: relative;
}

.radio-badge {
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 3px;
  margin-bottom: 24px;
  display: inline-block;
  border: 1px solid var(--accent);
  padding: 4px 12px;
  border-radius: 50px;
  box-shadow: 0 0 10px rgba(255, 42, 161, 0.2);
}

.player-title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.player-artist {
  font-size: 16px;
  color: var(--muted);
  letter-spacing: 0.5px;
  margin-bottom: 30px;
}

/* BIG STREAM TOGGLE BUTTON */
.controls-wrapper {
  margin-bottom: 30px;
}

.play-btn-container {
  width: 96px;
  height: 96px;
  background: #111;
  border: 2px solid rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 0 0 0px rgba(255, 42, 161, 0);
}

.play-btn-container:hover {
  border-color: var(--accent);
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255, 42, 161, 0.3);
}

.play-btn-container img {
  width: 48px;
  height: 48px;
  transition: transform 0.2s;
}

.play-btn-container:active {
  transform: scale(0.98);
}

/* REAL-TIME STATUS */
.status-indicator {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: 'Orbitron', sans-serif;
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
}

.status-dot {
  width: 6px;
  height: 6px;
  background-color: var(--muted);
  border-radius: 50%;
  transition: all 0.3s;
}

/* Active / Streaming UI states */
.main-player.is-streaming .status-dot {
  background-color: var(--accent);
  box-shadow: 0 0 10px var(--accent);
  animation: pulse 1.5s infinite;
}

.main-player.is-streaming .status-indicator {
  color: #fff;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.4); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}

/* FOOTER */
footer {
  padding: 24px 20px;
  text-align: center;
  font-size: 13px;
  border-top: 1px solid rgba(255,255,255,.03);
  background: #000;
  color: var(--muted);
  letter-spacing: 0.5px;
}

@media (max-width: 480px) {
  .main-player { padding: 30px 20px; }
  .player-title { font-size: 22px; }
  .play-btn-container { width: 80px; height: 80px; }
  .play-btn-container img { width: 40px; height: 40px; }
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">MENU</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<section class="radio-container">
  <div class="main-player" id="playerDeck">
    <span class="radio-badge">24/7 Stream</span>
    <div class="player-title">MLKSHK Pirate Radio</div>
    <div class="player-artist">Underground Collective • Live</div>
    
    <div class="controls-wrapper">
      <div class="play-btn-container" id="playPauseBtn">
        <img id="playIcon" src="Player/PLAY.png" alt="Control Action">
      </div>
    </div>

    <div class="status-indicator">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusTxt">Ready</span>
    </div>
    
    <audio id="audio" preload="none"></audio>
  </div>
</section>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const playPauseBtn = document.getElementById('playPauseBtn');
const playIcon = document.getElementById('playIcon');
const statusTxt = document.getElementById('statusTxt');
const playerDeck = document.getElementById('playerDeck');
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  // Append timestamp parameter to force a real-time frame buffer and bypass browser cache
  audio.src = STREAM_URL + "?t=" + Date.now();   
  audio.load();
  
  audio.play().then(() => {
    isPlaying = true;
    playIcon.src = 'Player/PAUSE.png';
    statusTxt.textContent = 'Live';
    playerDeck.classList.add('is-streaming');
  }).catch(e => {
    console.error("Playback interrupted:", e);
    statusTxt.textContent = 'Retry Connecting...';
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = ''; // Sever the live pipeline connection completely
  isPlaying = false;
  playIcon.src = 'Player/PLAY.png';
  statusTxt.textContent = 'Stopped';
  playerDeck.classList.remove('is-streaming');
}

// Global UI interaction triggers
playPauseBtn.onclick = () => {
  if (!isPlaying) {
    playLiveStream();
  } else {
    stopStream();
  }
};

// Live Audio Engine Listeners
audio.addEventListener('waiting', () => statusTxt.textContent = 'Buffering...');
audio.addEventListener('playing', () => {
  statusTxt.textContent = 'Live';
  isPlaying = true;
  playerDeck.classList.add('is-streaming');
});
audio.addEventListener('error', () => {
  if (isPlaying) {
    statusTxt.textContent = 'Link Interrupted — Reconnecting...';
    setTimeout(playLiveStream, 2000);
  }
});
audio.addEventListener('stalled', () => {
  if (isPlaying) {
    statusTxt.textContent = 'Signal Dropped — Reconnecting...';
    setTimeout(playLiveStream, 1500);
  }
});

// Native Mobile Metadata Support
if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Pirate Radio",
    artist: "Underground • Live • No Rules",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }]
  });

  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

// Navigation Dropdown Utility
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>
</body>
</html>
