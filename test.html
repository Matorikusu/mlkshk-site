<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK | PIRATE RADIO</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #060407;
  --panel-opacity: 0.45; /* Almost opaque/highly translucent default */
  --panel-bg: rgba(10, 6, 12, var(--panel-opacity)); 
  --text: #f4eaff;
  --muted: #7f6e8c;
  --accent-hue: 280; /* Base Purple */
  --accent: hsl(var(--accent-hue), 95%, 59%); 
  --accent-glow-opacity: 0.35;
  --accent-glow: hsla(var(--accent-hue), 95%, 59%, var(--accent-glow-opacity));
  --signal-green: #39ff14; 
  --dropdown-bg: #08050a;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  position: relative;
}

/* BACKGROUND IMAGE OVERRIDE */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('images/Pirate Radio/pirateradio_header.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 1.0; 
  z-index: -2;
  pointer-events: none;
}

/* HALF-TONE / POSTER PRINT STREET PATTERN - Heavily toned down */
.grid-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    radial-gradient(rgba(188, 52, 250, 0.008) 1.5px, transparent 1.5px),
    linear-gradient(rgba(0, 0, 0, 0.15) 1px, transparent 1px);
  background-size: 16px 16px, 100% 5px; 
  z-index: -1;
  pointer-events: none;
}

a { color: inherit; text-decoration: none; }

/* CRT/VHS GLITCH OVERLAY - Barely visible for optimal legibility */
body::after {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(14, 10, 16, 0) 80%, rgba(0, 0, 0, 0.05) 80%), linear-gradient(90deg, rgba(188, 52, 250, 0.005), rgba(0, 255, 100, 0.002), rgba(0, 100, 255, 0.005));
  z-index: 9999;
  background-size: 100% 12px, 16px 100%;
  pointer-events: none;
}

/* VHS tracking sweep - Eased off significantly */
body.rig-active .scanline {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; right: 0; height: 6px;
  background: rgba(188, 52, 250, 0.03);
  box-shadow: 0 0 10px rgba(188, 52, 250, 0.08);
  filter: blur(4px);
  animation: static-sweep 6s linear infinite;
  z-index: 9998;
  pointer-events: none;
}

/* NAV BAR */
header.nav-bar {
  border-bottom: 2px solid #000;
  box-shadow: 0 4px 0 var(--accent);
  padding: 15px 24px;
  background: #08050a;
  position: sticky;
  top: 0;
  z-index: 30;
}
.nav-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
}
.logo-link img { height: 38px; display: block; }
.nav-dropdown { position: relative; }
.nav-toggle {
  background: #000;
  border: 2px solid var(--text);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 0px; 
  box-shadow: 3px 3px 0px var(--accent);
  transition: all 0.1s ease-in-out;
}
.nav-toggle:hover {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0px var(--accent);
  background: var(--accent);
  color: #000;
}
.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  background: #000;
  border: 3px solid var(--accent);
  border-radius: 0px;
  min-width: 200px;
  z-index: 100;
  overflow: hidden;
}
.dropdown-menu a {
  display: block;
  padding: 12px 16px;
  color: #fff;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid #130d1a;
}
.dropdown-menu a:hover {
  background: var(--text);
  color: #000;
}

/* DECK MAIN RIG */
.deck-container {
  min-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

.pirate-deck {
  background: var(--panel-bg);
  border: 3px solid #000;
  width: 100%;
  max-width: 430px;
  padding: 35px 25px 25px 25px;
  border-radius: 0px; 
  box-shadow: 12px 12px 0px rgba(0, 0, 0, 0.7); 
  position: relative;
  backdrop-filter: blur(8px);
  transition: background 0.1s ease;
}

.pirate-deck::before {
  content: "PROPERTY OF MLKSHK NOISE Underground // AUTH_REQ";
  position: absolute;
  top: -15px;
  left: 15px;
  background: var(--accent);
  padding: 2px 10px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 9px;
  color: #000;
  letter-spacing: 1px;
  transform: rotate(-1.5deg);
  box-shadow: 2px 2px 0 #000;
}

/* TRANSMISSION MONITOR */
.broadcast-monitor {
  background: rgba(3, 2, 4, 0.7);
  border: 2px solid #000;
  padding: 25px 20px;
  position: relative;
  overflow: hidden;
  text-align: center; 
}

.player-art-frame {
  width: 140px;
  height: 140px;
  margin: 0 auto 20px auto;
  border: 3px solid #000;
  border-radius: 0px; 
  overflow: hidden;
  position: relative;
  background: #0a060d;
  transform: rotate(1deg);
  box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.player-art-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.4;
  filter: grayscale(100%) contrast(140%);
  transition: all 0.3s ease;
}

.rig-active .player-art-frame {
  border-color: var(--accent);
  transform: rotate(-1deg) scale(1.02);
  box-shadow: 6px 6px 0px #000;
}
.rig-active .player-art-frame img {
  opacity: 0.85;
  filter: grayscale(0%) contrast(110%);
}

.station-identity {
  font-family: 'Permanent Marker', 'Orbitron', sans-serif;
  font-size: 28px;
  letter-spacing: 1px;
  color: #fff;
  margin-bottom: 0px;
  transform: scaleY(1.05);
  text-shadow: 3px 3px 0px #000;
}

.station-subtext {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 20px;
}

/* SIGNAL STATUS */
.signal-status-line {
  display: flex;
  align-items: center;
  justify-content: center; 
  gap: 10px;
  font-family: monospace;
  font-size: 13px;
  font-weight: bold;
  color: #fff;
  background: rgba(10, 6, 13, 0.8);
  border: 1px solid #1a1122;
  padding: 8px;
}

.status-beacon {
  width: 9px;
  height: 9px;
  background: #230a30;
  border: 1px solid #000;
  transition: all 0.2s ease;
}

.rig-active .status-beacon {
  background: var(--signal-green);
  box-shadow: 0 0 10px var(--signal-green);
  animation: pulse 1s infinite steps(2); 
}

.rig-active .station-identity {
  color: #fff;
  animation: text-twitch 2.5s infinite;
}

/* AUDIO METERS */
.wave-scope {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 35px;
  margin-top: 20px;
  padding: 0 5px;
  opacity: 0.15;
}
.rig-active .wave-scope { opacity: 1; }

.scope-bar {
  width: 6px;
  height: 4px;
  background: #000;
  border: 1px solid rgba(255, 255, 255, 0.08);
}
.rig-active .scope-bar { animation: jump 0.8s ease infinite alternate; }
.rig-active .scope-bar:nth-child(odd) { background: var(--accent); }
.rig-active .scope-bar:nth-child(even) { background: var(--signal-green); animation-duration: 0.5s; }
.rig-active .scope-bar:nth-child(3n) { background: #ffffff; animation-duration: 0.7s; }

/* MAIN HARDWARE ACTUATOR AREA */
.deck-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 25px;
  background: rgba(0,0,0,0.5);
  padding: 15px;
  border: 2px solid #000;
}

.master-switch {
  width: 65px;
  height: 65px;
  background: #11091a;
  border: 3px solid #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  box-shadow: 4px 4px 0px #000;
  transition: all 0.1s ease-in-out;
}

.master-switch img {
  width: 24px;
  height: 24px;
  z-index: 2;
}

.master-switch:hover {
  transform: translate(-1px, -1px);
  box-shadow: 5px 5px 0px var(--accent);
  background: #190e26;
}

.master-switch:active {
  transform: translate(3px, 3px);
  box-shadow: 1px 1px 0px #000;
}

.rig-active .master-switch {
  background: var(--accent);
  border-color: #000;
  box-shadow: 0 0 15px var(--accent-glow);
}
.rig-active .master-switch img {
  filter: invert(1); 
}

/* HARDWARE KNOB SYSTEM */
.hardware-rack {
  display: flex;
  gap: 15px;
}

.knob-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
}

.knob-label {
  font-family: 'Orbitron', sans-serif;
  font-size: 8px;
  font-weight: 700;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 6px;
  letter-spacing: 0.5px;
}

.physical-knob {
  width: 38px;
  height: 38px;
  background: radial-gradient(circle, #2d2336 30%, #140e1a 100%);
  border: 2px solid #000;
  border-radius: 50%;
  position: relative;
  cursor: grab;
  box-shadow: 0 3px 5px rgba(0,0,0,0.5);
  transform: rotate(0deg);
  will-change: transform;
}

.physical-knob:active {
  cursor: grabbing;
}

/* The indicator white slit carved into the analog hardware knob */
.physical-knob::after {
  content: "";
  position: absolute;
  top: 3px;
  left: 50%;
  width: 3px;
  height: 10px;
  background: var(--accent);
  transform: translateX(-50%);
  border-radius: 1px;
}

/* FOOTER */
footer {
  padding: 30px 20px;
  text-align: center;
  font-size: 11px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  border-top: 2px solid #000;
  background: #050306;
  position: relative;
  z-index: 10;
}

/* STYLED STREET ANIMATIONS */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(1.1); }
}

@keyframes jump {
  0% { height: 4px; }
  100% { height: 35px; }
}

@keyframes static-sweep {
  0% { top: -5%; }
  100% { top: 105%; }
}

@keyframes text-twitch {
  0%, 93%, 98%, 100% { transform: skewX(0deg) scale(1); filter: drop-shadow(0 0 0px transparent); }
  94% { transform: skewX(-8deg) scaleY(1.05); color: var(--signal-green); text-shadow: -2px -2px 0 #000; }
  96% { transform: skewX(8deg) scaleX(0.95); color: var(--accent); text-shadow: 2px 1px 0 #000; }
}

@media (max-width: 480px) {
  .pirate-deck { padding: 30px 15px 20px 15px; box-shadow: 8px 8px 0px #000; }
  .station-identity { font-size: 24px; }
  .deck-controls { flex-direction: column; gap: 15px; }
  .hardware-rack { width: 100%; justify-content: space-around; }
}
</style>
</head>
<body>

<div class="grid-overlay"></div>
<div class="scanline"></div>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="jukebox.html">Jukebox</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<main class="deck-container">
  <div class="pirate-deck" id="pirateDeck">
    
    <div class="broadcast-monitor">
      
      <div class="player-art-frame">
        <img src="images/Pirate Radio/pirateradio.png" alt="Broadcast Media Cover">
      </div>

      <div class="station-identity">MLKSHK Pirate Radio</div>
      <div class="station-subtext">Underground • Live • No Rules</div>
      
      <div class="signal-status-line">
        <div class="status-beacon"></div>
        <span id="status">LINE STANDING BY...</span>
      </div>

      <div class="wave-scope">
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.6s;"></div>
        <div class="scope-bar" style="animation-delay: 0.3s;"></div>
        <div class="scope-bar" style="animation-delay: 0.8s;"></div>
        <div class="scope-bar" style="animation-delay: 0.5s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.7s;"></div>
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
      </div>
    </div>

    <div class="deck-controls">
      <div class="master-switch" id="playPause" title="Engage Stream Broadcast">
        <img id="switchIcon" src="Player/PLAY.png" alt="Play/Stop Link">
      </div>
      
      <div class="hardware-rack">
        <div class="knob-container">
          <span class="knob-label">Color Freq</span>
          <div class="physical-knob" id="knobColor" data-type="color" title="Drag to cycle neon spectrum colors"></div>
        </div>
        <div class="knob-container">
          <span class="knob-label">Opac Mix</span>
          <div class="physical-knob" id="knobOpacity" data-type="opacity" title="Drag to blend chassis alpha transparency"></div>
        </div>
        <div class="knob-container">
          <span class="knob-label">Glow Rig</span>
          <div class="physical-knob" id="knobGlow" data-type="glow" title="Drag to dim or boost underlying neon fixtures"></div>
        </div>
      </div>
    </div>

    <audio id="audio" preload="none"></audio>
  </div>
</main>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const switchIcon = document.getElementById('switchIcon');
const statusEl = document.getElementById('status');
const deck = document.getElementById('pirateDeck');
const body = document.body;
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now(); 
  audio.load();
  
  audio.play().then(() => {
    isPlaying = true;
    deck.classList.add('rig-active');
    body.classList.add('rig-active');
    switchIcon.src = 'Player/PAUSE.png';
    statusEl.textContent = 'TRANSMITTING LIVE //';
  }).catch(e => {
    console.error("Link drop:", e);
    statusEl.textContent = 'ERR: DROP OUT. RETRYING...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = ''; 
  isPlaying = false;
  deck.classList.remove('rig-active');
  body.classList.remove('rig-active');
  switchIcon.src = 'Player/PLAY.png';
  statusEl.textContent = 'BROADCAST KILLED.';
}

btn.onclick = () => {
  if (!isPlaying) {
    playLiveStream();
  } else {
    stopStream();
  }
};

/* AUDIO CORE LISTENERS */
audio.addEventListener('waiting', () => {
  statusEl.textContent = 'HIJACKING SIGNAL...';
});

audio.addEventListener('playing', () => {
  statusEl.textContent = 'TRANSMITTING LIVE //';
  isPlaying = true;
  deck.classList.add('rig-active');
  body.classList.add('rig-active');
});

audio.addEventListener('error', () => {
  if (isPlaying) {
    statusEl.textContent = 'CRIT ERR: RE-ROUTING FREQ...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 2000);
  }
});

audio.addEventListener('stalled', () => {
  if (isPlaying) {
    statusEl.textContent = 'SIGNAL WEAK. RECONNECTING...';
    setTimeout(playLiveStream, 1500);
  }
});

/* INTERACTIVE ANALOG KNOB ROTATION LOGIC */
const knobs = document.querySelectorAll('.physical-knob');
let currentKnob = null;
let startY = 0;
let startAngle = 0;

// Initialize starting positions/values matching CSS variables
const knobStates = {
  color: { angle: 0, minAngle: -150, maxAngle: 150, valMin: 260, valMax: 330, currentVal: 280 }, // HSL Hue values (Purples/Pinks)
  opacity: { angle: -30, minAngle: -150, maxAngle: 150, valMin: 0.1, valMax: 0.95, currentVal: 0.45 }, // Translucency mix
  glow: { angle: 0, minAngle: -150, maxAngle: 150, valMin: 0.05, valMax: 0.8, currentVal: 0.35 } // Glow intensity
};

// Apply initial rotations to hardware interfaces
knobs.forEach(knob => {
  const type = knob.dataset.type;
  knob.style.transform = `rotate(${knobStates[type].angle}deg)`;
  
  knob.addEventListener('mousedown', (e) => {
    currentKnob = knob;
    startY = e.clientY;
    startAngle = knobStates[type].angle;
    e.preventDefault();
  });
  
  // Touch support for mobile layouts
  knob.addEventListener('touchstart', (e) => {
    currentKnob = knob;
    startY = e.touches[0].clientY;
    startAngle = knobStates[type].angle;
    e.preventDefault();
  }, { passive: false });
});

document.addEventListener('mousemove', (e) => {
  if (!currentKnob) return;
  handleKnobMove(e.clientY);
});

document.addEventListener('touchmove', (e) => {
  if (!currentKnob) return;
  handleKnobMove(e.touches[0].clientY);
}, { passive: false });

document.addEventListener('mouseup', () => { currentKnob = null; });
document.addEventListener('touchend', () => { currentKnob = null; });

function handleKnobMove(clientY) {
  const type = currentKnob.dataset.type;
  const state = knobStates[type];
  
  const deltaY = startY - clientY; 
  let targetAngle = startAngle + (deltaY * 1.5); // Sensitivity modifier
  
  // Strict physical rotational constraints
  if (targetAngle < state.minAngle) targetAngle = state.minAngle;
  if (targetAngle > state.maxAngle) targetAngle = state.maxAngle;
  
  state.angle = targetAngle;
  currentKnob.style.transform = `rotate(${targetAngle}deg)`;
  
  // Calculate percentage mapping to interface variables
  const pct = (targetAngle - state.minAngle) / (state.maxAngle - state.minAngle);
  const calculatedValue = state.valMin + (pct * (state.valMax - state.valMin));
  state.currentVal = calculatedValue;
  
  // Map parameters live into CSS operational variables
  if (type === 'color') {
    document.documentElement.style.setProperty('--accent-hue', calculatedValue);
  } else if (type === 'opacity') {
    document.documentElement.style.setProperty('--panel-opacity', calculatedValue);
  } else if (type === 'glow') {
    document.documentElement.style.setProperty('--accent-glow-opacity', calculatedValue);
  }
}

/* MEDIA OS INTEGRATION */
if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Pirate Radio",
    artist: "Underground • Live • No Rules",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }]
  });

  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

/* INTERACTION DROPDOWN LOGIC */
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>
</body>
</html>
