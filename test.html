<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK | PIRATE RADIO</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #070509;
  --panel-bg: rgba(20, 18, 22, 0.88); /* Matches the dark metallic density of the room gear */
  --text: #e2dfe5;
  --muted: #8b7e95;
  --accent: #df49be; /* Neon magenta sampled from the bunker's central sign */
  --accent-glow: rgba(223, 73, 190, 0.4);
  --signal-green: #39ff14; /* Hot terminal green for active meters and statuses */
  --dropdown-bg: #120f14;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  position: relative;
}

/* FULL PAGE DIMMED BACKGROUND IMAGE PORT */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('image.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 1.0; /* Full opacity to showcase the gorgeous bunker room artwork */
  z-index: -2;
  pointer-events: none;
}

/* GRITTY INDUSTRIAL GRID OVERLAY */
.grid-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(223, 73, 190, 0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(223, 73, 190, 0.015) 1px, transparent 1px);
  background-size: 25px 25px;
  z-index: -1;
  pointer-events: none;
}

a { color: inherit; text-decoration: none; }

/* CRT EFFECT OVERLAY - Tailored for hardware-screen immersion */
body::after {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 14, 20, 0) 50%, rgba(0, 0, 0, 0.15) 50%), linear-gradient(90deg, rgba(255, 0, 128, 0.01), rgba(0, 255, 100, 0.01), rgba(0, 100, 255, 0.01));
  z-index: 9999;
  background-size: 100% 4px, 6px 100%;
  pointer-events: none;
}

/* Animated rolling scanline when rig is active */
body.rig-active .scanline {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; right: 0; height: 100%;
  background: linear-gradient(to bottom, transparent 0%, rgba(223, 73, 190, 0.03) 10%, transparent 20%);
  animation: scanline-sweep 4s linear infinite;
  z-index: 9998;
  pointer-events: none;
}

/* NAV BAR */
header.nav-bar {
  border-bottom: 1px solid rgba(223, 73, 190, 0.2);
  padding: 15px 24px;
  background: rgba(14, 11, 16, 0.75);
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
  z-index: 30;
}
.nav-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
}
.logo-link img { height: 38px; display: block; filter: drop-shadow(0 0 4px rgba(223, 73, 190, 0.3)); }
.nav-dropdown { position: relative; }
.nav-toggle {
  background: rgba(223, 73, 190, 0.1);
  border: 1px solid rgba(223, 73, 190, 0.4);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 2px;
  transition: all 0.2s ease;
}
.nav-toggle:hover {
  background: var(--accent);
  color: #000;
  box-shadow: 0 0 15px var(--accent-glow);
}
.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--dropdown-bg);
  border: 1px solid var(--accent);
  border-radius: 2px;
  min-width: 200px;
  z-index: 100;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0,0,0,0.9);
}
.dropdown-menu a {
  display: block;
  padding: 12px 16px;
  color: #fff;
  font-weight: 500;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.dropdown-menu a:hover {
  background: var(--accent);
  color: #000;
  font-weight: 600;
}

/* DECK MAIN RIG */
.deck-container {
  min-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

/* Styled like a custom rack terminal built inside the bunker workbench */
.pirate-deck {
  background: var(--panel-bg);
  border: 2px solid #2d2635;
  border-top: 4px solid var(--accent);
  width: 100%;
  max-width: 440px;
  padding: 35px 30px 25px 30px;
  border-radius: 4px;
  box-shadow: 0 30px 70px rgba(0,0,0,0.95), inset 0 1px 2px rgba(255,255,255,0.05);
  position: relative;
  backdrop-filter: blur(6px);
}

/* Exposed Corner Screws for industrial skeuomorphism */
.pirate-deck::after {
  content: "•       •";
  position: absolute;
  bottom: 6px;
  left: 12px;
  right: 12px;
  font-size: 14px;
  color: #3d3447;
  letter-spacing: 0.1em;
  display: flex;
  justify-content: space-between;
  font-family: serif;
  pointer-events: none;
}

/* Rig ID stamp */
.pirate-deck::before {
  content: "BUNKER_NODE // FREQ_DECK_v2.6";
  position: absolute;
  top: -24px;
  left: 0;
  right: 0;
  text-align: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 11px;
  color: var(--accent);
  letter-spacing: 2px;
  text-shadow: 0 0 8px rgba(223, 73, 190, 0.6);
}

/* TRANSMISSION MONITOR */
.broadcast-monitor {
  background: #09070c;
  border: 1px solid #231d2a;
  padding: 22px;
  border-radius: 4px;
  margin-bottom: 25px;
  position: relative;
  overflow: hidden;
  text-align: center; 
  box-shadow: inset 0 0 20px rgba(0,0,0,0.9);
}

/* Album art window styled like a terminal radar/gauge scope */
.player-art-frame {
  width: 130px;
  height: 130px;
  margin: 0 auto 20px auto;
  border: 2px solid #2e2436;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 20px rgba(0,0,0,0.8);
  background: #0d0a10;
  transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
}

.player-art-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.35;
  filter: grayscale(100%) contrast(120%);
  transition: all 0.4s ease;
}

/* Target transformations when stream is playing */
.rig-active .player-art-frame {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow), inset 0 0 15px rgba(223, 73, 190, 0.3);
}
.rig-active .player-art-frame img {
  opacity: 0.85;
  filter: grayscale(20%) contrast(100%);
  animation: vinyl-spin 15s linear infinite; 
}

.station-identity {
  font-family: 'Orbitron', sans-serif;
  font-size: 21px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 5px;
}

.station-subtext {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 4px;
  color: var(--muted);
  margin-bottom: 18px;
}

/* SIGNAL STATUS */
.signal-status-line {
  display: flex;
  align-items: center;
  justify-content: center; 
  gap: 10px;
  font-family: monospace;
  font-size: 12px;
  letter-spacing: 1px;
  color: #9c8da7;
  border-top: 1px solid rgba(223, 73, 190, 0.1);
  padding-top: 15px;
}

.status-beacon {
  width: 7px;
  height: 7px;
  background: #3a2e44;
  border-radius: 50%;
  transition: all 0.3s ease;
}

/* Active State Styles via parent token */
.rig-active .status-beacon {
  background: var(--signal-green);
  box-shadow: 0 0 12px var(--signal-green);
  animation: pulse 1.2s infinite;
}

/* Audio text glitched visual twitching when active */
.rig-active .station-identity {
  text-shadow: 0 0 10px rgba(223, 73, 190, 0.8);
  animation: text-twitch 3.5s infinite;
}

/* VISUALIZER WAVE (PURE CSS SIMULATION) */
.wave-scope {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 40px;
  margin-top: 18px;
  padding: 0 10px;
  opacity: 0.15;
  transition: opacity 0.3s ease;
}
.rig-active .wave-scope { opacity: 0.9; }

.scope-bar {
  width: 4px;
  height: 5px;
  background: var(--accent);
  border-radius: 1px;
}
/* Alternate visualizer hues to mimic hardware monitoring hardware */
.rig-active .scope-bar { animation: jump 1s ease infinite alternate; }
.rig-active .scope-bar:nth-child(2n) { animation-duration: 0.6s; background: var(--signal-green); }
.rig-active .scope-bar:nth-child(3n) { animation-duration: 0.8s; background: #ffffff; }
.rig-active .scope-bar:nth-child(4n) { animation-duration: 0.4s; background: var(--accent); }
.rig-active .scope-bar:nth-child(5n) { animation-duration: 1.1s; background: var(--signal-green); }

/* MAIN DECK ACTUATOR (BIG SWITCH) */
.deck-controls {
  display: flex;
  justify-content: center;
  margin: 25px 0 15px 0;
}

.master-switch {
  width: 84px;
  height: 84px;
  background: #201a26;
  border: 4px solid #33293d;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 2px 4px rgba(255,255,255,0.05);
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.master-switch::before {
  content: "";
  position: absolute;
  top: 5px; left: 5px; right: 5px; bottom: 5px;
  border-radius: 50%;
  background: linear-gradient(135deg, #2b2234, #120d18);
  border: 1px solid rgba(0, 0, 0, 0.4);
}

.master-switch img {
  width: 28px;
  height: 28px;
  z-index: 2;
  transition: transform 0.2s ease;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.8)) turnPink;
}

.master-switch:hover {
  transform: scale(1.05);
  border-color: #493b58;
}

.master-switch:active {
  transform: scale(0.95);
  box-shadow: 0 5px 10px rgba(0,0,0,0.8);
}

/* Active State Switch */
.rig-active .master-switch {
  border-color: var(--accent);
  box-shadow: 0 0 25px var(--accent-glow), inset 0 0 10px rgba(223, 73, 190, 0.4);
}

/* FOOTER */
footer {
  padding: 30px 20px;
  text-align: center;
  font-size: 12px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
  color: var(--muted);
  border-top: 1px solid rgba(223, 73, 190, 0.1);
  background: rgba(10, 8, 12, 0.9);
  position: relative;
  z-index: 10;
}

/* ANIMATIONS */
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.25); opacity: 0.5; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes jump {
  0% { height: 4px; }
  100% { height: 38px; }
}

@keyframes vinyl-spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes scanline-sweep {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

@keyframes text-twitch {
  0%, 91%, 100% { transform: skewX(0deg); filter: blur(0px); }
  92% { transform: skewX(-6deg) scaleY(1.05); color: var(--signal-green); filter: blur(0.5px); }
  94% { transform: skewX(7deg); color: var(--accent); }
  95% { transform: skewX(0deg); filter: blur(0px); }
}

@media (max-width: 480px) {
  .pirate-deck { padding: 25px 20px 20px 20px; }
  .station-identity { font-size: 19px; }
  .master-switch { width: 76px; height: 76px; }
  .player-art-frame { width: 110px; height: 110px; }
}
</style>
</head>
<body>

<div class="grid-overlay"></div>
<div class="scanline"></div>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="jukebox.html">Jukebox</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<main class="deck-container">
  <div class="pirate-deck" id="pirateDeck">
    
    <div class="broadcast-monitor">
      
      <div class="player-art-frame">
        <img src="images/Pirate Radio/pirateradio.png" alt="Broadcast Media Cover">
      </div>

      <div class="station-identity">MLKSHK Pirate Radio</div>
      <div class="station-subtext">Underground • Live • No Rules</div>
      
      <div class="signal-status-line">
        <div class="status-beacon"></div>
        <span id="status">DECK IS STANDING BY...</span>
      </div>

      <div class="wave-scope">
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.6s;"></div>
        <div class="scope-bar" style="animation-delay: 0.3s;"></div>
        <div class="scope-bar" style="animation-delay: 0.8s;"></div>
        <div class="scope-bar" style="animation-delay: 0.5s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.7s;"></div>
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
      </div>
    </div>

    <div class="deck-controls">
      <div class="master-switch" id="playPause" title="Engage Stream Broadcast">
        <img id="switchIcon" src="Player/PLAY.png" alt="Play/Stop Link">
      </div>
    </div>

    <audio id="audio" preload="none"></audio>
  </div>
</main>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const switchIcon = document.getElementById('switchIcon');
const statusEl = document.getElementById('status');
const deck = document.getElementById('pirateDeck');
const body = document.body;
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now(); 
  audio.load();
  
  audio.play().then(() => {
    isPlaying = true;
    deck.classList.add('rig-active');
    body.classList.add('rig-active');
    switchIcon.src = 'Player/PAUSE.png';
    statusEl.textContent = 'TRANSMITTING LIVE //';
  }).catch(e => {
    console.error("Link drop:", e);
    statusEl.textContent = 'ERR: SIGNAL LOST. RETRYING...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = ''; 
  isPlaying = false;
  deck.classList.remove('rig-active');
  body.classList.remove('rig-active');
  switchIcon.src = 'Player/PLAY.png';
  statusEl.textContent = 'BROADCAST KILLED.';
}

btn.onclick = () => {
  if (!isPlaying) {
    playLiveStream();
  } else {
    stopStream();
  }
};

/* AUDIO CORE LISTENERS */
audio.addEventListener('waiting', () => {
  statusEl.textContent = 'TUNING SIGNAL...';
});

audio.addEventListener('playing', () => {
  statusEl.textContent = 'TRANSMITTING LIVE //';
  isPlaying = true;
  deck.classList.add('rig-active');
  body.classList.add('rig-active');
});

audio.addEventListener('error', () => {
  if (isPlaying) {
    statusEl.textContent = 'CRIT ERR: RE-ROUTING FREQ...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 2000);
  }
});

audio.addEventListener('stalled', () => {
  if (isPlaying) {
    statusEl.textContent = 'SIGNAL WEAK. RECONNECTING...';
    setTimeout(playLiveStream, 1500);
  }
});

/* MEDIA OS INTEGRATION */
if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Pirate Radio",
    artist: "Underground • Live • No Rules",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }]
  });

  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

/* INTERACTION DROPDOWN LOGIC */
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>
</body>
</html>
