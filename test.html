<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK | PIRATE RADIO</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #060407;
  --panel-bg: rgba(10, 6, 12, 0.9); /* Darker purple-tinged black shadow */
  --text: #f4eaff;
  --muted: #7f6e8c;
  --accent: #bc34fa; /* Neon purple sampled from image.png */
  --accent-glow: rgba(188, 52, 250, 0.35);
  --signal-green: #39ff14; /* Toxic warning green */
  --dropdown-bg: #08050a;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  position: relative;
}

/* BACKGROUND IMAGE OVERRIDE */
body::before {
  content: "";
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: url('images/Pirate Radio/pirateradio_header.png');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  opacity: 1.0; 
  z-index: -2;
  pointer-events: none;
}

/* HALF-TONE / POSTER PRINT STREET PATTERN */
.grid-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    radial-gradient(rgba(188, 52, 250, 0.015) 1.5px, transparent 1.5px),
    linear-gradient(rgba(0, 0, 0, 0.35) 1px, transparent 1px);
  background-size: 16px 16px, 100% 4px; /* Softened gap spacing */
  z-index: -1;
  pointer-events: none;
}

a { color: inherit; text-decoration: none; }

/* CRT/VHS GLITCH OVERLAY - Subtly balanced for high readability */
body::after {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(14, 10, 16, 0) 60%, rgba(0, 0, 0, 0.15) 60%), linear-gradient(90deg, rgba(188, 52, 250, 0.01), rgba(0, 255, 100, 0.005), rgba(0, 100, 255, 0.01));
  z-index: 9999;
  background-size: 100% 8px, 12px 100%;
  pointer-events: none;
}

/* VHS tracking static sweep when transmitting - softened */
body.rig-active .scanline {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; right: 0; height: 10px;
  background: rgba(188, 52, 250, 0.06);
  box-shadow: 0 0 15px rgba(188, 52, 250, 0.15);
  filter: blur(3px);
  animation: static-sweep 4.5s linear infinite;
  z-index: 9998;
  pointer-events: none;
}

/* NAV BAR - Street Punk Contrast border */
header.nav-bar {
  border-bottom: 2px solid #000;
  box-shadow: 0 4px 0 var(--accent);
  padding: 15px 24px;
  background: #08050a;
  position: sticky;
  top: 0;
  z-index: 30;
}
.nav-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
}
.logo-link img { height: 38px; display: block; }
.nav-dropdown { position: relative; }
.nav-toggle {
  background: #000;
  border: 2px solid var(--text);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 0px; 
  box-shadow: 3px 3px 0px var(--accent);
  transition: all 0.1s ease-in-out;
}
.nav-toggle:hover {
  transform: translate(2px, 2px);
  box-shadow: 1px 1px 0px var(--accent);
  background: var(--accent);
  color: #000;
}
.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 10px);
  right: 0;
  background: #000;
  border: 3px solid var(--accent);
  border-radius: 0px;
  min-width: 200px;
  z-index: 100;
  overflow: hidden;
}
.dropdown-menu a {
  display: block;
  padding: 12px 16px;
  color: #fff;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-bottom: 1px solid #130d1a;
}
.dropdown-menu a:hover {
  background: var(--text);
  color: #000;
}

/* DECK MAIN RIG */
.deck-container {
  min-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

/* Street flyer / Underground hardware style */
.pirate-deck {
  background: var(--panel-bg);
  border: 3px solid #000;
  width: 100%;
  max-width: 430px;
  padding: 35px 25px 25px 25px;
  border-radius: 0px; 
  box-shadow: 12px 12px 0px #000; 
  position: relative;
  backdrop-filter: blur(10px);
}

/* Tape/Sticker Label detailing */
.pirate-deck::before {
  content: "PROPERTY OF MLKSHK NOISE Underground // AUTH_REQ";
  position: absolute;
  top: -15px;
  left: 15px;
  background: var(--accent);
  padding: 2px 10px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 9px;
  color: #000;
  letter-spacing: 1px;
  transform: rotate(-1.5deg);
  box-shadow: 2px 2px 0 #000;
}

/* TRANSMISSION MONITOR */
.broadcast-monitor {
  background: #030204;
  border: 2px solid #000;
  padding: 25px 20px;
  position: relative;
  overflow: hidden;
  text-align: center; 
}

/* Cover Window framed like a distressed stencil cutout */
.player-art-frame {
  width: 140px;
  height: 140px;
  margin: 0 auto 20px auto;
  border: 3px solid #000;
  border-radius: 0px; 
  overflow: hidden;
  position: relative;
  background: #0a060d;
  transform: rotate(1deg);
  box-shadow: 4px 4px 0px rgba(0,0,0,0.8);
  transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.player-art-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.3;
  filter: grayscale(100%) contrast(140%);
  transition: all 0.3s ease;
}

/* Triggered transformations on active broadcast */
.rig-active .player-art-frame {
  border-color: var(--accent);
  transform: rotate(-1deg) scale(1.02);
  box-shadow: 6px 6px 0px #000;
}
.rig-active .player-art-frame img {
  opacity: 0.85;
  filter: grayscale(0%) contrast(110%);
}

/* Graffiti Font style for the core crew emblem */
.station-identity {
  font-family: 'Permanent Marker', 'Orbitron', sans-serif;
  font-size: 28px;
  letter-spacing: 1px;
  color: #fff;
  margin-bottom: 0px;
  transform: scaleY(1.05);
  text-shadow: 3px 3px 0px #000;
}

.station-subtext {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--accent);
  margin-bottom: 20px;
}

/* SIGNAL STATUS */
.signal-status-line {
  display: flex;
  align-items: center;
  justify-content: center; 
  gap: 10px;
  font-family: monospace;
  font-size: 13px;
  font-weight: bold;
  color: #fff;
  background: #0a060d;
  border: 1px solid #1a1122;
  padding: 8px;
}

.status-beacon {
  width: 9px;
  height: 9px;
  background: #230a30;
  border: 1px solid #000;
  transition: all 0.2s ease;
}

/* Active State Signal Styles */
.rig-active .status-beacon {
  background: var(--signal-green);
  box-shadow: 0 0 10px var(--signal-green);
  animation: pulse 1s infinite steps(2); 
}

/* Glitched visual twitching when active */
.rig-active .station-identity {
  color: #fff;
  animation: text-twitch 2.5s infinite;
}

/* AUDIO METERS */
.wave-scope {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 35px;
  margin-top: 20px;
  padding: 0 5px;
  opacity: 0.15;
}
.rig-active .wave-scope { opacity: 1; }

.scope-bar {
  width: 6px;
  height: 4px;
  background: #000;
  border: 1px solid rgba(255, 255, 255, 0.08);
}
/* Brutalist brick-style signal EQ stacks */
.rig-active .scope-bar { animation: jump 0.8s ease infinite alternate; }
.rig-active .scope-bar:nth-child(odd) { background: var(--accent); }
.rig-active .scope-bar:nth-child(even) { background: var(--signal-green); animation-duration: 0.5s; }
.rig-active .scope-bar:nth-child(3n) { background: #ffffff; animation-duration: 0.7s; }

/* THE INITIATION ACTUATOR */
.deck-controls {
  display: flex;
  justify-content: center;
  margin: 25px 0 5px 0;
}

.master-switch {
  width: 80px;
  height: 80px;
  background: #11091a;
  border: 3px solid #000;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  box-shadow: 5px 5px 0px #000;
  transition: all 0.1s ease-in-out;
}

.master-switch img {
  width: 30px;
  height: 30px;
  z-index: 2;
}

.master-switch:hover {
  transform: translate(-2px, -2px);
  box-shadow: 7px 7px 0px var(--accent);
  background: #190e26;
}

.master-switch:active {
  transform: translate(4px, 4px);
  box-shadow: 1px 1px 0px #000;
}

/* Active State Switch */
.rig-active .master-switch {
  background: var(--accent);
  border-color: #000;
}
.rig-active .master-switch img {
  filter: invert(1); 
}

/* FOOTER */
footer {
  padding: 30px 20px;
  text-align: center;
  font-size: 11px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--muted);
  border-top: 2px solid #000;
  background: #050306;
  position: relative;
  z-index: 10;
}

/* STYLED STREET ANIMATIONS */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.3; transform: scale(1.1); }
}

@keyframes jump {
  0% { height: 4px; }
  100% { height: 35px; }
}

@keyframes static-sweep {
  0% { top: -5%; }
  100% { top: 105%; }
}

@keyframes text-twitch {
  0%, 93%, 98%, 100% { transform: skewX(0deg) scale(1); filter: drop-shadow(0 0 0px transparent); }
  94% { transform: skewX(-12deg) scaleY(1.1); color: var(--signal-green); text-shadow: -3px -3px 0 #000; }
  96% { transform: skewX(12deg) scaleX(0.9); color: var(--accent); text-shadow: 4px 2px 0 #000; }
}

@media (max-width: 480px) {
  .pirate-deck { padding: 30px 15px 20px 15px; box-shadow: 8px 8px 0px #000; }
  .station-identity { font-size: 24px; }
  .master-switch { width: 70px; height: 70px; }
  .player-art-frame { width: 120px; height: 120px; }
}
</style>
</head>
<body>

<div class="grid-overlay"></div>
<div class="scanline"></div>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="jukebox.html">Jukebox</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<main class="deck-container">
  <div class="pirate-deck" id="pirateDeck">
    
    <div class="broadcast-monitor">
      
      <div class="player-art-frame">
        <img src="images/Pirate Radio/pirateradio.png" alt="Broadcast Media Cover">
      </div>

      <div class="station-identity">MLKSHK Pirate Radio</div>
      <div class="station-subtext">Underground • Live • No Rules</div>
      
      <div class="signal-status-line">
        <div class="status-beacon"></div>
        <span id="status">LINE STANDING BY...</span>
      </div>

      <div class="wave-scope">
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.6s;"></div>
        <div class="scope-bar" style="animation-delay: 0.3s;"></div>
        <div class="scope-bar" style="animation-delay: 0.8s;"></div>
        <div class="scope-bar" style="animation-delay: 0.5s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.7s;"></div>
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
      </div>
    </div>

    <div class="deck-controls">
      <div class="master-switch" id="playPause" title="Engage Stream Broadcast">
        <img id="switchIcon" src="Player/PLAY.png" alt="Play/Stop Link">
      </div>
    </div>

    <audio id="audio" preload="none"></audio>
  </div>
</main>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const switchIcon = document.getElementById('switchIcon');
const statusEl = document.getElementById('status');
const deck = document.getElementById('pirateDeck');
const body = document.body;
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now(); 
  audio.load();
  
  audio.play().then(() => {
    isPlaying = true;
    deck.classList.add('rig-active');
    body.classList.add('rig-active');
    switchIcon.src = 'Player/PAUSE.png';
    statusEl.textContent = 'TRANSMITTING LIVE //';
  }).catch(e => {
    console.error("Link drop:", e);
    statusEl.textContent = 'ERR: DROP OUT. RETRYING...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = ''; 
  isPlaying = false;
  deck.classList.remove('rig-active');
  body.classList.remove('rig-active');
  switchIcon.src = 'Player/PLAY.png';
  statusEl.textContent = 'BROADCAST KILLED.';
}

btn.onclick = () => {
  if (!isPlaying) {
    playLiveStream();
  } else {
    stopStream();
  }
};

/* AUDIO CORE LISTENERS */
audio.addEventListener('waiting', () => {
  statusEl.textContent = 'HIJACKING SIGNAL...';
});

audio.addEventListener('playing', () => {
  statusEl.textContent = 'TRANSMITTING LIVE //';
  isPlaying = true;
  deck.classList.add('rig-active');
  body.classList.add('rig-active');
});

audio.addEventListener('error', () => {
  if (isPlaying) {
    statusEl.textContent = 'CRIT ERR: RE-ROUTING FREQ...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 2000);
  }
});

audio.addEventListener('stalled', () => {
  if (isPlaying) {
    statusEl.textContent = 'SIGNAL WEAK. RECONNECTING...';
    setTimeout(playLiveStream, 1500);
  }
});

/* MEDIA OS INTEGRATION */
if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Pirate Radio",
    artist: "Underground • Live • No Rules",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }]
  });

  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

/* INTERACTION DROPDOWN LOGIC */
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>
</body>
</html>
