<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK | PIRATE RADIO</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0a0a0c;
  --panel-bg: #111115;
  --text: #ffffff;
  --muted: #707080;
  --accent: #ff2aa1;
  --accent-glow: rgba(255, 42, 161, 0.25);
  --signal-green: #00ff66;
  --dropdown-bg: #0a0a0c;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  /* Gritty industrial grid background overlay */
  background-image: 
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 20px 20px;
}

a { color: inherit; text-decoration: none; }

/* CRT EFFECT OVERLAY */
body::after {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  z-index: 9999;
  background-size: 100% 4px, 6px 100%;
  pointer-events: none;
}

/* COOL EFFECT: Animated rolling scanline when rig is active */
body.rig-active::before {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; right: 0; height: 100%;
  background: linear-gradient(to bottom, transparent 0%, rgba(255, 42, 161, 0.04) 10%, transparent 20%);
  animation: scanline-sweep 6s linear infinite;
  z-index: 9998;
  pointer-events: none;
}

/* NAV BAR */
header.nav-bar {
  border-bottom: 1px solid rgba(255, 42, 161, 0.15);
  padding: 18px 24px;
  background: rgba(10, 10, 12, 0.85);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 30;
}
.nav-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
}
.logo-link img { height: 42px; display: block; }
.nav-dropdown { position: relative; }
.nav-toggle {
  background: rgba(255, 42, 161, 0.1);
  border: 1px solid rgba(255, 42, 161, 0.3);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 4px;
  transition: all 0.2s ease;
}
.nav-toggle:hover {
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}
.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--dropdown-bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  min-width: 200px;
  z-index: 100;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.8);
}
.dropdown-menu a {
  display: block;
  padding: 12px 16px;
  color: #fff;
  font-weight: 500;
}
.dropdown-menu a:hover {
  background: var(--accent);
  color: #000;
  font-weight: 600;
}

/* DECK MAIN RIG */
.deck-container {
  min-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

.pirate-deck {
  background: var(--panel-bg);
  border: 2px solid #22222b;
  border-top: 4px solid var(--accent);
  width: 100%;
  max-width: 450px;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
}

/* Rig ID stamp */
.pirate-deck::before {
  content: "SYS-LOC // LIVE BROADCAST RIG v2.6";
  position: absolute;
  top: -22px;
  left: 0;
  font-family: 'Orbitron', sans-serif;
  font-size: 10px;
  color: var(--accent);
  letter-spacing: 1px;
}

/* TRANSMISSION MONITOR */
.broadcast-monitor {
  background: #050507;
  border: 1px solid #22222b;
  padding: 20px;
  border-radius: 6px;
  margin-bottom: 25px;
  position: relative;
  overflow: hidden;
  text-align: center; /* Centered content structure */
}

.broadcast-monitor::after {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.4));
  pointer-events: none;
}

/* COOL EFFECT: Album art window at the top of the deck */
.player-art-frame {
  width: 120px;
  height: 120px;
  margin: 0 auto 15px auto;
  border: 1px solid #22222b;
  border-radius: 50%;
  overflow: hidden;
  position: relative;
  box-shadow: 0 0 15px rgba(0,0,0,0.6);
  background: #111;
  transition: all 0.4s ease;
}

.player-art-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0.5;
  filter: grayscale(80%);
  transition: all 0.4s ease;
}

/* Target transformations when stream is playing */
.rig-active .player-art-frame {
  border-color: var(--accent);
  box-shadow: 0 0 15px var(--accent-glow);
}
.rig-active .player-art-frame img {
  opacity: 1;
  filter: grayscale(0%);
  animation: vinyl-spin 12s linear infinite; /* Cool vinyl rotation animation */
}

.station-identity {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 4px;
}

.station-subtext {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 15px;
}

/* SIGNAL STATUS */
.signal-status-line {
  display: flex;
  align-items: center;
  justify-content: center; /* Centers the status items horizontally */
  gap: 10px;
  font-family: monospace;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 12px;
}

.status-beacon {
  width: 8px;
  height: 8px;
  background: #404050;
  border-radius: 50%;
  transition: all 0.3s ease;
}

/* Active State Styles via parent token */
.rig-active .status-beacon {
  background: var(--signal-green);
  box-shadow: 0 0 10px var(--signal-green);
  animation: pulse 1.5s infinite;
}

/* COOL EFFECT: Audio text glitched visual twitching when active */
.rig-active .station-identity {
  text-shadow: 0 0 8px var(--accent-glow);
  animation: text-twitch 4s infinite;
}

/* INDUSTRIAL FX VISUALIZER WAVE (PURE CSS SIMULATION) */
.wave-scope {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 35px;
  margin-top: 15px;
  padding: 0 5px;
  opacity: 0.25;
  transition: opacity 0.3s ease;
}
.rig-active .wave-scope { opacity: 0.85; }

.scope-bar {
  width: 4px;
  height: 4px;
  background: var(--accent);
  border-radius: 2px;
}
/* Visualizer animations when live */
.rig-active .scope-bar { animation: jump 1.2s ease infinite alternate; }
.rig-active .scope-bar:nth-child(2n) { animation-duration: 0.7s; background: #fff; }
.rig-active .scope-bar:nth-child(3n) { animation-duration: 0.9s; }
.rig-active .scope-bar:nth-child(4n) { animation-duration: 0.5s; background: var(--accent); }
.rig-active .scope-bar:nth-child(5n) { animation-duration: 1.1s; }

/* MAIN DECK ACTUATOR (BIG BUTTON) */
.deck-controls {
  display: flex;
  justify-content: center;
  margin: 30px 0 10px 0;
}

.master-switch {
  width: 90px;
  height: 90px;
  background: #1c1c24;
  border: 4px solid #2d2d3a;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  position: relative;
  box-shadow: 0 8px 16px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.1);
  transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.master-switch::before {
  content: "";
  position: absolute;
  top: 6px; left: 6px; right: 6px; bottom: 6px;
  border-radius: 50%;
  background: linear-gradient(135deg, #252530, #121217);
  border: 1px solid rgba(0, 0, 0, 0.5);
}

.master-switch img {
  width: 32px;
  height: 32px;
  z-index: 2;
  transition: transform 0.2s ease;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}

.master-switch:hover {
  transform: scale(1.04);
  border-color: #3b3b4c;
}

.master-switch:active {
  transform: scale(0.96);
  box-shadow: 0 4px 8px rgba(0,0,0,0.7);
}

/* Active State Switch */
.rig-active .master-switch {
  border-color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}

/* FOOTER */
footer {
  padding: 28px 20px;
  text-align: center;
  font-size: 13px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  color: var(--muted);
  border-top: 1px solid rgba(255,42,161,0.1);
  background: rgba(10, 10, 12, 0.6);
}

/* ANIMATIONS */
@keyframes pulse {
  0% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.2); opacity: 0.4; }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes jump {
  0% { height: 4px; }
  100% { height: 32px; }
}

@keyframes vinyl-spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes scanline-sweep {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

@keyframes text-twitch {
  0%, 92%, 100% { transform: skewX(0deg); }
  93% { transform: skewX(-4deg) scaleY(1.05); color: #00ff66; }
  94% { transform: skewX(5deg); color: var(--accent); }
  95% { transform: skewX(0deg); }
}

@media (max-width: 480px) {
  .pirate-deck { padding: 20px; }
  .station-identity { font-size: 18px; }
  .master-switch { width: 80px; height: 80px; }
  .player-art-frame { width: 100px; height: 100px; }
}
</style>
</head>
<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<main class="deck-container">
  <!-- Interactive UI container class dynamically toggles state via JS -->
  <div class="pirate-deck" id="pirateDeck">
    
    <!-- SIGNAL DISPLAY UNIT -->
    <div class="broadcast-monitor">
      
      <!-- NEW ARTWORK PORT: Displays random.png inside an industrial styled frame -->
      <div class="player-art-frame">
        <img src="random.png" alt="Broadcast Media Cover">
      </div>

      <div class="station-identity">MLKSHK Pirate Radio</div>
      <div class="station-subtext">Underground • Live • No Rules</div>
      
      <div class="signal-status-line">
        <div class="status-beacon"></div>
        <span id="status">DECK IS STANDING BY...</span>
      </div>

      <!-- CSS Simulated Graphic equalizer spectrum -->
      <div class="wave-scope">
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.6s;"></div>
        <div class="scope-bar" style="animation-delay: 0.3s;"></div>
        <div class="scope-bar" style="animation-delay: 0.8s;"></div>
        <div class="scope-bar" style="animation-delay: 0.5s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.7s;"></div>
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
      </div>
    </div>

    <!-- MECHANICAL ENGAGEMENT ACTUATOR -->
    <div class="deck-controls">
      <div class="master-switch" id="playPause" title="Engage Stream Broadcast">
        <img id="switchIcon" src="Player/PLAY.png" alt="Play/Stop Link">
      </div>
    </div>

    <audio id="audio" preload="none"></audio>
  </div>
</main>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const switchIcon = document.getElementById('switchIcon');
const statusEl = document.getElementById('status');
const deck = document.getElementById('pirateDeck');
const body = document.body;
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now(); // Decouple cache lines
  audio.load();
  
  audio.play().then(() => {
    isPlaying = true;
    deck.classList.add('rig-active');
    body.classList.add('rig-active');
    switchIcon.src = 'Player/PAUSE.png';
    statusEl.textContent = 'TRANSMITTING LIVE //';
  }).catch(e => {
    console.error("Link drop:", e);
    statusEl.textContent = 'ERR: SIGNAL LOST. RETRYING...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = ''; // Sever buffer pool immediately
  isPlaying = false;
  deck.classList.remove('rig-active');
  body.classList.remove('rig-active');
  switchIcon.src = 'Player/PLAY.png';
  statusEl.textContent = 'BROADCAST KILLED.';
}

btn.onclick = () => {
  if (!isPlaying) {
    playLiveStream();
  } else {
    stopStream();
  }
};

/* AUDIO CORE LISTENERS */
audio.addEventListener('waiting', () => {
  statusEl.textContent = 'TUNING SIGNAL...';
});

audio.addEventListener('playing', () => {
  statusEl.textContent = 'TRANSMITTING LIVE //';
  isPlaying = true;
  deck.classList.add('rig-active');
  body.classList.add('rig-active');
});

audio.addEventListener('error', () => {
  if (isPlaying) {
    statusEl.textContent = 'CRIT ERR: RE-ROUTING FREQ...';
    deck.classList.remove('rig-active');
    body.classList.remove('rig-active');
    setTimeout(playLiveStream, 2000);
  }
});

audio.addEventListener('stalled', () => {
  if (isPlaying) {
    statusEl.textContent = 'SIGNAL WEAK. RECONNECTING...';
    setTimeout(playLiveStream, 1500);
  }
});

/* MEDIA OS INTEGRATION */
if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: "MLKSHK Pirate Radio",
    artist: "Underground • Live • No Rules",
    album: "MLKSHK Digital",
    artwork: [{ src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }]
  });

  navigator.mediaSession.setActionHandler('play', playLiveStream);
  navigator.mediaSession.setActionHandler('pause', stopStream);
}

/* INTERACTION DROPDOWN LOGIC */
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
});

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>
</body>
</html>
