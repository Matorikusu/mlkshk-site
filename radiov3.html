<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK | PIRATE RADIO</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0a0a0c;
  --panel-bg: #111115;
  --text: #ffffff;
  --muted: #707080;
  --accent: #ff2aa1;
  --accent-glow: rgba(255, 42, 161, 0.25);
  --signal-green: #00ff66;
  --dropdown-bg: #0a0a0c;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  color: var(--text);
  overflow-x: hidden;
  
  /* Fixed Background */
  background: var(--bg) url('fixed.png') center/cover no-repeat fixed;
  
  /* Gritty grid overlay on top of background */
  background-image: 
    url('fixed.png'),
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: cover, 20px 20px, 20px 20px;
  background-position: center, 0 0, 0 0;
  background-attachment: fixed, scroll, scroll;
}

/* Center main content better */
.deck-container {
  min-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  box-sizing: border-box;
  text-align: center; /* Centers text inside */
}

/* Center text in key areas */
.station-identity,
.station-subtext,
.signal-status-line,
footer {
  text-align: center;
}

/* NAV BAR */
header.nav-bar {
  border-bottom: 1px solid rgba(255, 42, 161, 0.15);
  padding: 18px 24px;
  background: rgba(10, 10, 12, 0.85);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 30;
}

.nav-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
}

/* Rest of your original styles (unchanged) */
.pirate-deck {
  background: var(--panel-bg);
  border: 2px solid #22222b;
  border-top: 4px solid var(--accent);
  width: 100%;
  max-width: 450px;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  text-align: center;
}

.station-identity {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #fff;
  margin-bottom: 4px;
}

.station-subtext {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: var(--muted);
  margin-bottom: 15px;
}

/* CRT EFFECT OVERLAY */
body::after {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  z-index: 9999;
  background-size: 100% 4px, 6px 100%;
  pointer-events: none;
}

/* Keep all your other original styles below... */
.nav-dropdown { position: relative; }
.nav-toggle {
  background: rgba(255, 42, 161, 0.1);
  border: 1px solid rgba(255, 42, 161, 0.3);
  color: #fff;
  font-family: 'Orbitron', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  padding: 8px 16px;
  border-radius: 4px;
  transition: all 0.2s ease;
}
.nav-toggle:hover {
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}

.dropdown-menu {
  display: none;
  position: absolute;
  top: calc(100% + 8px);
  right: 0;
  background: var(--dropdown-bg);
  border: 1px solid var(--accent);
  border-radius: 4px;
  min-width: 200px;
  z-index: 100;
  overflow: hidden;
  box-shadow: 0 8px 24px rgba(0,0,0,0.8);
}

.dropdown-menu a {
  display: block;
  padding: 12px 16px;
  color: #fff;
  font-weight: 500;
}

.dropdown-menu a:hover {
  background: var(--accent);
  color: #000;
  font-weight: 600;
}

/* ... (keeping the rest of your styles exactly as they were) */
.broadcast-monitor {
  background: #050507;
  border: 1px solid #22222b;
  padding: 20px;
  border-radius: 6px;
  margin-bottom: 25px;
  position: relative;
  overflow: hidden;
}

.signal-status-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: monospace;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 12px;
}

.wave-scope {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 35px;
  margin-top: 15px;
  padding: 0 5px;
  opacity: 0.25;
}

.deck-controls {
  display: flex;
  justify-content: center;
  margin: 30px 0 10px 0;
}

/* Footer */
footer {
  padding: 28px 20px;
  text-align: center;
  font-size: 13px;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
  color: var(--muted);
  border-top: 1px solid rgba(255,42,161,0.1);
  background: rgba(10, 10, 12, 0.6);
}

/* Your animations remain unchanged */
@keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.4; } 100% { transform: scale(1); opacity: 1; } }
@keyframes jump { 0% { height: 4px; } 100% { height: 32px; } }

@media (max-width: 480px) {
  .pirate-deck { padding: 20px; }
  .station-identity { font-size: 18px; }
  .master-switch { width: 80px; height: 80px; }
}
</style>
</head>

</html>
