<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK | PIRATE RADIO</title>
<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #0a0a0c;
  --panel-bg: #111115;
  --text: #ffffff;
  --muted: #707080;
  --accent: #ff2aa1;
  --accent-glow: rgba(255, 42, 161, 0.25);
  --signal-green: #00ff66;
  --dropdown-bg: #0a0a0c;
}

html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  background-image:
    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
  background-size: 20px 20px;
}

a { color: inherit; text-decoration: none; }

/* CRT EFFECT */
body::after {
  content: " ";
  display: block;
  position: fixed;
  top: 0; left: 0; bottom: 0; right: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
              linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
  z-index: 9999;
  background-size: 100% 4px, 6px 100%;
  pointer-events: none;
}

/* NAV BAR */
header.nav-bar {
  border-bottom: 1px solid rgba(255, 42, 161, 0.15);
  padding: 18px 24px;
  background: rgba(10, 10, 12, 0.85);
  backdrop-filter: blur(8px);
  position: sticky;
  top: 0;
  z-index: 30;
}

.nav-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  max-width: 1200px;
  margin: 0 auto;
}

.logo-link img { height: 42px; display: block; }

/* CENTERED TEXT IMPROVEMENTS */
.broadcast-monitor {
  text-align: center;
}

.station-identity,
.station-subtext,
.signal-status-line {
  text-align: center;
}

.station-identity {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}

/* PLAYER IMAGE */
.player-image {
  width: 100%;
  max-width: 180px;
  height: 180px;
  object-fit: cover;
  border: 2px solid var(--accent);
  border-radius: 8px;
  margin: 15px auto;
  box-shadow: 0 0 20px var(--accent-glow);
  display: block;
}

/* Rest of your original styles... */
.pirate-deck {
  background: var(--panel-bg);
  border: 2px solid #22222b;
  border-top: 4px solid var(--accent);
  width: 100%;
  max-width: 450px;
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05);
  position: relative;
  margin: 0 auto;
}

.broadcast-monitor {
  background: #050507;
  border: 1px solid #22222b;
  padding: 20px;
  border-radius: 6px;
  margin-bottom: 25px;
  position: relative;
  overflow: hidden;
}

.signal-status-line {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: monospace;
  font-size: 12px;
  color: var(--muted);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding-top: 12px;
}

/* Keep your existing styles for wave-scope, controls, etc. */
.wave-scope {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  height: 35px;
  margin: 15px auto;
  padding: 0 5px;
  opacity: 0.25;
  max-width: 280px;
}

.deck-controls {
  display: flex;
  justify-content: center;
  margin: 30px 0 10px 0;
}

/* ... (keeping all your other styles intact) ... */
</style>
</head>
<body>
<header class="nav-bar">
  <div class="nav-content">
    <a href="index.html" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
    </a>
    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="access.html">Access</a>
        <a href="archive.html">Archive</a>
        <a href="pirateradio.html">Pirate Radio</a>
        <a href="lab.html">The Lab</a>
        <a href="universe.html">The Universe</a>
      </div>
    </div>
  </div>
</header>

<main class="deck-container">
  <div class="pirate-deck" id="pirateDeck">
    
    <div class="broadcast-monitor">
      <div class="station-identity">MLKSHK Pirate Radio</div>
      <div class="station-subtext">Underground • Live • No Rules</div>
      
      <!-- NEW: Random Player Image -->
      <img src="random.png" alt="MLKSHK Player" class="player-image">
      
      <div class="signal-status-line">
        <div class="status-beacon"></div>
        <span id="status">DECK IS STANDING BY...</span>
      </div>
      
      <div class="wave-scope">
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.6s;"></div>
        <div class="scope-bar" style="animation-delay: 0.3s;"></div>
        <div class="scope-bar" style="animation-delay: 0.8s;"></div>
        <div class="scope-bar" style="animation-delay: 0.5s;"></div>
        <div class="scope-bar" style="animation-delay: 0.2s;"></div>
        <div class="scope-bar" style="animation-delay: 0.7s;"></div>
        <div class="scope-bar" style="animation-delay: 0.1s;"></div>
        <div class="scope-bar" style="animation-delay: 0.4s;"></div>
      </div>
    </div>

    <div class="deck-controls">
      <div class="master-switch" id="playPause" title="Engage Stream Broadcast">
        <img id="switchIcon" src="Player/PLAY.png" alt="Play/Stop Link">
      </div>
    </div>
    <audio id="audio" preload="none"></audio>
  </div>
</main>

<footer>
  MLKSHK Digital — Built for the misfits. © <span id="year"></span>
</footer>

<script>
document.getElementById('year').textContent = new Date().getFullYear();

const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const switchIcon = document.getElementById('switchIcon');
const statusEl = document.getElementById('status');
const deck = document.getElementById('pirateDeck');
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";
let isPlaying = false;

// ... (rest of your JavaScript remains unchanged)
function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now();
  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    deck.classList.add('rig-active');
    switchIcon.src = 'Player/PAUSE.png';
    statusEl.textContent = 'TRANSMITTING LIVE //';
  }).catch(e => {
    console.error("Link drop:", e);
    statusEl.textContent = 'ERR: SIGNAL LOST. RETRYING...';
    deck.classList.remove('rig-active');
    setTimeout(playLiveStream, 1500);
  });
}

function stopStream() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  deck.classList.remove('rig-active');
  switchIcon.src = 'Player/PLAY.png';
  statusEl.textContent = 'BROADCAST KILLED.';
}

btn.onclick = () => {
  if (!isPlaying) playLiveStream();
  else stopStream();
};

// Rest of your event listeners...
</script>
</body>
</html>
