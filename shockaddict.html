<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOCKADDICT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        :root {
            --lime: #39FF14;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Press Start 2P', system-ui;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            border-bottom: 2px solid var(--lime);
            z-index: 1000;
            padding: 20px 0;
        }
        
        nav {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
        }
        
        .logo {
            font-size: 26px;
            color: var(--lime);
            letter-spacing: 6px;
            text-shadow: 0 0 15px var(--lime);
        }
        
        .nav-links a {
            color: #ddd;
            text-decoration: none;
            margin-left: 50px;
            font-size: 13px;
            transition: 0.3s;
        }
        
        .nav-links a:hover {
            color: var(--lime);
            text-shadow: 0 0 10px var(--lime);
        }
        
        .hero {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                        url('https://picsum.photos/id/1015/2000/1200') center/cover;
        }
        
        .hero h1 {
            font-size: 68px;
            color: var(--lime);
            text-shadow: 0 0 30px var(--lime);
            letter-spacing: 12px;
            margin-bottom: 20px;
        }
        
        .tagline {
            font-size: 16px;
            color: #777;
            letter-spacing: 4px;
            margin-bottom: 60px;
        }
        
        .cta {
            border: 2px solid var(--lime);
            color: var(--lime);
            padding: 18px 50px;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.4s;
        }
        
        .cta:hover {
            background: var(--lime);
            color: #000;
        }
        
        section {
            padding: 140px 40px;
            max-width: 1100px;
            margin: 0 auto;
        }
        
        h2 {
            color: var(--lime);
            text-align: center;
            font-size: 28px;
            margin-bottom: 70px;
            letter-spacing: 6px;
        }
        
        .releases {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
        }
        
        .card {
            border: 1px solid #222;
            padding: 25px;
            transition: 0.4s;
        }
        
        .card:hover {
            border-color: var(--lime);
        }
        
        .card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            border: 1px solid var(--lime);
        }
        
        .footer {
            text-align: center;
            padding: 80px 20px 60px;
            border-top: 1px solid #111;
            color: #444;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">SHOCKADDICT</div>
            <div class="nav-links">
                <a href="#releases">RELEASES</a>
                <a href="https://mlkshkdigital.com" target="_blank">MLKSHK</a>
                <a href="#live">LIVE</a>
                <a href="#lab">THE LAB</a>
            </div>
        </nav>
    </header>

    <section class="hero">
        <div>
            <h1>SHOCKADDICT</h1>
            <p class="tagline">SIGNAL FROM THE UNDERGROUND</p>
            <a href="#releases" class="cta">TUNE IN</a>
