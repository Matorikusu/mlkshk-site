<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>After Curfew</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Rajdhani', system-ui, sans-serif;
        color: white;
    }

    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
    }

    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 1.5s ease;
    }

    .entrance {
        text-align: center;
        z-index: 11;
        opacity: 0;
        transform: scale(0.75);
        transition: all 1.3s ease;
    }

    .entrance.show {
        opacity: 1;
        transform: scale(1);
    }

    #entrance-img {
        width: 95%;
        max-width: 1100px;
        border: 10px solid #fff;
        box-shadow: 0 0 60px rgba(0, 255, 200, 0.6);
        border-radius: 12px;
    }

    #enter-btn {
        margin-top: 35px;
        padding: 18px 60px;
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
        background: #00ffcc;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(0, 255, 204, 0.5);
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 3px;
    }

    #enter-btn:hover {
        background: #00ffaa;
        color: #000;
        transform: scale(1.08);
    }
</style>
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline id="bg-video"></video>

    <!-- Club Music -->
    <audio id="club-music" preload="auto" loop>
        <source src="Audio/Locations/After Curfew/after-curfew-main.mp3" type="audio/mpeg">
    </audio>

    <!-- Entrance Overlay -->
    <div id="overlay">
        <div class="entrance" id="entrance-container">
            <img src="images/Locations/After Curfew/after-curfew-entrance.jpg" id="entrance-img" alt="After Curfew Entrance">
            <br>
            <button id="enter-btn">Enter After Curfew</button>
        </div>
    </div>

<script>
    // ====================== RANDOM BACKGROUND VIDEO ======================
    const videoElement = document.getElementById('bg-video');
    
    const videoSources = [
        "images/Locations/After Curfew/after-curfew-1.mp4"
        // Add more videos here
    ];

    function playRandomVideo() {
        const randomIndex = Math.floor(Math.random() * videoSources.length);
        videoElement.src = videoSources[randomIndex];
        videoElement.load();
        videoElement.play().catch(e => console.log("Video autoplay prevented", e));
    }

    // ====================== AUDIO ======================
    const clubMusic = document.getElementById('club-music');
    const overlay = document.getElementById('overlay');
    const entrance = document.getElementById('entrance-container');
    const enterBtn = document.getElementById('enter-btn');

    // Show entrance
    window.addEventListener('load', () => {
        playRandomVideo();
        
        setTimeout(() => {
            entrance.classList.add('show');
        }, 600);
    });

    // Enter After Curfew
    enterBtn.addEventListener('click', () => {
        overlay.style.opacity = '0';

        // Start music
        clubMusic.play().catch(e => console.log("Music playback prevented", e));

        setTimeout(() => {
            overlay.style.display = 'none';
        }, 1600);
    });

    // Seamless loop safety
    clubMusic.addEventListener('ended', () => {
        clubMusic.currentTime = 0;
        clubMusic.play();
    });
</script>

</body>
</html>
