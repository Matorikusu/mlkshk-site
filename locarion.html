<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSHK</title>

<link rel="icon" href="images/LOGO_SMALL.png" type="image/png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#000;
  --text:#fff;
  --muted:#aaa;
  --accent:#ff2aa1;
}

html,body{
  margin:0;
  height:100%;
  font-family:'Rajdhani',system-ui;
  background:#000;
  color:#fff;
  overflow:hidden; /* LOCKED PAGE */
}

/* NAV (unchanged) */
header.nav-bar{
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:18px 24px;
  position:absolute;
  width:100%;
  top:0;
  z-index:30;
}

.nav-content{
  display:flex;
  align-items:center;
  justify-content:space-between;
  max-width:1200px;
  margin:0 auto;
}

.logo-link img{height:42px}

.nav-dropdown{position:relative}

.nav-toggle{
  background:none;
  border:0;
  color:#ccc;
  font-weight:600;
  cursor:pointer;
}

.dropdown-menu{
  display:none;
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  background:#000;
  border:1px solid var(--accent);
  border-radius:8px;
  min-width:200px;
}

.dropdown-menu a{
  display:block;
  padding:10px;
}

.dropdown-menu a:hover{
  background:var(--accent);
  color:#000;
}

/* HUB BACKGROUND */
.hub{
  height:100vh;
  width:100%;
  background:url('images/Home/mlkshk_header.png') center/cover no-repeat;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  align-items:center;
}

/* LOCATION SELECTOR */
.location-bar{
  width:100%;
  max-width:1000px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  margin-bottom:120px;
}

/* LOCATION NODE */
.location{
  width:180px;
  height:100px;
  background-size:cover;
  background-position:center;
  border:1px solid rgba(255,255,255,0.2);
  cursor:pointer;
  transition:all .3s ease;
  position:relative;
}

.location:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px rgba(255,255,255,0.3);
}

/* ACTIVE */
.location.active{
  border:1px solid var(--accent);
  box-shadow:0 0 30px rgba(255,42,161,.6);
}

/* LABEL */
.location span{
  position:absolute;
  bottom:6px;
  left:8px;
  font-size:12px;
  background:rgba(0,0,0,.6);
  padding:2px 6px;
}

/* FAKE LINE */
.line{
  position:absolute;
  width:70%;
  height:2px;
  background:var(--accent);
  bottom:170px;
  opacity:.3;
}

/* PLAYER (unchanged) */
#floating-player{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:360px;
  height:72px;
  background:url('Player/PLAYER.png') center/cover no-repeat;
  border-radius:20px;
  display:flex;
  align-items:center;
  padding:0 18px;
  z-index:999;
}

.player-meta{
  flex:1;
  text-align:center;
}

.player-title{font-weight:700;font-size:14px;}
.player-artist{font-size:12px;color:#aaa;}
.player-status{font-size:11px;color:#aaa;margin-top:4px;}

.player-controls img{
  width:42px;
  cursor:pointer;
}
</style>
</head>

<body>

<header class="nav-bar">
  <div class="nav-content">
    <a href="#" class="logo-link">
      <img src="images/MLKSHK_LOGO_1500_X_500.png">
    </a>

    <div class="nav-dropdown">
      <button class="nav-toggle">Menu</button>
      <div class="dropdown-menu">
        <a href="#">Access</a>
        <a href="#">Archive</a>
        <a href="#">Pirate Radio</a>
        <a href="#">Lab</a>
        <a href="#">Universe</a>
      </div>
    </div>
  </div>
</header>

<!-- HUB -->
<div class="hub">

  <div class="line"></div>

  <div class="location-bar">
    
    <div class="location active" style="background-image:url('images/Home/UNIVERSE_HEADER2.png')">
      <span>Shibuya</span>
    </div>

    <div class="location" style="background-image:url('images/Pirate Radio/pirateradio_header.png')">
      <span>Undercroft</span>
    </div>

    <div class="location" style="background-image:url('images/Home/CATALOGUE_HEADER_3.png')">
      <span>Beach</span>
    </div>

  </div>
</div>

<!-- PLAYER -->
<div id="floating-player">
  <div class="player-meta">
    <div class="player-title">MLKSHK Pirate Radio</div>
    <div class="player-artist">Live • Underground</div>
    <div class="player-status" id="status">Ready</div>
  </div>
  <div class="player-controls">
    <img id="playPause" src="Player/PLAY.png">
  </div>
  <audio id="audio" preload="none"></audio>
</div>

<script>
const audio = document.getElementById('audio');
const btn = document.getElementById('playPause');
const statusEl = document.getElementById('status');
const STREAM_URL = "https://radio.mlkshkdigital.com/stream.mp3";

let isPlaying = false;

function playLiveStream() {
  audio.src = STREAM_URL + "?t=" + Date.now();
  audio.load();
  audio.play().then(() => {
    isPlaying = true;
    btn.src = 'Player/PAUSE.png';
    statusEl.textContent = 'Live';
  });
}

function stopStream() {
  audio.pause();
  audio.src = '';
  isPlaying = false;
  btn.src = 'Player/PLAY.png';
  statusEl.textContent = 'Stopped';
}

btn.onclick = () => {
  isPlaying ? stopStream() : playLiveStream();
};

/* dropdown */
const navToggle = document.querySelector('.nav-toggle');
const dropdownMenu = document.querySelector('.dropdown-menu');

navToggle.onclick = (e) => {
  e.stopPropagation();
  dropdownMenu.style.display =
    dropdownMenu.style.display === 'block' ? 'none' : 'block';
};

document.addEventListener('click', () => {
  dropdownMenu.style.display = 'none';
});
</script>

</body>
</html>
