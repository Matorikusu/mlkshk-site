<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>THE KING BEAR</title>

<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --neon-red: #ff0505;
    --amp-chassis: #121212;
    --border-grit: #333333;
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000000;
    font-family: 'Oswald', system-ui, sans-serif;
    color: #eeeeee;
}

/* BACKGROUND VIDEO - CLEAN & UNFILTERED */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 1;
}

/* CLEAN OVERLAY PANEL */
#hud-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    border: 1px solid rgba(255, 5, 5, 0.2);
    margin: 24px;
    opacity: 0;
    transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1);
}
#hud-overlay::before {
    content: "LIVE STAGE MONITORS  ●  VENUE: THE KING BEAR // COUPLING: OVERDRIVE";
    position: absolute;
    top: 20px; left: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--neon-red);
    font-weight: bold;
}
#hud-overlay::after {
    content: "MASTER_VOLUME: 11 // TUBE_AMP_STATUS: HOT";
    position: absolute;
    bottom: 20px; right: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: #555;
}

/* ENTRANCE DECK OVERLAY */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #0a0a0a 0%, #000000 100%);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
}

.entrance {
    text-align: center;
    opacity: 0;
    transform: translateY(15px);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.entrance.show {
    opacity: 1;
    transform: translateY(0);
}

/* MINIMAL FRAMING */
.img-frame {
    position: relative;
    display: inline-block;
    max-width: 800px;
    width: 90%;
    border: 2px solid var(--border-grit);
    background: var(--amp-chassis);
    padding: 12px;
    box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
}

/* ENTRANCE IMAGE - CLEAN & UNFILTERED */
#entrance-img {
    width: 100%;
    display: block;
}

/* STATUS LOGS */
.terminal-output {
    font-family: 'Share Tech Mono', monospace;
    color: #777;
    font-size: 12px;
    text-align: center;
    margin-top: 24px;
    height: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

/* RAW NEON BUTTON */
#enter-btn {
    margin-top: 24px;
    padding: 20px 60px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    background: #000;
    border: 1px solid var(--neon-red);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 4px;
    transition: all 0.3s ease;
}

#enter-btn:hover {
    color: #000;
    background: var(--neon-red);
    border-color: var(--neon-red);
    box-shadow: 0 0 25px var(--neon-red);
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="images/Locations/The King Bear/kingbear.mp4" type="video/mp4">
</video>

<div id="hud-overlay"></div>

<audio id="club-music" preload="auto" loop></audio>
<audio id="radio-stream" preload="none"></audio>

<div id="overlay">
    <div class="entrance" id="entrance-container">
        <div class="img-frame">
            <img src="images/Locations/The King Bear/KINGBEAR_ENTRANCE.jpg" id="entrance-img" alt="The King Bear Entrance">
        </div>
        <div class="terminal-output" id="log-display">POWERING SATELLITE RIG...</div>
        <button id="enter-btn">KICK THE JAM</button>
    </div>
</div>

<script>
const overlay = document.getElementById('overlay');
const entrance = document.getElementById('entrance-container');
const enterBtn = document.getElementById('enter-btn');
const hud = document.getElementById('hud-overlay');
const logDisplay = document.getElementById('log-display');

const clubMusic = document.getElementById('club-music');
const radioStream = document.getElementById('radio-stream');

const trackList = [
    "Audio/Locations/The King Bear/KINGBEAR_TRACK_1.mp3"
];

const STREAM_URL = "https://radio.mlkshkdigital.com/MLKSK8.mp3"; 
let isPlaying = false;

const logMessages = [
    "HEATING VACUUM TUBES...",
    "BALANCING FRONT OF HOUSE MONITORS...",
    "GROUND LOOP ISOLATED // SIGNAL PATH: CLEAN",
    "AMPLIFIERS UNLEASHED. READY TO CRANK IT."
];
let messageIndex = 0;

function typeLogs() {
    if (messageIndex < logMessages.length) {
        logDisplay.textContent = logMessages[messageIndex];
        messageIndex++;
        setTimeout(typeLogs, 1300);
    }
}

window.addEventListener('load', () => {
    setTimeout(() => {
        entrance.classList.add('show');
        typeLogs();
    }, 400);
});

enterBtn.addEventListener('click', () => {
    overlay.style.opacity = '0';
    hud.style.opacity = '1'; 

    const randomTrackIndex = Math.floor(Math.random() * trackList.length);
    clubMusic.src = trackList[randomTrackIndex];
    
    clubMusic.play().catch((err) => {
        console.log("Audio play blocked by device context:", err);
    });

    radioStream.src = STREAM_URL + "?t=" + Date.now();
    radioStream.play().then(() => {
        isPlaying = true;
    }).catch(err => {
        console.log("Stream access held until manual handshake:", err);
    });

    setTimeout(() => {
        overlay.style.display = 'none';
    }, 1000);
});
</script>

</body>
</html>
