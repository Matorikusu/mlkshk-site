<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The King Bear</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Arial', sans-serif;
    }

    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
    }

    /* Black Overlay */
    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.88);
        z-index: 2;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 1.5s ease;
    }

    /* Entrance Container */
    .entrance {
        text-align: center;
        z-index: 3;
        opacity: 0;
        transform: scale(0.75);
        transition: all 1.3s ease;
    }

    .entrance.show {
        opacity: 1;
        transform: scale(1);
    }

    #entrance-img {
        width: 95%;                  /* Much bigger now */
        max-width: 1100px;           /* Increased max size */
        border: 10px solid #fff;
        box-shadow: 0 0 60px rgba(255, 215, 0, 0.7);
        border-radius: 12px;
    }

    #enter-btn {
        margin-top: 35px;
        padding: 18px 60px;
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
        background: #b8860b;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(184, 134, 11, 0.6);
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 3px;
    }

    #enter-btn:hover {
        background: #ffd700;
        color: #000;
        transform: scale(1.1);
    }
</style>
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="images/Locations/The King Bear/kingbear.mp4" type="video/mp4">
    </video>

    <!-- Audio -->
    <audio id="entrance-audio" preload="auto">
        <source src="Audio/Locations/The King Bear/2. Large Amounts v2.mp3" type="audio/mpeg">
    </audio>

    <!-- Entrance Overlay -->
    <div id="overlay">
        <div class="entrance" id="entrance-container">
            <img src="images/Locations/The King Bear/KINGBEAR_ENTRANCE.jpg" id="entrance-img" alt="The King Bear Entrance">
            <br>
            <button id="enter-btn">Enter The King Bear</button>
        </div>
    </div>

<script>
    const overlay = document.getElementById('overlay');
    const entrance = document.getElementById('entrance-container');
    const enterBtn = document.getElementById('enter-btn');
    const audio = document.getElementById('entrance-audio');

    // Show entrance popup
    window.addEventListener('load', () => {
        setTimeout(() => {
            entrance.classList.add('show');
        }, 500);
    });

    // Enter button → Remove overlay + Play Music
    enterBtn.addEventListener('click', () => {
        overlay.style.opacity = '0';

        // Play audio when user clicks "Enter"
        audio.play().catch(e => console.log("Audio playback prevented by browser"));

        setTimeout(() => {
            overlay.style.display = 'none';
        }, 1600);
    });
</script>

</body>
</html>
