<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The King Bear</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: 'Rajdhani', system-ui, sans-serif;
        color: white;
    }

    video {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        object-fit: cover;
        z-index: 1;
    }

    /* Black Overlay */
    #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.88);
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: opacity 1.5s ease;
    }

    .entrance {
        text-align: center;
        z-index: 11;
        opacity: 0;
        transform: scale(0.75);
        transition: all 1.3s ease;
    }

    .entrance.show {
        opacity: 1;
        transform: scale(1);
    }

    #entrance-img {
        width: 95%;
        max-width: 1100px;
        border: 10px solid #fff;
        box-shadow: 0 0 60px rgba(255, 215, 0, 0.7);
        border-radius: 12px;
    }

    #enter-btn {
        margin-top: 35px;
        padding: 18px 60px;
        font-size: 1.5rem;
        font-weight: bold;
        color: white;
        background: #b8860b;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        box-shadow: 0 10px 25px rgba(184, 134, 11, 0.6);
        transition: all 0.3s ease;
        text-transform: uppercase;
        letter-spacing: 3px;
    }

    #enter-btn:hover {
        background: #ffd700;
        color: #000;
        transform: scale(1.1);
    }

    /* FLOATING PLAYER */
    #floating-player {
        position: fixed;
        bottom: 25px;
        left: 50%;
        transform: translateX(-50%);
        width: 380px;
        height: 78px;
        background: url('Player/PLAYER.png') center/cover no-repeat;
        border-radius: 20px;
        display: none; /* Hidden until user enters */
        align-items: center;
        padding: 0 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.9);
        z-index: 100;
    }

    .player-meta {
        flex: 1;
        text-align: center;
        padding: 0 12px;
    }

    .player-title {
        font-weight: 700;
        font-size: 15px;
        color: #fff;
    }

    .player-artist {
        font-size: 13px;
        color: #ffd700;
    }

    .player-controls img {
        width: 46px;
        height: 46px;
        cursor: pointer;
        transition: transform 0.2s;
    }

    .player-controls img:active {
        transform: scale(0.9);
    }

    @media (max-width: 768px) {
        #floating-player {
            width: 92%;
            height: 68px;
        }
        .player-controls img { width: 40px; height: 40px; }
    }
</style>
</head>
<body>

    <!-- Background Video -->
    <video autoplay muted loop playsinline id="bg-video">
        <source src="images/Locations/The King Bear/kingbear.mp4" type="video/mp4">
    </video>

    <!-- Audio -->
    <audio id="kingbear-audio" preload="auto" loop>
        <source src="Audio/Locations/The King Bear/2. Large Amounts v2.mp3" type="audio/mpeg">
    </audio>

    <!-- Entrance Overlay -->
    <div id="overlay">
        <div class="entrance" id="entrance-container">
            <img src="images/Locations/The King Bear/KINGBEAR_ENTRANCE.jpg" id="entrance-img" alt="The King Bear Entrance">
            <br>
            <button id="enter-btn">Enter The King Bear</button>
        </div>
    </div>

    <!-- FLOATING PLAYER -->
    <div id="floating-player">
        <div class="player-meta">
            <div class="player-title">Large Amounts v2</div>
            <div class="player-artist">The King Bear</div>
        </div>
        <div class="player-controls">
            <img id="playPauseBtn" src="Player/PLAY.png" alt="Play/Pause">
        </div>
    </div>

<script>
    const overlay = document.getElementById('overlay');
    const entrance = document.getElementById('entrance-container');
    const enterBtn = document.getElementById('enter-btn');
    const audio = document.getElementById('kingbear-audio');
    const floatingPlayer = document.getElementById('floating-player');
    const playPauseBtn = document.getElementById('playPauseBtn');

    let isPlaying = false;

    // Show entrance
    window.addEventListener('load', () => {
        setTimeout(() => {
            entrance.classList.add('show');
        }, 500);
    });

    // Enter the club
    enterBtn.addEventListener('click', () => {
        overlay.style.opacity = '0';

        // Start music
        audio.play().catch(e => console.log("Playback prevented", e));

        // Show floating player after overlay fades
        setTimeout(() => {
            overlay.style.display = 'none';
            floatingPlayer.style.display = 'flex';
            isPlaying = true;
            playPauseBtn.src = 'Player/PAUSE.png';
        }, 1600);
    });

    // Play / Pause Button
    playPauseBtn.addEventListener('click', () => {
        if (isPlaying) {
            audio.pause();
            playPauseBtn.src = 'Player/PLAY.png';
            isPlaying = false;
        } else {
            audio.play();
            playPauseBtn.src = 'Player/PAUSE.png';
            isPlaying = true;
        }
    });

    // Extra loop safety
    audio.addEventListener('ended', () => {
        audio.currentTime = 0;
        audio.play();
    });
</script>

</body>
</html>
