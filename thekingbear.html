<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The King Bear // ROCK_CLUB</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --neon-red: #ff0033;
    --neon-glow: rgba(255, 0, 51, 0.6);
    --dark-grit: #0d0d0d;
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Rajdhani', system-ui, sans-serif;
    color: white;
}

/* BACKGROUND VIDEO - Zero color filters to preserve native artwork palette */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 1;
}

/* INDUSTRIAL HUD OVERLAY (Revealed after entry button trigger) */
#hud-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    border: 1px solid rgba(255, 0, 51, 0.25);
    margin: 20px;
    opacity: 0;
    transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
}
#hud-overlay::before {
    content: "LIVE STAGE // MAIN DECK AMPLIFIER SYNCED // KING BEAR LIVE";
    position: absolute;
    top: 20px; left: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--neon-red);
    text-shadow: 0 0 8px var(--neon-glow);
}

/* OVERLAY SPLASH PANEL */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(5, 5, 5, 0.88);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.2s cubic-bezier(0.16, 1, 0.3, 1);
}

.entrance {
    text-align: center;
    opacity: 0;
    transform: scale(0.96);
    transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
}

.entrance.show {
    opacity: 1;
    transform: scale(1);
}

/* RAW NEON STAGE FRAME WITH INTEGRATED LOAD FLICKER */
.img-frame {
    position: relative;
    display: inline-block;
    max-width: 850px;
    width: 90%;
    background: var(--dark-grit);
    padding: 10px;
    border: 3px solid var(--neon-red);
    box-shadow: 0 0 20px rgba(255, 0, 51, 0.3), inset 0 0 15px rgba(255, 0, 51, 0.15);
    animation: neon-wake 1.4s ease-out forwards;
}

#entrance-img {
    width: 100%;
    display: block;
}

/* STARK ROCK CONSOLE LOG GENERATOR */
.terminal-output {
    font-family: 'Share Tech Mono', monospace;
    color: #888;
    font-size: 13px;
    text-align: center;
    margin-top: 24px;
    height: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* RUGGED STAGE OVERRIDE INTERACTION BUTTON */
#enter-btn {
    margin-top: 24px;
    padding: 18px 54px;
    font-family: 'Orbitron', sans-serif;
    font-size: 14px;
    font-weight: 900;
    color: #fff;
    background: transparent;
    border: 2px solid var(--neon-red);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 4px;
    box-shadow: 0 0 10px rgba(255, 0, 51, 0.2);
    transition: all 0.3s ease;
}

#enter-btn:hover {
    color: #000;
    background: var(--neon-red);
    box-shadow: 0 0 25px var(--neon-red);
}

/* Raw neon flicker wake-up sequences */
@keyframes neon-wake {
    0%, 5%, 11% { border-color: #220005; box-shadow: none; }
    3%, 7%, 13% { border-color: var(--neon-red); box-shadow: 0 0 20px var(--neon-glow); }
    15%, 100% { border-color: var(--neon-red); box-shadow: 0 0 25px var(--neon-glow); }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="images/Locations/The King Bear/kingbear.mp4" type="video/mp4">
</video>

<div id="hud-overlay"></div>

<audio id="club-music" preload="auto" loop></audio>
<audio id="radio-stream" preload="none"></audio>

<div id="overlay">
    <div class="entrance" id="entrance-container">
        <div class="img-frame">
            <img src="images/Locations/The King Bear/KINGBEAR_ENTRANCE.jpg" id="entrance-img" alt="The King Bear Entrance View">
        </div>
        <div class="terminal-output" id="log-display">TUNING AUDIO DRIVERS...</div>
        <button id="enter-btn">ENTER THE CLUB</button>
    </div>
</div>

<script>
const overlay = document.getElementById('overlay');
const entrance = document.getElementById('entrance-container');
const enterBtn = document.getElementById('enter-btn');
const hud = document.getElementById('hud-overlay');
const logDisplay = document.getElementById('log-display');

const clubMusic = document.getElementById('club-music');
const radioStream = document.getElementById('radio-stream');

/* Retaining the 3-track structure space, primed with your current track file */
const trackList = [
    "Audio/Locations/The King Bear/KINGBEAR_TRACK_1.mp3",
    "Audio/Locations/The King Bear/KINGBEAR_TRACK_1.mp3",
    "Audio/Locations/The King Bear/KINGBEAR_TRACK_1.mp3"
];

const STREAM_URL = "https://radio.mlkshkdigital.com/KingBear.mp3";
let isPlaying = false;

/* Pre-show hardware level console log sequence */
const logMessages = [
    "HEATING VACUUM TUBES & PRE-AMPS...",
    "BALANCING EQUALIZER RAILS // FEEDER BUFFERS MATCHED...",
    "LOCAL TRANSCEIVER SECURED // BOOTH MONITOR OK...",
    "HANDSHAKE TERMINAL OPERATIONAL. READY TO PATCH."
];
let messageIndex = 0;

function typeLogs() {
    if (messageIndex < logMessages.length) {
        logDisplay.textContent = logMessages[messageIndex];
        messageIndex++;
        setTimeout(typeLogs, 1200);
    }
}

window.addEventListener('load', () => {
    setTimeout(() => {
        entrance.classList.add('show');
        typeLogs();
    }, 400);
});

/* ENGAGE SYSTEMS */
enterBtn.addEventListener('click', () => {
    overlay.style.opacity = '0';
    hud.style.opacity = '1'; 

    /* Select a random track from your paths array and refresh the node properties */
    const randomTrackIndex = Math.floor(Math.random() * trackList.length);
    clubMusic.src = trackList[randomTrackIndex];
    clubMusic.load(); // Forces pipeline initialization to bypass modern hardware policy blocks
    
    clubMusic.play().catch((err) => {
        console.log("Audio pipeline stream blocked by browser context:", err);
    });

    /* Simultaneous radio background initialization sequence */
    radioStream.src = STREAM_URL + "?t=" + Date.now();
    radioStream.load();
    
    radioStream.play().then(() => {
        isPlaying = true;
    }).catch(err => {
        console.log("Stream access held until manual handshake completes:", err);
    });

    setTimeout(() => {
        overlay.style.display = 'none';
    }, 1200);
});
</script>

</body>
</html>
