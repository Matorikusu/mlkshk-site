<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSK8 // DECK_ENTRY</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700;900&family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root {
    --brand-pink: #ff2aa1;
    --signal-green: #00ff66;
    --terminal-black: #000000;
    --border-color: #222222;
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--terminal-black);
    font-family: 'Rajdhani', system-ui, sans-serif;
    color: white;
}

/* REBALANCED CAMERA LENS SCANLINES (SUBTLE & CRISP) */
body::before {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    /* Ultra fine, low opacity horizontal raster lines only */
    background: linear-gradient(rgba(0, 0, 0, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
    z-index: 99;
    background-size: 100% 3px;
    pointer-events: none;
    opacity: 0.4;
}

/* CCTV FEED BACKGROUND */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 1;
    filter: contrast(1.1) brightness(0.7) saturate(0.9);
}

/* INDUSTRIAL CCTV RECORDING OVERLAY */
#hud-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    border: 1px solid rgba(255, 42, 161, 0.3);
    margin: 24px;
    opacity: 0;
    transition: opacity 1.5s cubic-bezier(0.16, 1, 0.3, 1);
}
#hud-overlay::before {
    content: "REC  ●  LOC: MLKSK8 CH_04 // FREQ: 107.3MHZ // FEED: ACTIVE";
    position: absolute;
    top: 20px; left: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--brand-pink);
    font-weight: bold;
}
#hud-overlay::after {
    content: "DECK_SOURCE: UNINDEXED";
    position: absolute;
    bottom: 20px; right: 24px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
    color: #444;
}

/* ENTRANCE DECK OVERLAY */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, #050505 0%, #000000 100%);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1);
}

.entrance {
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
}

.entrance.show {
    opacity: 1;
    transform: translateY(0);
}

.img-frame {
    position: relative;
    display: inline-block;
    max-width: 800px;
    width: 90%;
    border: 1px solid var(--border-color);
    background: #050505;
    padding: 10px;
}

#entrance-img {
    width: 100%;
    display: block;
    filter: grayscale(0.2) brightness(0.9);
    transition: filter 0.5s ease;
}
.img-frame:hover #entrance-img {
    filter: grayscale(0) brightness(1);
}

/* STARK LEDGER LOG GENERATOR */
.terminal-output {
    font-family: 'Share Tech Mono', monospace;
    color: #666;
    font-size: 12px;
    text-align: center;
    margin-top: 24px;
    height: 20px;
    letter-spacing: 1px;
    text-transform: uppercase;
}

/* PREMIUM GRITTY ACTION OVERRIDE BUTTON */
#enter-btn {
    margin-top: 24px;
    padding: 20px 60px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    background: #000;
    border: 1px solid var(--border-color);
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 3px;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

#enter-btn:hover {
    color: #000;
    background: #fff;
    border-color: #fff;
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="images/Locations/MLKSK8/MLKSK8.mp4" type="video/mp4">
</video>

<div id="hud-overlay"></div>

<audio id="club-music" preload="auto" loop></audio>
<audio id="radio-stream" preload="none"></audio>

<div id="overlay">
    <div class="entrance" id="entrance-container">
        <div class="img-frame">
            <img src="images/Locations/MLKSK8/MLKSK8_ENTRANCE.jpg" id="entrance-img" alt="MLKSK8 Entryway Node">
        </div>
        <div class="terminal-output" id="log-display">CONNECTING DECK TRANSCEIVER...</div>
        <button id="enter-btn">CONNECT TO STATION FEED</button>
    </div>
</div>

<script>
const overlay = document.getElementById('overlay');
const entrance = document.getElementById('entrance-container');
const enterBtn = document.getElementById('enter-btn');
const hud = document.getElementById('hud-overlay');
const logDisplay = document.getElementById('log-display');

const clubMusic = document.getElementById('club-music');
const radioStream = document.getElementById('radio-stream');

const trackList = [
    "Audio/Locations/MLKSK8/MLKSK8_TRACK_1.mp3",
    "Audio/Locations/MLKSK8/MLKSK8_TRACK_2.mp3",
    "Audio/Locations/MLKSK8/MLKSK8_TRACK_3.mp3"
];

const STREAM_URL = "https://radio.mlkshkdigital.com/MLKSK8.mp3";
let isPlaying = false;

// Cleaner system log diagnostics
const logMessages = [
    "SCANNING INTERCEPT ROUTE...",
    "ESTABLISHING SECURE GATEWAY TUNNEL... RE-ROUTED",
    "STATION MONITOR SYNCED // MULTI-DECK STREAM BUFFERED",
    "DECK MODULE AUTHENTICATED. READY FOR PATCH."
];
let messageIndex = 0;

function typeLogs() {
    if (messageIndex < logMessages.length) {
        logDisplay.textContent = logMessages[messageIndex];
        messageIndex++;
        setTimeout(typeLogs, 1400);
    }
}

window.addEventListener('load', () => {
    setTimeout(() => {
        entrance.classList.add('show');
        typeLogs();
    }, 400);
});

/* GATE ENTRY SYSTEM EXECUTION */
enterBtn.addEventListener('click', () => {
    overlay.style.opacity = '0';
    hud.style.opacity = '1'; 

    const randomTrackIndex = Math.floor(Math.random() * trackList.length);
    clubMusic.src = trackList[randomTrackIndex];
    
    clubMusic.play().catch((err) => {
        console.log("Audio play blocked by device context:", err);
    });

    radioStream.src = STREAM_URL + "?t=" + Date.now();
    radioStream.play().then(() => {
        isPlaying = true;
    }).catch(err => {
        console.log("Stream access held until manual handshake:", err);
    });

    setTimeout(() => {
        overlay.style.display = 'none';
    }, 1000);
});
</script>

</body>
</html>
