<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MLKSK8 // SYSTEM_INTRUSION</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">

<style>
:root {
    --neon-green: #00ff66;
    --neon-magenta: #ff0055;
    --terminal-black: #050505;
}

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--terminal-black);
    font-family: 'Rajdhani', system-ui, sans-serif;
    color: white;
}

/* CYBER SCANLINES & OVERLAYS */
body::before {
    content: " ";
    display: block;
    position: fixed;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
    z-index: 99;
    background-size: 100% 4px, 6px 100%;
    pointer-events: none;
}

/* VIDEO BACKGROUND */
video {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 1;
    filter: contrast(1.15) brightness(0.8) saturate(1.1);
}

/* ACTIVE HUD VISUALIZER HUD OVERLAY */
#hud-overlay {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    border: 4px solid rgba(0, 255, 102, 0.1);
    margin: 15px;
    opacity: 0;
    transition: opacity 2s ease;
}
#hud-overlay::before {
    content: "LOC: UNKNOWN // FREQ: 107.3Mhz // STATUS: HIJACKED";
    position: absolute;
    top: 10px; left: 15px;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--neon-green);
    text-shadow: 0 0 5px var(--neon-green);
}

/* INTRUSION OVERLAY */
#overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, rgba(10,5,15,0.92) 0%, rgba(0,0,0,0.98) 100%);
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 1.2s cubic-bezier(0.88, 0.05, 0.2, 1);
}

.entrance {
    text-align: center;
    opacity: 0;
    transform: scale(0.85);
    transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.entrance.show {
    opacity: 1;
    transform: scale(1);
}

.img-frame {
    position: relative;
    display: inline-block;
    max-width: 900px;
    width: 90%;
}

#entrance-img {
    width: 100%;
    border: 2px solid var(--neon-magenta);
    box-shadow: 0 0 40px rgba(255, 0, 85, 0.35), inset 0 0 20px rgba(255, 0, 85, 0.2);
    border-radius: 4px;
}

/* TERMINAL OUTPUT MATRIX */
.terminal-output {
    font-family: monospace;
    color: var(--neon-green);
    font-size: 13px;
    text-align: left;
    margin-top: 15px;
    padding-left: 10px;
    height: 20px;
    letter-spacing: 1px;
    text-shadow: 0 0 4px var(--neon-green);
}

/* UNRULY SEISMIC ENTER BUTTON */
#enter-btn {
    margin-top: 30px;
    padding: 20px 70px;
    font-family: 'Orbitron', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: #000;
    background: var(--neon-green);
    border: none;
    border-radius: 0px; /* Sharp edge industrial punk style */
    cursor: pointer;
    box-shadow: 0 0 25px rgba(0, 255, 102, 0.4);
    text-transform: uppercase;
    letter-spacing: 4px;
    position: relative;
    transition: all 0.15s ease;
}

#enter-btn:hover {
    color: #fff;
    background: var(--neon-magenta);
    box-shadow: -5px 0 var(--neon-green), 5px 0 var(--neon-magenta), 0 0 40px rgba(255, 0, 85, 0.8);
    animation: glitch-shake 0.2s infinite;
}

/* GLITCH SHAKE ANIMATION EFFECTS */
@keyframes glitch-shake {
    0% { transform: translate(0) }
    20% { transform: translate(-2px, 2px) }
    40% { transform: translate(-2px, -2px) }
    60% { transform: translate(2px, 2px) }
    80% { transform: translate(2px, -2px) }
    100% { transform: translate(0) }
}
</style>
</head>

<body>

<video autoplay muted loop playsinline>
    <source src="images/Locations/MLKSK8/MLKSK8.mp4" type="video/mp4">
</video>

<div id="hud-overlay"></div>

<audio id="club-music" preload="auto" loop></audio>

<audio id="radio-stream" preload="none"></audio>

<div id="overlay">
    <div class="entrance" id="entrance-container">
        <div class="img-frame">
            <img src="images/Locations/MLKSK8/MLKSK8_ENTRANCE.jpg" id="entrance-img" alt="MLKSK8 Entryway Node">
        </div>
        <div class="terminal-output" id="log-display">> INITIALIZING INTEL PIPELINE...</div>
        <button id="enter-btn">HIJACK SYSTEM</button>
    </div>
</div>

<script>
const overlay = document.getElementById('overlay');
const entrance = document.getElementById('entrance-container');
const enterBtn = document.getElementById('enter-btn');
const hud = document.getElementById('hud-overlay');
const logDisplay = document.getElementById('log-display');

const clubMusic = document.getElementById('club-music');
const radioStream = document.getElementById('radio-stream');

const trackList = [
    "Audio/Locations/MLKSK8/MLKSK8_TRACK_1.mp3",
    "Audio/Locations/MLKSK8/MLKSK8_TRACK_2.mp3",
    "Audio/Locations/MLKSK8/MLKSK8_TRACK_3.mp3"
];

const STREAM_URL = "https://radio.mlkshkdigital.com/MLKSK8.mp3";
let isPlaying = false;

// Dynamic Console Typing Text Engine
const logMessages = [
    "> SCANNING OPEN PORT LAYERS...",
    "> BREACHING FIREWALL... STATUS: GRANTED",
    "> LOCAL BROADCAST LINK OVERRIDE CONFIGURED...",
    ">> READY TO DESTROY THE ARCHITECTURE <<"
];
let messageIndex = 0;

function typeLogs() {
    if (messageIndex < logMessages.length) {
        logDisplay.textContent = logMessages[messageIndex];
        messageIndex++;
        setTimeout(typeLogs, 1200);
    }
}

/* Page Boot Mechanics */
window.addEventListener('load', () => {
    setTimeout(() => {
        entrance.classList.add('show');
        typeLogs();
    }, 400);
});

/* INTRUSION TRIPPED — EXECUTE OVERRIDE */
enterBtn.addEventListener('click', () => {
    // Phase UI elements out aggressively
    overlay.style.opacity = '0';
    hud.style.opacity = '1'; // Pop down tracking HUD configuration

    /* Choose localized soundtrack node */
    const randomTrackIndex = Math.floor(Math.random() * trackList.length);
    clubMusic.src = trackList[randomTrackIndex];
    
    /* Play background audio layer */
    clubMusic.play().catch((err) => {
        console.log("Audio pipeline muted by engine sandbox rules:", err);
    });

    /* Establish clean patch into the pirate transceiver node */
    radioStream.src = STREAM_URL + "?t=" + Date.now();
    radioStream.play().then(() => {
        isPlaying = true;
    }).catch(err => {
        console.log("Autoplay caught on secure frame sandbox protocol:", err);
    });

    setTimeout(() => {
        overlay.style.display = 'none';
    }, 1200);
});
</script>

</body>
</html>
