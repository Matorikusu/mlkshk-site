<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLKSHK RADIO</title>
  <link rel="icon" href="images/LOGO_SMALL.png" type="image/png">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700&family=Rajdhani:wght@500;600&display=swap" rel="stylesheet">

  <!-- PWA Support -->
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MLKSHK Pirate Radio">
  <link rel="apple-touch-icon" href="images/LOGO_SMALL.png">

  <style>
    :root {
      --bg: #000;
      --text: #f5f5f5;
      --muted: #c0c0c0;
      --accent: #ff2aa1;
      --glow: rgba(255,42,161,0.5);
      --transmission: #00ff00;
    }
    body {
      margin:0; padding:0; font-family:'Rajdhani', sans-serif; background:var(--bg); color:var(--text);
      overflow-x: hidden;
    }
    /* … (all your existing styles for nav, transmitter-room, player-overlay, transmitter-status, footer, responsive etc. remain unchanged) … */

    /* NEW: Low-key centered add-to-home prompt at bottom */
    .add-to-home {
      text-align: center;
      padding: 20px 0 40px;
      color: var(--muted);
      font-size: 0.95rem;
      opacity: 0.7;
    }
    .add-to-home a {
      color: var(--transmission);
      text-decoration: none;
      border-bottom: 1px dashed var(--transmission);
      transition: all 0.2s;
    }
    .add-to-home a:hover {
      color: #00ff00;
      opacity: 1;
      text-shadow: 0 0 8px var(--transmission);
    }
    .add-to-home .instructions {
      margin-top: 6px;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.4;
    }

    @media (max-width: 768px) {
      .add-to-home {
        padding: 16px 0 30px;
        font-size: 0.9rem;
      }
      .add-to-home .instructions {
        font-size: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <header class="nav-bar">
    <div class="nav-content">
      <a href="index.html" class="logo-link">
        <img src="images/MLKSHK_LOGO_1500_X_500.png" alt="MLKSHK Logo">
      </a>
      <nav class="nav-links">
        <div class="nav-dropdown">
          <button class="nav-toggle" aria-haspopup="true">Menu</button>
          <div class="dropdown-menu">
            <a href="index.html">Home</a>
            <a href="access.html">Access</a>
            <a href="archive.html">Archive</a>
            <a href="lab.html">The Lab</a>
            <a href="universe.html">The Universe</a>
          </div>
        </div>
      </nav>
    </div>
  </header>

  <div class="transmitter-room">
    <div class="crt-noise"></div>
    <div class="player-overlay">
      <img src="images/Pirate Radio/pirateradio.png" alt="MLKSHK Pirate Radio">
      <button id="playBtn">▶ Play</button>
      <button id="installBtn" style="display: none;">Install App</button>
      <p id="status">Ready – click Play to connect live</p>
      <div id="transmitter-status">
        FREQ: 107.3 MHz (PIRATE)<br>
        PWR: 52% (FLUCTUATING)<br>
        NOISE: -41 dB
      </div>
      <audio id="radio" preload="none" style="display:none">
        <source src="https://radio.mlkshkdigital.com/stream.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>
  </div>

  <footer class="site-footer">
    <div style="padding:18px 10px;color:var(--muted);text-align:center">
      MLKSHK Digital — Built for the misfits. © <span id="year"></span>
    </div>
  </footer>

  <!-- NEW: Centered, understated add-to-home prompt -->
  <div class="add-to-home">
    <a href="#" onclick="event.preventDefault(); alert('Stick this on your homescreen if you want:\n\nAndroid (Chrome): three-dot menu (⋮) → Add to home screen\niPhone (Safari): Share icon → Add to Home Screen\n\nWhatever.'); return false;">
      stick this on your homescreen if you want
    </a>
    <div class="instructions">
      (no app store bullshit required)
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const radio = document.getElementById('radio');
    const btn = document.getElementById('playBtn');
    const statusEl = document.getElementById('status');
    const installBtn = document.getElementById('installBtn');

    function resetStreamToLive() {
      const currentSrc = radio.currentSrc || radio.src;
      if (currentSrc) {
        radio.src = '';
        radio.load();
        radio.src = currentSrc;
        radio.load();
      }
    }

    btn.addEventListener('click', () => {
      if (radio.paused) {
        resetStreamToLive();
        radio.play()
          .then(() => {
            btn.textContent = 'Pause';
            statusEl.textContent = 'Connecting...';
          })
          .catch(e => {
            console.error('Play failed:', e);
            statusEl.textContent = 'Connection error – try again';
          });
      } else {
        radio.pause();
        btn.textContent = '▶ Play';
        statusEl.textContent = 'Paused';
      }
    });

    radio.addEventListener('waiting', () => statusEl.textContent = 'Buffering...');
    radio.addEventListener('playing', () => statusEl.textContent = 'Live');
    radio.addEventListener('error', () => {
      statusEl.textContent = 'Stream error – retrying...';
      setTimeout(() => {
        resetStreamToLive();
        radio.play().catch(() => {});
      }, 3000);
    });
    radio.addEventListener('stalled', () => {
      statusEl.textContent = 'Stalled – reconnecting...';
      resetStreamToLive();
      radio.play().catch(() => {});
    });

    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: "MLKSHK Pirate Radio",
        artist: "Underground • Live • No Rules",
        album: "MLKSHK Digital",
        artwork: [
          { src: "images/LOGO_SMALL.png", sizes: "96x96", type: "image/png" },
          { src: "images/LOGO_SMALL.png", sizes: "128x128", type: "image/png" },
          { src: "images/LOGO_SMALL.png", sizes: "192x192", type: "image/png" },
          { src: "images/Pirate Radio/pirateradio.png", sizes: "512x512", type: "image/png" }
        ]
      });
      navigator.mediaSession.setActionHandler('play', () => {
        resetStreamToLive();
        radio.play();
        btn.textContent = 'Pause';
        statusEl.textContent = 'Live';
      });
      navigator.mediaSession.setActionHandler('pause', () => {
        radio.pause();
        btn.textContent = '▶ Play';
        statusEl.textContent = 'Paused';
      });
      radio.addEventListener('play', () => navigator.mediaSession.playbackState = 'playing');
      radio.addEventListener('pause', () => navigator.mediaSession.playbackState = 'paused');
    }

    const statusOptions = [
      "FREQ: 107.3 MHz (PIRATE)<br>PWR: 41–58% (FLUCTUATING)<br>NOISE: -38 dB",
      "SIGNAL: 73%<br>CARRIER: DRIFTING<br>GHOST: INCOMING",
      "DO NOT ADJUST<br>TEMPERATURE: 47°C<br>TAPE WARP: DETECTED",
      "LAST LOCK: 00:14:22 AGO<br>INTERFERENCE: MINIMAL",
      "THEY’RE LISTENING<br>FREQUENCY LOCKED"
    ];
    function updateTransmitterStatus() {
      document.getElementById('transmitter-status').innerHTML = statusOptions[Math.floor(Math.random() * statusOptions.length)];
    }
    updateTransmitterStatus();
    setInterval(updateTransmitterStatus, 240000 + Math.random() * 120000);

    const navToggle = document.querySelector('.nav-toggle');
    const dropdownMenu = document.querySelector('.dropdown-menu');
    navToggle.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdownMenu.style.display = dropdownMenu.style.display === 'block' ? 'none' : 'block';
    });
    document.addEventListener('click', (e) => {
      if (!navToggle.contains(e.target) && !dropdownMenu.contains(e.target)) {
        dropdownMenu.style.display = 'none';
      }
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered'))
          .catch(err => console.log('Service Worker registration failed:', err));
      });
    }

    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-block';
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('User install choice:', outcome);
      deferredPrompt = null;
      installBtn.style.display = 'none';
    });

    window.addEventListener('appinstalled', () => {
      console.log('PWA was installed!');
      installBtn.style.display = 'none';
    });
  </script>
</body>
</html>
