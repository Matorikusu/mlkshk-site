<style>
:root{
  --bg: #060407;
  --panel-opacity: 0.45;
  --panel-bg: rgba(10, 6, 12, var(--panel-opacity));
  --text: #f4eaff;
  --muted: #7f6e8c;
  --accent-hue: 280;
  --accent: hsl(var(--accent-hue), 95%, 59%);
  --accent-glow-opacity: 0.35;
  --accent-glow: hsla(var(--accent-hue), 95%, 59%, var(--accent-glow-opacity));
  --signal-green: #39ff14;
}

/* === Your existing styles (unchanged) === */
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Rajdhani', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
  position: relative;
}

body::before, .grid-overlay, body::after, .scanline { /* your original background & overlays */ }

/* ... [All your original CSS stays here] ... */

.deck-container {
  min-height: calc(100vh - 160px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  box-sizing: border-box;
}

/* NEW: Floating "Fuck The System" Install Button */
#install-btn {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%);
  background: #000;
  color: var(--accent);
  border: 3px solid var(--accent);
  padding: 14px 28px;
  font-family: 'Orbitron', sans-serif;
  font-weight: 700;
  font-size: 15px;
  text-transform: uppercase;
  letter-spacing: 2px;
  cursor: pointer;
  box-shadow: 0 0 20px var(--accent-glow), 6px 6px 0 #000;
  transition: all 0.2s ease;
  z-index: 1000;
  white-space: nowrap;
  display: none; /* hidden by default */
  text-align: center;
  line-height: 1.2;
}

#install-btn:hover {
  transform: translateX(-50%) translateY(-3px);
  box-shadow: 0 0 30px var(--accent), 8px 8px 0 var(--accent);
  background: var(--accent);
  color: #000;
}

#install-btn:active {
  transform: translateX(-50%) translateY(2px);
  box-shadow: 2px 2px 0 #000;
}

#install-btn .glitch {
  animation: glitch-text 1.5s infinite;
}

@keyframes glitch-text {
  0% { text-shadow: 2px 0 var(--signal-green), -2px 0 var(--accent); }
  20% { text-shadow: -2px 0 var(--signal-green), 2px 0 var(--accent); }
  100% { text-shadow: 2px 0 var(--signal-green), -2px 0 var(--accent); }
}

@media (max-width: 480px) {
  #install-btn { font-size: 13px; padding: 12px 22px; bottom: 18px; }
}
</style>
</head>
<body>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<header class="nav-bar"> <!-- your original nav bar --> </header>

<main class="deck-container">
  <div class="pirate-deck" id="pirateDeck">
    <!-- Your entire player content remains unchanged -->
    <div class="broadcast-monitor"> ... </div>
    <div class="deck-controls"> ... </div>
    <audio id="audio" preload="none"></audio>
  </div>
</main>

<footer> ... </footer>

<!-- === NEW FLOATING BUTTON === -->
<button id="install-btn">
  <span class="glitch">FUCK THE SYSTEM</span><br>
  ADD TO HOME SCREEN
</button>

<script>
// Your original JavaScript (unchanged)
document.getElementById('year').textContent = new Date().getFullYear();
const audio = document.getElementById('audio');
// ... all your existing code for play/pause, knobs, etc. ...

/* ==================== INSTALL BUTTON LOGIC ==================== */
let deferredPrompt;

const installBtn = document.getElementById('install-btn');

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  installBtn.style.display = 'block';
});

installBtn.addEventListener('click', () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then((choiceResult) => {
      if (choiceResult.outcome === 'accepted') {
        installBtn.style.display = 'none';
      }
      deferredPrompt = null;
    });
  } else {
    // Fallback for iOS / browsers that don't support beforeinstallprompt
    alert("To add to home screen:\n\n" +
          "• iOS: Tap Share → 'Add to Home Screen'\n" +
          "• Android: Tap Menu → 'Add to Home screen' or 'Install app'");
  }
});

// Hide button when already in standalone mode
if (window.matchMedia('(display-mode: standalone)').matches || 
    window.navigator.standalone === true) {
  installBtn.style.display = 'none';
}

// Service Worker registration (recommended)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
